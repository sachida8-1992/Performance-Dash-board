<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1a237e;--accent:#e53935;--gold:#f9a825;
  --green:#2e7d32;--teal:#00838f;--bg:#f0f2f5;
  --card:#fff;--text:#212121;--muted:#757575;
}

/* ── DARK THEME ─────────────────────────── */
body.dark-theme{--primary:#90caf9;--accent:#ef9a9a;--gold:#ffe082;--green:#a5d6a7;--teal:#80cbc4;--bg:#0f1117;--card:#1e2130;--text:#e0e0e0;--muted:#9e9e9e}
body.dark-theme .login-box{background:#1e2130;box-shadow:0 20px 60px rgba(0,0,0,.6)}
body.dark-theme .login-logo h1{color:#90caf9}
body.dark-theme .login-field input{background:#2a2d3e;border-color:#3a3d4e;color:#e0e0e0}
body.dark-theme .login-field input:focus{border-color:#90caf9}
body.dark-theme .nav{background:#1e2130;border-bottom-color:#2a2d3e}
body.dark-theme .nav-btn{color:#9e9e9e}
body.dark-theme .nav-btn.active{color:#90caf9;border-bottom-color:#90caf9}
body.dark-theme .nav-btn:hover{color:#90caf9}
body.dark-theme .card{background:#1e2130;box-shadow:0 2px 8px rgba(0,0,0,.3)}
body.dark-theme .kpi{background:#1e2130;box-shadow:0 2px 8px rgba(0,0,0,.3)}
body.dark-theme .kpi-value{color:#90caf9}
body.dark-theme table{color:#e0e0e0}
body.dark-theme thead th{border-bottom-color:#2a2d3e;color:#9e9e9e}
body.dark-theme tbody td{border-bottom-color:#2a2d3e}
body.dark-theme tbody tr:hover{background:#252838}
body.dark-theme .badge-green{background:#1b3a1c;color:#a5d6a7}
body.dark-theme .badge-blue{background:#1a2744;color:#90caf9}
body.dark-theme .badge-orange{background:#3a2200;color:#ffcc80}
body.dark-theme .badge-red{background:#3a1010;color:#ef9a9a}
body.dark-theme .badge-grey{background:#2a2d3e;color:#b0b0b0}
body.dark-theme .badge-gold{background:#3a2e00;color:#ffe082}
body.dark-theme .progress-wrap{background:#2a2d3e}
body.dark-theme .section-title{color:#90caf9;border-bottom-color:#2a2d3e}
body.dark-theme .card-title{color:#9e9e9e}
body.dark-theme .kpi-bar{background:#2a2d3e}
body.dark-theme .insight-item{background:#1e2130;box-shadow:0 1px 4px rgba(0,0,0,.3)}
body.dark-theme .insight-body{color:#9e9e9e}
body.dark-theme select,body.dark-theme input[type=text],body.dark-theme input[type=password],body.dark-theme input[type=number]{background:#2a2d3e;border-color:#3a3d4e;color:#e0e0e0}
body.dark-theme .filter-btn{background:#1e2130;border-color:#3a3d4e;color:#9e9e9e}
body.dark-theme .filter-btn.active{background:#1a2744;border-color:#90caf9;color:#90caf9}
body.dark-theme .city-tab-btn{background:#2a2d3e;border-color:#3a3d4e;color:#9e9e9e}
body.dark-theme .city-tab-btn.active,body.dark-theme .city-tab-btn:hover{background:#1a237e;color:#fff;border-color:#1a237e}
body.dark-theme .slab-header{background:#252838;color:#9e9e9e}
body.dark-theme .slab-active{background:#1b3a1c}
body.dark-theme .slab-row{border-bottom-color:#2a2d3e}
body.dark-theme .issue-form{background:#252838;border-color:#3a3d4e}
body.dark-theme .issue-card{background:#1e2130}
body.dark-theme .reply-item{background:#252838}
body.dark-theme .reply-form input{background:#2a2d3e;border-color:#3a3d4e;color:#e0e0e0}
body.dark-theme .tree-leaf{background:#1e2130}
body.dark-theme .tree-node{border-left-color:#2a2d3e}
body.dark-theme .empty{color:#757575}
/* ── END DARK THEME ─────────────────────── */
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a237e 0%,#283593 50%,#e53935 100%)}
.login-box{background:#fff;border-radius:16px;padding:48px 40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo h1{color:var(--primary);font-size:32px;font-weight:800;letter-spacing:-1px}
.login-logo p{color:var(--muted);font-size:13px;margin-top:4px}
.login-field{margin-bottom:20px}
.login-field label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.login-field input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;outline:none;transition:border .2s}
.login-field input:focus{border-color:var(--primary)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#1a237e,#283593);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:transform .1s,box-shadow .2s}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(26,35,126,.4)}
.login-err{color:#e53935;font-size:13px;text-align:center;margin-top:12px;min-height:20px}

.app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-logo{font-size:22px;font-weight:800;letter-spacing:-1px}
.topbar-badge{background:rgba(255,255,255,.15);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.5px}
.topbar-right{display:flex;align-items:center;gap:16px}
.user-info{text-align:right}
.user-info .name{font-size:14px;font-weight:600}
.user-info .role{font-size:11px;opacity:.7}
.logout-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:background .2s}
.logout-btn:hover{background:rgba(255,255,255,.25)}

.nav{background:#fff;border-bottom:1px solid #e0e0e0;padding:0 24px;display:flex;gap:4px;overflow-x:auto}
.nav-btn{padding:14px 18px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s}
.nav-btn.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.nav-btn:hover{color:var(--primary)}

.main{padding:24px;flex:1}
.page{display:none}
.page.active{display:block}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.kpi{background:var(--card);border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.kpi-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi-value{font-size:24px;font-weight:800;color:var(--primary);line-height:1}
.kpi-sub{font-size:12px;color:var(--muted);margin-top:6px}
.kpi-bar{height:6px;background:#e0e0e0;border-radius:3px;margin-top:12px;overflow:hidden}
.kpi-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#1a237e,#e53935);transition:width 1s}

.section-title{font-size:16px;font-weight:700;color:var(--primary);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--bg)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
@media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}}
.card{background:var(--card);border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px}

table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--bg)}
tbody td{padding:10px 12px;border-bottom:1px solid var(--bg)}
tbody tr:hover{background:#f9fafb}
tbody tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#e8f5e9;color:#2e7d32}
.badge-blue{background:#e3f2fd;color:#1565c0}
.badge-orange{background:#fff3e0;color:#e65100}
.badge-red{background:#fce4ec;color:#c62828}
.badge-grey{background:#f5f5f5;color:#616161}
.badge-gold{background:#fff8e1;color:#f57f17}

.progress-wrap{background:#e0e0e0;border-radius:4px;height:8px;overflow:hidden}
.progress-bar{height:100%;border-radius:4px;transition:width .8s}
.bar-green{background:#43a047}
.bar-orange{background:#fb8c00}
.bar-red{background:#e53935}

.incentive-box{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;border-radius:16px;padding:28px;margin-bottom:24px}
.incentive-title{font-size:13px;opacity:.7;text-transform:uppercase;letter-spacing:.5px}
.incentive-amount{font-size:48px;font-weight:800;line-height:1;margin:8px 0}
.incentive-breakdown{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:20px}
.incentive-item{background:rgba(255,255,255,.1);border-radius:8px;padding:12px}
.incentive-item .ivalue{font-size:18px;font-weight:700}
.incentive-item .ilabel{font-size:11px;opacity:.7;margin-top:4px}

.slab-table{background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.slab-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;padding:12px 16px;border-bottom:1px solid var(--bg);font-size:13px;align-items:center}
.slab-header{background:#f5f5f5;font-weight:700;color:var(--muted);font-size:11px;text-transform:uppercase}
.slab-active{background:#e8f5e9;font-weight:600}
.slab-future{opacity:.5}

.tree-node{margin-left:20px;border-left:2px solid #e0e0e0;padding-left:16px;margin-top:8px}
.tree-leaf{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--card);border-radius:8px;margin-bottom:6px;font-size:13px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.tree-leaf .tname{font-weight:600;flex:1}
.tree-leaf .tamt{font-weight:700;color:var(--primary)}

.insight-list{display:flex;flex-direction:column;gap:12px}
.insight-item{background:var(--card);border-radius:10px;padding:16px;border-left:4px solid;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.insight-item.good{border-color:#43a047}
.insight-item.warn{border-color:#fb8c00}
.insight-item.action{border-color:#e53935}
.insight-title{font-size:14px;font-weight:700;margin-bottom:4px}
.insight-body{font-size:13px;color:var(--muted)}

.chip{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;margin-right:4px}
.chip-uc{background:#e3f2fd;color:#1565c0}
.chip-cv{background:#f3e5f5;color:#6a1b9a}
.chip-ncv{background:#fff3e0;color:#e65100}

.empty{text-align:center;padding:48px;color:var(--muted);font-size:14px}
.highlight-number{font-size:22px;font-weight:800;color:var(--primary)}

.issue-form{background:#f8f9ff;border:2px dashed #c5cae9;border-radius:12px;padding:24px;margin-bottom:24px}
.issue-form h3{color:var(--primary);margin-bottom:16px;font-size:15px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:700px){.form-grid{grid-template-columns:1fr}}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.form-field input,.form-field select,.form-field textarea{padding:10px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:13px;outline:none;font-family:inherit;background:#fff;transition:border .2s}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--primary)}
.form-field textarea{resize:vertical;min-height:72px}
.submit-btn{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;transition:opacity .2s}
.submit-btn:hover{opacity:.9}
.issue-card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:16px;overflow:hidden;border-left:4px solid #e53935}
.issue-card.closed{border-left-color:#43a047;opacity:.85}
.issue-header{padding:16px 20px;display:flex;align-items:flex-start;gap:12px}
.issue-meta{flex:1}
.issue-id{font-size:11px;color:var(--muted);font-weight:600}
.issue-title{font-size:14px;font-weight:700;margin:4px 0}
.issue-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.issue-body{padding:0 20px 16px;font-size:13px;color:#555;border-top:1px solid #f5f5f5;padding-top:12px}
.issue-body b{color:#333}
.replies-section{padding:0 20px 16px}
.reply-item{background:#f9fafb;border-radius:8px;padding:10px 14px;margin-bottom:8px;font-size:13px}
.reply-meta{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600}
.reply-form{display:flex;gap:8px;margin-top:8px}
.reply-form input{flex:1;padding:8px 12px;border:1.5px solid #e0e0e0;border-radius:6px;font-size:13px;outline:none}
.reply-form input:focus{border-color:var(--primary)}
.reply-form button{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.btn-reply{background:var(--primary);color:#fff}
.btn-close{background:#e8f5e9;color:#2e7d32}
.btn-open{background:#fce4ec;color:#c62828}
.status-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase}
.status-open{background:#fce4ec;color:#c62828}
.status-closed{background:#e8f5e9;color:#2e7d32}
.filter-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:6px 14px;border:1.5px solid #e0e0e0;border-radius:20px;background:#fff;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted)}
.filter-btn.active{border-color:var(--primary);background:var(--primary);color:#fff}


.city-tab-btn {
  display: inline-block;
  margin-right: 8px;
  padding: 7px 14px;
  border: 1.5px solid #e0e0e0;
  border-radius: 20px;
  background: #fff;
  color: #555;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .18s;
  white-space: nowrap;
}
.city-tab-btn.active, .city-tab-btn:hover {
  background: #1a237e;
  color: #fff;
  border-color: #1a237e;
}
</style>
</head>

// Count unique active channels for a BM
// CV BMs: use unique DCIDs (ch_check always 0 for CV)
// UC BMs: use ch_check > 0 as before
function isCVBM(emp, txns) {
  // A BM is CV if: product field says CV, OR cv_tgt>0 with no uc_tgt
  if (!emp || emp.designation !== 'BM') return false;
  if (emp.product && emp.product.toUpperCase().includes('CV')) return true;
  if (emp.product && emp.product.toUpperCase().includes('UC')) return false;
  // Fallback: check if most transactions are CV
  if (txns && txns.length > 0) {
    const cvCount = txns.filter(t=>t.product!=='Used Car').length;
    if (cvCount > txns.length * 0.7) return true;
  }
  // Final fallback: check targets
  return (!emp.uc_tgt || emp.uc_tgt===0 || emp.uc_tgt==='') && (emp.cv_tgt>0);
}

function countChannels(txns, emp) {
  if (!emp) return new Set(txns.filter(t=>t.ch_check>0&&t.dcid).map(t=>t.dcid)).size;
  if (isCVBM(emp, txns)) {
    // CV BM: count unique DCIDs from CV transactions (ch_check is always 0 for CV)
    return new Set(txns.filter(t=>t.product!=='Used Car'&&t.dcid).map(t=>t.dcid)).size;
  }
  // UC BM: count unique DCIDs where ch_check > 0
  return new Set(txns.filter(t=>t.ch_check>0&&t.dcid).map(t=>t.dcid)).size;
}

function getRemainingWorkingDays() {
  // Working days remaining in current month from today (excl. Sundays)
  const today = new Date();
  today.setHours(0,0,0,0);
  const monthEnd = new Date(today.getFullYear(), today.getMonth()+1, 0); // last day of month
  let count = 0;
  let d = new Date(today);
  while (d <= monthEnd) {
    if (d.getDay() !== 0) count++; // 0 = Sunday
    d.setDate(d.getDate() + 1);
  }
  return count;
}

function fmtCr(amt) {
  if (amt >= 1e7) return '₹' + (amt/1e7).toFixed(2) + ' Cr';
  if (amt >= 1e5) return '₹' + (amt/1e5).toFixed(2) + ' L';
  return '₹' + amt.toLocaleString();
}
function fmtL(amt) { return (amt/100000).toFixed(2) + ' L'; }
function pct(a,b) { return b>0 ? Math.min(Math.round(a/b*100),999) : 0; }
function tenureMonths(joining) {
  if (!joining || joining==='NaT') return 0;
  const d = new Date(joining);
  const now = new Date();
  return (now.getFullYear()-d.getFullYear())*12 + (now.getMonth()-d.getMonth());
}

// Tries to load fresh data from data.json (pushed by Google Sheets → Apps Script)
// Falls back to embedded data if unavailable (offline / first load before pipeline setup)
const DATA_JSON_URL = 'https://raw.githubusercontent.com/sachida8-1992/Performance-Dash-board/main/data.json';
let dataLoaded = false;
let lastUpdatedAt = '';

async function tryLoadLiveData() {
  try {
    const res = await fetch(DATA_JSON_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('Not found');
    const data = await res.json();
    if (!data.employees || !data.transactions) throw new Error('Invalid format');

    // Skip if data hasn't changed since last fetch
    if (data.updated_at === lastUpdatedAt && dataLoaded) {
      console.log('ℹ Data unchanged, skipping refresh');
      return;
    }
    lastUpdatedAt = data.updated_at;

    // Parse employees from Google Sheet format
    window._LIVE_EMP_RAW = data.employees; // store raw for milestone target columns
    window._LIVE_EMP = parseEmployees(data.employees);

    // Detect if transactions is slim format (has 'bm_id' key) or raw (has 'BM ID' key)
    const txnSample = (data.transactions||[])[0] || {};
    const isSlim = 'bm_id' in txnSample && !('BM ID' in txnSample);
    window._LIVE_TXN = isSlim ? data.transactions : parseTransactions(data.transactions || []);
    window._LIVE_MAY = (data.may_data && data.may_data.length) ? data.may_data : TXN_DATA;
    window._LIVE_BANK_TIERS = data.bank_tiers || {};
    window._LIVE_DATA = data; // store full data for commitment access
    window._LIVE_APR = data.apr_data ? parseTransactions(data.apr_data) : APR_DATA;
    window._LIVE_MAR = data.mar_data ? parseTransactions(data.mar_data) : MAR_DATA;
    loadHistoricalData(data); // store hist_YYYY_MM arrays for scorecard/monthly tabs
    dataLoaded = true;

    // Show last updated time on login screen
    if (data.updated_at) {
      const el = document.getElementById('dataUpdateTime');
      if (el) {
        const d = new Date(data.updated_at);
        el.textContent = ' Live data: ' + d.toLocaleString('en-IN', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
        el.style.display = 'block';
        el.style.color = '#43a047';
      }
    }

    // If user is already logged in, refresh data silently
    if (currentUser) {
      filterMyTxns();

      // Only rebuild the currently active page — don't touch others
      const activeBtn = document.querySelector('.nav-btn.active');
      let activePageId = 'overview';
      if (activeBtn) {
        const m = activeBtn.getAttribute('onclick').match(/'([^']+)'/);
        if (m) activePageId = m[1];
      }
      const activePage = document.getElementById('page-' + activePageId);
      if (activePage) {
        // Destroy charts for this page only
        if (activePageId === 'overview') {
          if (charts.productMix) { try { charts.productMix.destroy(); } catch(e){} delete charts.productMix; }
          if (charts.trend)      { try { charts.trend.destroy();      } catch(e){} delete charts.trend; }
        }
        if (activePageId === 'banks') {
          if (charts.banks) { try { charts.banks.destroy(); } catch(e){} delete charts.banks; }
        }
        activePage.innerHTML = '';
        buildPage(activePageId, activePage);
      }

      // Update live indicator in header
      const liveEl = document.getElementById('liveIndicator');
      if (liveEl && data.updated_at) {
        const d = new Date(data.updated_at);
        liveEl.textContent = ' ' + d.toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
        liveEl.style.display = 'inline-block';
      }
    }

    if (window._postLiveLoadHook) window._postLiveLoadHook();
    console.log(' Live data loaded:', data.updated_at,
      '| Emp:', window._LIVE_EMP.length,
      '| Jun txn:', window._LIVE_TXN.length,
      '| May txn:', window._LIVE_MAY.length);
  } catch(e) {
    console.log('ℹ Using embedded data:', e.message);
  }
}

// Parse employee rows from Google Sheet columns → dashboard format
function parseEmployees(rows) {
  function sid(v) {
    if (!v && v !== 0) return '';
    const s = String(v).split('.')[0].trim();
    return (s === '' || s === 'nan' || s === 'undefined') ? '' : s;
  }

  const parsed = rows.map(r => {
    // Col A: 'Employee Code' (new sheet) OR 'E Code' (old/fallback)
    const id = sid(r['Employee Code'] || r['E Code'] || '');

    // Col J: 'AM Employee Code' (new) | Col L: 'TH Employee Code' | Col N: 'RH Employee Code'
    const am_id = sid(r['AM Employee Code'] || r['AM Code'] || r['am_id'] || '');
    const th_id = sid(r['TH Employee Code'] || r['TH Code'] || r['th_id'] || '');
    const rh_id = sid(r['RH Employee Code'] || r['RH Code'] || r['rh_id'] || '');

    return {
      id,
      name:        String(r['Emp Name'] || '').trim(),
      designation: String(r['Designation'] || '').trim(),
      email:       String(r['Email ID'] || '').trim().toLowerCase(),
      password:    id,
      city:        String(r['City Name'] || '').trim(),
      tier:        String(r['Tier'] || '').trim(),
      joining:     String(r['Date of Joining'] || '').toString().slice(0,10),
      product:     String(r['Product'] || 'UC').trim(),
      uc_tgt:      parseFloat(r['UC TGT'] || 0) || 0,
      cv_tgt:      parseFloat(r['CV TGT'] || 0) || 0,
      ch_tgt:      parseFloat(r['Channel tgt'] || r['ch_tgt'] || 0) || 0,
      am_name:     String(r['AM Name'] || '').trim(),
      am_id,
      th_name:     String(r['TH Name'] || '').trim(),
      th_id,
      rh_name:     String(r['RH Name'] || '').trim(),
      rh_id,
    };
  }).filter(e => e.id && e.name);

  // Second pass: if am_id/th_id still missing, resolve from email in AM Name/TH Name columns
  // (current sheet stores emails in those columns — extract prefix and match to employee)
  const emailToId = {};
  const nameToId  = {};
  parsed.forEach(e => {
    if (e.email) emailToId[e.email] = e.id;
    if (e.name)  nameToId[e.name.toLowerCase()] = e.id;
  });

  parsed.forEach(e => {
    if (!e.am_id && e.am_name) {
      // am_name may be an email like 'jawed.ansari@rupyy.com' OR a real name
      e.am_id = emailToId[e.am_name.toLowerCase()]
             || nameToId[e.am_name.toLowerCase()]
             || '';
    }
    if (!e.th_id && e.th_name) {
      e.th_id = emailToId[e.th_name.toLowerCase()]
             || nameToId[e.th_name.toLowerCase()]
             || '';
    }
  });

  return parsed;
}

// Parse transaction rows from Google Sheet columns → dashboard format
function parseTransactions(rows) {
  // NAME_ALIASES is now global (defined near resolveEmpName)
  function safeId(v) {
    if (!v && v !== 0) return '';
    const s = String(v).split('.')[0].trim();
    return s === '' || s === 'nan' || s === 'undefined' ? '' : s;
  }
  function safeCh(v) {
    if (!v || v === '-' || v === '') return 0;
    const n = parseInt(v); return isNaN(n) ? 0 : n;
  }
  function safeAmt(r) {
    // Amount column has a dynamic numeric prefix e.g. '8997.62 gross_disbursed_amount'
    for (const k of Object.keys(r)) {
      if (k.includes('gross_disbursed_amount') || k === 'Disburse amt' || k === 'disburse_amt') {
        const n = parseFloat(r[k]); if (!isNaN(n) && n > 0) return n;
      }
    }
    return 0;
  }
  function safeDate(v) {
    if (!v) return '';
    const s = String(v);
    // ISO format from Google Sheets: '2026-06-01T18:30:00.000Z'
    if (s.includes('T')) return s.slice(0,10);
    // Excel serial number
    if (/^\d{5}$/.test(s.trim())) {
      const d = new Date(Math.round((parseFloat(s) - 25569) * 86400 * 1000));
      return d.toISOString().slice(0,10);
    }
    return s.slice(0,10);
  }

  return rows.map(r => {
    const bmRaw = String(r['BM_Name'] || r['BM Name'] || r['bm_name'] || '').trim().toLowerCase();
    const bm = NAME_ALIASES[bmRaw] || bmRaw;
    const dateStr = safeDate(r['disbursed_date'] || r['Disbursed Date'] || '');
    const dayNum = dateStr ? parseInt(dateStr.split('-')[2]) || 0 : 0;
    const amt = safeAmt(r);

    return {
      bm_id:    safeId(r['BM ID'] || r['BM_ID'] || r['bm_id'] || ''),
      am_id:    safeId(r['AM ID'] || r['AM_ID'] || r['am_id'] || ''),
      th_id:    safeId(r['TH ID'] || r['TH_ID'] || r['th_id'] || ''),
      rh_id:    safeId(r['RH ID'] || r['RH_ID'] || r['rh_id'] || ''),
      bm,
      am:       String(r['AM Name'] || r['am_name'] || '-').trim(),
      th:       String(r['TH Name'] || r['TH name'] || r['th_name'] || '-').trim(),
      rh:       String(r['RH Name'] || r['rh_name'] || '-').trim(),
      amt,
      product:  String(r['product_type'] || r['Product Type'] || '').trim(),
      loan_type:String(r['loan_type'] || r['Loan Type'] || '').trim(),
      bank:     String(r['disbursed_bank_name'] || r['Bank'] || '').trim(),
      dealer:   String(r['dealer_name'] || r['Dealer Name'] || '').trim(),
      dcid:     String(r['DCID'] || r['dcid'] || '').trim(),
      city:     String(r['Final City'] || r['final_city'] || r['city'] || '').trim(),
      state:    String(r['Filter State DSA'] || r['filter_state_dsa'] || '').trim(),
      ch_check: safeCh(r['Channel Check'] || r['channel_check'] || '0'),
      date:     dateStr,
      day:      dayNum,
    };
  }).filter(t => t.bm_id && t.amt > 0);
}

// ── Shared AM filter for RH view ─────────────────────────
let _activeAMFilter = '';  // '' = All AMs

window._activeBMFilter = '';

function setBMFilter(bmId, rebuildFn) {
  window._activeBMFilter = bmId;
  const el = document.querySelector('.page.active');
  if (el && window[rebuildFn]) {
    window[rebuildFn](el);
  } else if (window._mthRender && document.getElementById('mthBody')) {
    // Monthly Summary: update mthBody without full rebuild
    const cur = window._mthRole || 'BM';
    document.getElementById('mthBody').innerHTML = window._mthRender(cur);
  }
}

function getBMFilterBar(onChangeFn) {
  const role = currentUser.designation;
  if (role === 'BM') return '';
  const emps = getEmpData();
  let bmList = [];
  if (role === 'RH') bmList = emps.filter(e=>e.designation==='BM'&&e.rh_id===currentUser.id);
  if (role === 'AM') bmList = emps.filter(e=>e.designation==='BM'&&e.am_id===currentUser.id);
  if (role === 'TH') bmList = emps.filter(e=>e.designation==='BM'&&(e.th_id===currentUser.id||e.am_id===currentUser.id));
  if (_activeAMFilter) bmList = bmList.filter(e=>e.am_id===_activeAMFilter);
  if (!bmList.length) return '';

  const cur = window._activeBMFilter || '';
  const opts = bmList.map(bm =>
    '<option value="' + bm.id + '"' + (bm.id===cur?' selected':'') + '>'
    + bm.name + (bm.tier?' ('+bm.tier+')':'') + '</option>'
  ).join('');
  // Use data attributes to avoid quote-escaping issues in onclick/onchange
  const wrapperId = 'bmFilterWrap_' + onChangeFn;
  setTimeout(function() {
    const wrap = document.getElementById(wrapperId);
    if (!wrap) return;
    const sel = wrap.querySelector('select');
    const clr = wrap.querySelector('button');
    if (sel) {
      if (cur) sel.value = cur;
      sel.addEventListener('change', function() {
        setBMFilter(this.value, onChangeFn);
      });
    }
    if (clr) {
      clr.addEventListener('click', function() {
        setBMFilter('', onChangeFn);
      });
    }
  }, 30);

  return '<div id="' + wrapperId + '" style="display:flex;align-items:center;gap:10px;padding:10px 16px;background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:12px">'
    + '<span style="font-size:12px;font-weight:700;color:#1a237e">BM View:</span>'
    + '<select style="padding:5px 12px;border:1px solid #c5cae9;border-radius:8px;font-size:12px;color:#333;background:#f5f7ff;min-width:180px">'
    + '<option value="">All BMs</option>' + opts + '</select>'
    + (cur ? '<button style="padding:4px 10px;border:1px solid #e0e0e0;border-radius:6px;font-size:11px;background:#fff;cursor:pointer;color:#666">Clear</button>' : '')
    + '</div>';
}

function getAMFilterBar(onChangeFn) {

  const emps  = getEmpData();
  const amList= emps.filter(e => e.designation==='AM' &&

function setAMFilter(amId, rebuildFn) {
  _activeAMFilter = amId;
  window._activeBMFilter = ''; // reset BM filter when AM changes
  if (rebuildFn && window[rebuildFn]) {
    const el = document.querySelector('.page.active');
    if (el) window[rebuildFn](el);
  }
}

// Filter myTxns and emps by selected AM
function getAMFilteredTxns(txns) {
  if (!_activeAMFilter) return txns;
  return txns.filter(t => t.am_id === _activeAMFilter);
}

function getAMFilteredEmps(emps, designation) {
  if (!_activeAMFilter) return emps.filter(e => e.designation === designation);

function getSelectedAM() {

function buildAMSummaryCard() {
  if (!_activeAMFilter || currentUser.designation !== 'RH') return '';
  const am      = getEmpData().find(e=>e.id===_activeAMFilter);
  if (!am) return '';
  const curTxns = myTxns.filter(t=>t.am_id===am.id);
  const prvTxns = toLMTD((window._LIVE_MAY||[]).filter(t=>t.am_id===am.id));
  const curAmt  = curTxns.reduce((s,t)=>s+t.amt,0);
  const prvAmt  = prvTxns.reduce((s,t)=>s+t.amt,0);
  const curUC   = curTxns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
  const curCV   = curTxns.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);
  const curCh   = countChannels(curTxns, getEmpData().find(e=>e.id===_activeAMFilter));
  const diff    = curAmt - prvAmt;
  const gPct    = prvAmt>0 ? Math.round((diff/prvAmt)*100) : null;
  const up      = diff>=0;
  const bmList  = getEmpData().filter(e=>e.designation==='BM'&&e.am_id===am.id);
  const onTrack = bmList.filter(b=>{
    const t=myTxns.filter(x=>x.bm_id===b.id);
    const tgt=((b.uc_tgt||0)+(b.cv_tgt||0))*1e5;
    return tgt>0&&Math.round((t.reduce((s,x)=>s+x.amt,0)/tgt)*100)>=70;
  }).length;

  return '<div style="background:linear-gradient(135deg,#1a237e,#283593);border-radius:12px;padding:18px 22px;margin-bottom:16px;color:#fff">'
    +'<div style="font-size:10px;letter-spacing:1px;opacity:.6;text-transform:uppercase;margin-bottom:4px">AM Span Summary</div>'
    +'<div style="font-size:18px;font-weight:800;margin-bottom:12px">'+am.name+'</div>'
    +'<div style="display:flex;gap:10px;flex-wrap:wrap">'
    +'<div style="background:rgba(255,255,255,.12);border-radius:8px;padding:10px 14px;text-align:center;min-width:90px"><div style="font-size:9px;opacity:.7;margin-bottom:3px">MTD GMV</div><div style="font-size:15px;font-weight:800">'+fmtCr(curAmt)+'</div></div>'
    +'<div style="background:rgba(255,255,255,.12);border-radius:8px;padding:10px 14px;text-align:center;min-width:90px"><div style="font-size:9px;opacity:.7;margin-bottom:3px">UC</div><div style="font-size:15px;font-weight:800;color:#90caf9">'+fmtCr(curUC)+'</div></div>'
    +'<div style="background:rgba(255,255,255,.12);border-radius:8px;padding:10px 14px;text-align:center;min-width:90px"><div style="font-size:9px;opacity:.7;margin-bottom:3px">CV</div><div style="font-size:15px;font-weight:800;color:#ce93d8">'+fmtCr(curCV)+'</div></div>'
    +'<div style="background:rgba(255,255,255,.12);border-radius:8px;padding:10px 14px;text-align:center;min-width:90px"><div style="font-size:9px;opacity:.7;margin-bottom:3px">vs LMTD</div><div style="font-size:15px;font-weight:800;color:'+(up?'#a5d6a7':'#ef9a9a')+'">'+(up?'+':'')+fmtCr(diff)+(gPct!==null?' ('+(up?'+':'')+gPct+'%)':'')+'</div></div>'
    +'<div style="background:rgba(255,255,255,.12);border-radius:8px;padding:10px 14px;text-align:center;min-width:80px"><div style="font-size:9px;opacity:.7;margin-bottom:3px">BMs</div><div style="font-size:15px;font-weight:800">'+bmList.length+'</div></div>'
    +'<div style="background:rgba(255,255,255,.12);border-radius:8px;padding:10px 14px;text-align:center;min-width:80px"><div style="font-size:9px;opacity:.7;margin-bottom:3px">On Track</div><div style="font-size:15px;font-weight:800;color:#a5d6a7">'+onTrack+'/'+bmList.length+'</div></div>'
    +'<div style="background:rgba(255,255,255,.12);border-radius:8px;padding:10px 14px;text-align:center;min-width:80px"><div style="font-size:9px;opacity:.7;margin-bottom:3px">Channels</div><div style="font-size:15px;font-weight:800">'+curCh+'</div></div>'
    +'</div></div>';
}

function getTodayDay() { return new Date().getDate(); }
// Filter previous month data to same day range as current MTD (LMTD)
function toLMTD(prevTxns) {
  const d = getTodayDay();
  return prevTxns.filter(t => (t.day||0) > 0 && (t.day||0) <= d);
}
function getCurMonthLabel() {
  const d = new Date();
  return d.toLocaleString('en-IN', {month:'long', year:'numeric'});
}
function getPrevMonthLabel() {
  const d = new Date();
  d.setMonth(d.getMonth() - 1);
  return d.toLocaleString('en-IN', {month:'long', year:'numeric'});
}
function getCurMonthPrefix() {
  // Returns e.g. '2026-07'
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function getPrevMonthPrefix() {
  const d = new Date();
  d.setMonth(d.getMonth() - 1);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}

async function doLogin() {
  const name  = document.getElementById('loginName').value.trim().toLowerCase();
  const pass  = document.getElementById('loginPass').value.trim();
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';

  // Always authenticate against hardcoded EMP_DATA (live data has no passwords)
  const emp = EMP_DATA.find(e => e.email === name && String(e.password) === String(pass));
  if (!emp) {
    errEl.textContent = 'Invalid email or password';
    return;
  }

  // Login successful - show dashboard immediately
  currentUser = emp;
  filterMyTxns();
  initApp();

  // Load live data in background, refresh dashboard when done
  if (!dataLoaded) {
    tryLoadLiveData();
  }
}

async function manualRefresh() {
  const btn = document.getElementById('refreshBtn');
  if (btn) { btn.textContent = '⏳'; btn.disabled = true; }

  // Force re-fetch even if data hasn't changed
  lastUpdatedAt = '';
  await tryLoadLiveData();

  if (btn) {
    btn.textContent = '';
    btn.disabled = false;
    setTimeout(() => { btn.textContent = ''; }, 2000);
  }
}

function filterMyTxns() {
  const d = currentUser.designation;
  const id = currentUser.id;
  const juneTxns = getTxnData().filter(t => t.date && t.date.startsWith(getCurMonth()));
  if (d === 'BM') {
    myTxns = juneTxns.filter(t => t.bm_id === id);
  } else if (d === 'AM') {
    myTxns = juneTxns.filter(t => t.am_id === id);
  } else if (d === 'TH') {
    // Get all BM IDs under this TH (some txns have empty th_id)
    const thBmIds = new Set(getEmpData().filter(e => e.designation==='BM' && (e.th_id===id || e.am_id===id)).map(e=>e.id));
    myTxns = juneTxns.filter(t => t.th_id === id || thBmIds.has(t.bm_id));
  } else if (d === 'RH') {
    myTxns = juneTxns.filter(t => t.rh_id === id);
  }
}

// ========== INIT APP ==========
function initApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('topName').textContent = currentUser.name;
  document.getElementById('topRole').textContent = currentUser.designation + (currentUser.city ? ' · ' + currentUser.city : '');
  document.getElementById('topBadge').textContent = currentUser.designation;
  // Sync theme toggle button icon

  if (themeBtn) themeBtn.textContent = document.body.classList.contains('dark-theme') ? '' : '';

  const pages = buildPageList();

  nav.innerHTML = pages.map((p,i) => `<button class="nav-btn ${i===0?'active':''}" onclick="showPage('${p.id}',this)">${p.label}</button>`).join('');

  const main = document.getElementById('mainContent');

  showPage(pages[0].id, nav.children[0]);
}

function showPage(id, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const page = document.getElementById('page_' + id);
  if (page) {
    page.classList.add('active');
    if (!page.dataset.built) {
      page.dataset.built = '1';
      buildPage(id, page);
    }
  }
}

// ========== PAGE BUILDERS ==========
function buildPage(id, el) {
  try {
    switch(id) {
      case 'overview':  buildOverview(el); break;
      case 'channels':  buildChannels(el); break;
      case 'dealers':   buildDealers(el); break;
      case 'banks':     buildBanks(el); break;
      case 'incentive': buildIncentive(el); break;
      case 'team':      buildTeam(el); break;
      case 'insights':  buildInsights(el); break;
      case 'weekly':    buildWeekly(el); break;
      case 'payout':    buildPayout(el); break;
      case 'issues':    buildIssues(el); break;
      case 'deviation': buildDeviation(el); break;
      case 'hierarchy': buildHierarchy(el); break;
      case 'scorecard': buildScorecard(el); break;
      case 'monthly':   buildMonthlySummary(el); break;
      case 'channel6m':    buildChannel6M(el); break;
      case 'quarterly':    buildQuarterly(el); break;
      case 'channeldrive': buildChannelDrive(el); break;
      case 'channels_group': buildChannelsGroup(el); break;
      case 'mailroom':     buildMailroom(el); break;
    }
  } catch(err) {
    console.error('[buildPage:'+id+']', err);
    el.innerHTML = '<div style="padding:20px;color:#c62828;background:#fff3e0;border-radius:8px;margin:16px">'
      + '<b> Error loading ' + id + ' tab</b><br><br>'
      + '<code style="font-size:12px">' + err.message + '</code><br><br>'
      + '<pre style="font-size:10px;overflow:auto;max-height:200px;color:#555">' + err.stack + '</pre>'
      + '</div>';
  }
}

// ========== CHANNELS GROUP (sub-tabs) ==========
function buildChannelsGroup(el) {
  const subTabs = [
    { id: 'channeldrive', label: ' Channel Drive' },
    { id: 'channel6m',   label: ' Channel 6M' },
    { id: 'dealers',     label: ' Top Channels' },
  ];

  el.innerHTML = `
    <div style="background:#fff;border-bottom:2px solid #e8eaf6;padding:0 16px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none">
      ${subTabs.map((t,i) => `
        <button id="chsub_${t.id}" onclick="showChannelSubTab('${t.id}')"
          style="padding:11px 20px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:${i===0?'700':'500'};
          color:${i===0?'var(--primary)':'var(--muted)'};border-bottom:${i===0?'3px solid var(--primary)':'3px solid transparent'};
          white-space:nowrap;transition:all .2s">${t.label}</button>
      `).join('')}
    </div>
    <div id="chSubContent" style="min-height:400px"></div>
  `;

  showChannelSubTab('channeldrive');
}

function showChannelSubTab(id) {
  const subTabs = ['channeldrive','channel6m','dealers'];
  subTabs.forEach(t => {
    const btn = document.getElementById('chsub_'+t);
    if (btn) {
      const active = t === id;
      btn.style.fontWeight  = active ? '700' : '500';
      btn.style.color       = active ? 'var(--primary)' : 'var(--muted)';
      btn.style.borderBottom= active ? '3px solid var(--primary)' : '3px solid transparent';
    }
  });
  const content = document.getElementById('chSubContent');
  if (!content) return;

  // Cache built sub-tabs to avoid rebuilding
  if (!window._chSubBuilt) window._chSubBuilt = {};
  if (window._chSubBuilt[id]) {
    content.innerHTML = window._chSubBuilt[id];
    // Re-run dynamic builders that need live DOM
    if (id === 'channeldrive') { const tmp = document.createElement('div'); tmp.innerHTML = content.innerHTML; buildChannelDrive(content); }
    else if (id === 'channel6m')  buildChannel6M(content);
    else if (id === 'dealers')    buildDealers(content);
    return;
  }

  if (id === 'channeldrive') buildChannelDrive(content);
  else if (id === 'channel6m')  buildChannel6M(content);
  else if (id === 'dealers')    buildDealers(content);
}

// ========== OVERVIEW ==========
function buildOverview(el) {
  // Always refresh myTxns before building — ensures live data is used
  if (currentUser) filterMyTxns();
  const d = currentUser.designation;
  const totalAmt = myTxns.reduce((s,t) => s+t.amt, 0);
  const ucAmt = myTxns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
  const cvAmt = myTxns.filter(t=>t.product==='Used Commercial Vehicle').reduce((s,t)=>s+t.amt,0);
  const ncvAmt = myTxns.filter(t=>t.product==='New Commercial Vehicle').reduce((s,t)=>s+t.amt,0);
  const cases = myTxns.length;
  const avgTicket = cases > 0 ? totalAmt/cases : 0;

  // Targets (in lakhs → convert to rupees)
  const ucTgt = (currentUser.uc_tgt||0) * 1e5;
  const cvTgt = (currentUser.cv_tgt||0) * 1e5;
  const totalTgt = ucTgt + cvTgt;
  const pctAchv = pct(totalAmt, totalTgt);
  const chTgt = currentUser.ch_tgt || 0;

  // Channel count: max ch_check per BM (for BM view, or across BMs for higher roles)
  const chActive = getActiveChannels();

  // LMTD calculations (same days last month)
  const lmtdTxns = toLMTD((window._LIVE_MAY||[]).filter(t => {
    if (d==='BM') return t.bm_id===currentUser.id;
    if (d==='AM') return t.am_id===currentUser.id;
    if (d==='TH') return t.th_id===currentUser.id||t.am_id===currentUser.id;
    return t.rh_id===currentUser.id;
  }));
  const lmtdAmt   = lmtdTxns.reduce((s,t)=>s+t.amt,0);
  const lmtdUC    = lmtdTxns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
  const lmtdCV    = lmtdTxns.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);
  const lmtdCases = lmtdTxns.length;
  const lmtdCh    = countChannels(lmtdTxns, resolveEmpById(currentUser.id));
  const todayDay  = new Date().getDate();

  function growthTag(cur, prev) {
    if (!prev) return '';
    const diff = cur - prev;
    const pctG = Math.round((diff/prev)*100);
    const up   = diff >= 0;
    const col  = up ? '#2e7d32' : '#c62828';
    const bg   = up ? '#e8f5e9' : '#ffebee';
    const sign = up ? '+' : '';

        <div class="kpi-sub" style="margin-top:6px;border-top:1px solid #f0f0f0;padding-top:5px">

// ── Build FTD Case-wise table for AM/TH/BM ────────────────
function buildFTDCaseTable() {
  const el = document.getElementById('ftdCaseTableBody');
  if (!el) return;

  const d       = currentUser.designation;
  const uid     = currentUser.id;
  const todayStr= new Date().toISOString().slice(0,10);
  const emps    = getEmpData();

  // Get date filter — default to today
  const dateSel    = document.getElementById('ftdDateFilter');
  const selectedDate = dateSel ? dateSel.value : todayStr;
  const isToday    = selectedDate === todayStr;

  // Update card title
  const titleEl = document.getElementById('ftdCardTitle');
  if (titleEl) {
    const dt = new Date(selectedDate + 'T00:00:00');
    const dtLabel = dt.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
    titleEl.textContent = (isToday ? ' Today' : ' ') + ' Disbursement Cases — ' + dtLabel;
  }

  // Get filter values
  const amSel    = document.getElementById('ftdAMFilter');
  const bmSel    = document.getElementById('ftdBMFilter');
  const amFilter = amSel ? amSel.value : 'all';
  const bmFilter = bmSel ? bmSel.value : 'all';

  // Scope transactions to selected date
  let todayTxns = myTxns.filter(t => t.date && t.date.slice(0,10) === selectedDate);

  // Apply role scoping
  if (d === 'BM') {
    todayTxns = todayTxns.filter(t => t.bm_id === uid);
  } else if (d === 'AM') {
    todayTxns = todayTxns.filter(t => t.am_id === uid);
    if (amFilter !== 'all') todayTxns = todayTxns.filter(t => t.bm_id === amFilter);
  } else if (d === 'TH') {
    const thBmIds = new Set(emps.filter(e=>e.designation==='BM'&&(e.th_id===uid||e.am_id===uid)).map(e=>e.id));
    todayTxns = todayTxns.filter(t => t.th_id===uid || thBmIds.has(t.bm_id));
    if (amFilter !== 'all') {
      const amId = amFilter.replace('am_','');
      const amBmIds = new Set(emps.filter(e=>e.designation==='BM'&&e.am_id===amId).map(e=>e.id));
      todayTxns = todayTxns.filter(t => t.am_id===amId || amBmIds.has(t.bm_id));
    }
    if (bmFilter !== 'all') todayTxns = todayTxns.filter(t => t.bm_id === bmFilter);
  }

  const selectedDt  = new Date(selectedDate + 'T00:00:00');
  const todayDate   = selectedDt.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});
  const totalAmt    = todayTxns.reduce((s,t)=>s+t.amt,0);
  const ucAmt     = todayTxns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
  const cvAmt     = todayTxns.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);

  function fmtL(n) {
    if (!n) return '₹0';
    if (n>=1e7) return '₹'+(n/1e7).toFixed(2)+' Cr';
    if (n>=1e5) return '₹'+(n/1e5).toFixed(2)+' L';
    return '₹'+Math.round(n).toLocaleString('en-IN');
  }

  if (!todayTxns.length) {

      <div style="text-align:center;padding:32px 16px;color:#9e9e9e">

        <div style="font-size:20px;font-weight:900;color:#1565c0;margin-top:2px">${fmtL(totalAmt)}</div>
        <div style="font-size:11px;color:#546e7a;margin-top:2px">${todayTxns.length} cases</div>
      </div>
      <div style="background:#f3e5f5;border-radius:10px;padding:12px 14px;text-align:center">
        <div style="font-size:10px;color:#6a1b9a;font-weight:700;text-transform:uppercase;letter-spacing:.5px">UC FTD</div>
        <div style="font-size:20px;font-weight:900;color:#6a1b9a;margin-top:2px">${fmtL(ucAmt)}</div>
        <div style="font-size:11px;color:#546e7a;margin-top:2px">${todayTxns.filter(t=>t.product==='Used Car').length} cases</div>
      </div>
      <div style="background:#e8f5e9;border-radius:10px;padding:12px 14px;text-align:center">
        <div style="font-size:10px;color:#2e7d32;font-weight:700;text-transform:uppercase;letter-spacing:.5px">CV FTD</div>
        <div style="font-size:20px;font-weight:900;color:#2e7d32;margin-top:2px">${fmtL(cvAmt)}</div>
        <div style="font-size:11px;color:#546e7a;margin-top:2px">${todayTxns.filter(t=>t.product!=='Used Car').length} cases</div>
      </div>
    </div>`;

  // Case table
  const rows = todayTxns.map((t,i) => {
    const isUC   = t.product === 'Used Car';
    const bmName = t.bm || emps.find(e=>e.id===t.bm_id)?.name || t.bm_id;
    const amEmp  = emps.find(e=>e.id===t.am_id);
    const prodClr= isUC ? '#1565c0' : '#6a1b9a';
    const prodBg = isUC ? '#e3f2fd' : '#f3e5f5';
    const prodLbl= isUC ? 'UC' : t.product === 'Used Commercial Vehicle' ? 'UCV' : 'NCV';
    return `<tr style="background:${i%2===0?'#fff':'#f8f9ff'};border-bottom:1px solid #f0f0f0">
      <td style="padding:8px 10px;text-align:center;color:#9e9e9e;font-size:11px">${i+1}</td>
      <td style="padding:8px 10px">
        <div style="font-weight:700;font-size:12px;color:#1a237e">${t.dealer || '—'}</div>
        <div style="font-size:10px;color:#9e9e9e">${t.dcid || ''}</div>
      </td>
      ${d !== 'BM' ? `<td style="padding:8px 10px;font-size:11px;color:#455a64">
        <div style="font-weight:600">${bmName}</div>
        ${amEmp && d === 'TH' ? '<div style="font-size:10px;color:#9e9e9e">'+amEmp.name+'</div>' : ''}
      </td>` : ''}
      <td style="padding:8px 10px;text-align:center">
        <span style="background:${prodBg};color:${prodClr};font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px">${prodLbl}</span>
      </td>
      <td style="padding:8px 10px;font-size:11px;color:#546e7a">${t.loan_type || '—'}</td>
      <td style="padding:8px 10px;font-size:11px;color:#546e7a">${t.bank || '—'}</td>

      <td style="padding:8px 10px;text-align:right;font-weight:700;font-size:13px;color:#1565c0">${fmtL(t.amt)}</td>

  const colCount = d === 'BM' ? 6 : 7;
  el.innerHTML = summary + `
