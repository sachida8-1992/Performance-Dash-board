function buildWeeklyAM(ms, periodTxns) {
  // Group transactions by AM ID
  const amMap = {};
  periodTxns.forEach(t => {
    const amKey = (t.am_id && t.am_id !== '' && t.am_id !== '0') ? t.am_id : '__direct__';
    if (!amMap[amKey]) amMap[amKey] = { txns: [], bmIds: new Set() };
    amMap[amKey].txns.push(t);
    amMap[amKey].bmIds.add(t.bm_id);
  });

  const amRows = Object.entries(amMap).sort((a,b) =>
    b[1].txns.reduce((s,t)=>s+t.amt,0) - a[1].txns.reduce((s,t)=>s+t.amt,0)
  );

  const teamUC  = periodTxns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
  const teamCV  = periodTxns.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);

  return `
    <div style="background:linear-gradient(135deg,#283593,#1a237e);color:#fff;border-radius:14px;padding:20px;margin-bottom:16px">
      <div style="font-size:12px;opacity:.7;font-weight:600;text-transform:uppercase">AM-wise Achievement till ${ms.label}</div>
      <div style="font-size:36px;font-weight:800;margin:6px 0">${fmtCr(teamUC+teamCV)}</div>
      <div style="font-size:12px;opacity:.8">UC: ${fmtCr(teamUC)} &nbsp;|&nbsp; CV: ${fmtCr(teamCV)} &nbsp;|&nbsp; ${periodTxns.length} cases</div>
    </div>

    ${amRows.map(([amId, {txns, bmIds}]) => {
      const amEmp = amId !== '__direct__' ? getEmpData().find(e=>e.id===amId) : null;
      const amName = amEmp ? amEmp.name : amId === '__direct__' ? 'Direct to TH/RH' : `AM ${amId}`;
      const amUC = txns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
      const amCV = txns.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);
      const amTot= amUC+amCV;
      const cardId = 'am_weekly_' + amId.replace(/\W/g,'_');

      // BM breakdown under this AM
      const bmMap2 = {};
      txns.forEach(t => {
        if (!bmMap2[t.bm_id]) bmMap2[t.bm_id] = [];
        bmMap2[t.bm_id].push(t);
      });
      const bmRows2 = Object.entries(bmMap2).sort((a,b)=>
        b[1].reduce((s,t)=>s+t.amt,0) - a[1].reduce((s,t)=>s+t.amt,0)
      );

      return `
        <div style="background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:14px;overflow:hidden;border-left:4px solid #283593">
          <div onclick="toggleSection('${cardId}')" style="padding:16px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between">
            <div>
              <div style="font-size:15px;font-weight:700;color:#1a237e">${amName}
                <span class="badge badge-blue" style="margin-left:8px">AM</span>
              </div>
              <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:6px;font-size:12px;color:#555">
                <span>Total: <b>${fmtCr(amTot)}</b></span>
                <span>UC: <b>${fmtCr(amUC)}</b></span>
                <span>CV: <b>${fmtCr(amCV)}</b></span>
                <span>Cases: <b>${txns.length}</b></span>
                <span>BMs: <b>${bmIds.size}</b></span>
              </div>
            </div>
            <div style="font-size:20px;color:#9e9e9e" id="arr_${cardId}">&#9660;</div>
          </div>
          <div id="${cardId}" style="display:none;padding:0 20px 16px;overflow-x:auto">
            <table>
              <thead><tr>
                <th>#</th><th>BM Name</th><th>Tier</th>
                <th>UC Tgt</th><th>UC Ach</th><th>UC%</th>
                <th>CV Tgt</th><th>CV Ach</th><th>CV%</th>
                <th>Ch Tgt</th><th>Ch</th><th>Ch%</th>
                <th>Total</th><th>Overall%</th>
              </tr></thead>
              <tbody>
                ${bmRows2.map(([ bid, bTxns], i) => {
                  const bEmp = resolveEmpById(bid) || resolveEmpName(bTxns[0].bm);
                  const tgts = getMilestoneEmpTargets(bEmp, ms);
                  const bUC  = bTxns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
                  const bCV  = bTxns.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);
                  const bTot = bUC+bCV;
                  const bTotT= tgts.uc+tgts.cv;
                  const bCh  = new Set(bTxns.filter(t=>t.ch_check>0&&t.dcid).map(t=>t.dcid)).size;
                  const ucAch= tgts.uc>0?Math.round((bUC/tgts.uc)*100):0;
                  const cvAch= tgts.cv>0?Math.round((bCV/tgts.cv)*100):0;
                  const totAch=bTotT>0?Math.round((bTot/bTotT)*100):0;
                  const chAch= tgts.ch>0?Math.round((bCh/tgts.ch)*100):0;
                  const name = bEmp ? bEmp.name : bTxns[0].bm;
                  return `<tr>
                    <td style="color:#9e9e9e">${i+1}</td>
                    <td><b style="font-size:12px">${name}</b></td>
                    <td><span class="badge badge-grey" style="font-size:10px">${bEmp?.tier||'—'}</span></td>
                    <td style="font-size:11px;color:#555">${fmtCr(tgts.uc)}</td>
                    <td style="font-size:11px"><b>${fmtCr(bUC)}</b></td>
                    <td>${tgts.uc>0?weeklyBadge(ucAch):'—'}</td>
                    <td style="font-size:11px;color:#555">${fmtCr(tgts.cv)}</td>
                    <td style="font-size:11px"><b>${fmtCr(bCV)}</b></td>
                    <td>${tgts.cv>0?weeklyBadge(cvAch):'—'}</td>
                    <td style="font-size:11px;color:#555">${tgts.ch||'—'}</td>
                    <td style="font-size:11px"><b>${bCh}</b></td>
                    <td>${tgts.ch>0?weeklyBadge(chAch):'—'}</td>
                    <td><b>${fmtCr(bTot)}</b></td>
                    <td>${bTotT>0?weeklyBadge(totAch):'<span class="badge badge-grey">No Tgt</span>'}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>`;
    }).join('')}
  `;
}

function buildDeviation(el) {
  const processes = ['All','Channel','Disbursement','FI/GCD','Payment Control Desk','Payment','Payments'];

  el.innerHTML = `
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:16px 20px;background:#1a237e;color:#fff">
        <div style="font-size:16px;font-weight:800;margin-bottom:4px"> Process Deviation Matrix</div>
        <div style="font-size:12px;opacity:.7">Approval authority reference · ${DEVIATION_DATA.length} deviations across 6 processes</div>
      </div>
      <div style="padding:14px 20px;background:#f5f7ff;display:flex;gap:10px;flex-wrap:wrap;align-items:center;border-bottom:1px solid #e8eaf6">
        <input type="text" id="devSearch" placeholder=" Search deviation or authority..."
          oninput="renderDeviation()"
          style="flex:1;min-width:180px;padding:8px 12px;border:1.5px solid #e0e0e0;border-radius:20px;font-size:13px;outline:none">
        <div style="display:flex;gap:4px;flex-wrap:wrap" id="devFilterBar">
          ${processes.map((p,i) => '<button class="city-tab-btn ' + (i===0?'active':'') + '" data-proc="' + p + '" onclick="document.getElementById(\'devFilterBar\').querySelectorAll(\'.city-tab-btn\').forEach(b=>b.classList.remove(\'active\'));this.classList.add(\'active\');renderDeviation()">' + p + '</button>').join('')}
        </div>
      </div>
      <div style="font-size:11px;color:#9e9e9e;padding:8px 20px" id="devCount"></div>
      <div style="overflow-x:auto">
        <table id="devTable">
          <thead><tr>
            <th style="width:44px">#</th>
            <th style="min-width:110px">Process</th>
            <th style="min-width:280px">Deviation</th>
            <th style="min-width:200px">Approval Authority</th>
          </tr></thead>
          <tbody id="devBody"></tbody>
        </table>
      </div>
    </div>
  `;

  window.renderDeviation = function() {
    const search = (document.getElementById('devSearch')?.value || '').toLowerCase();
    const activeBtn = document.querySelector('#devFilterBar .city-tab-btn.active');
    const proc = activeBtn ? activeBtn.dataset.proc : 'All';

    const filtered = DEVIATION_DATA.filter(r => {
      const matchProc = proc === 'All' || r.process === proc;
      const matchSearch = !search ||
        r.deviation.toLowerCase().includes(search) ||
        r.authority.toLowerCase().includes(search) ||
        r.process.toLowerCase().includes(search);
      return matchProc && matchSearch;
    });

    function authStyle(a) {
      const al = a.toLowerCase();
      if (al.includes('ceo'))         return 'background:#fce4ec;color:#c62828';
      if (al.includes('bh'))          return 'background:#fff3e0;color:#e65100';
      if (al.includes('zh'))          return 'background:#e8eaf6;color:#1a237e';
      if (al.includes('rh'))          return 'background:#e0f2f1;color:#004d40';
      if (al.includes('product'))     return 'background:#f3e5f5;color:#6a1b9a';
      if (al.includes('ops'))         return 'background:#e3f2fd;color:#0d47a1';
      if (al.includes('no approval')) return 'background:#e8f5e9;color:#2e7d32';
      if (al.includes('rto'))         return 'background:#fff8e1;color:#f57f17';
      return 'background:#f5f5f5;color:#555';
    }

    function procChip(p) {
      const map = {'Channel':'#e3f2fd:#1565c0','Disbursement':'#fff3e0:#e65100','FI/GCD':'#f3e5f5:#6a1b9a','Payment Control Desk':'#e8eaf6:#283593','Payment':'#e0f7fa:#006064','Payments':'#e0f7fa:#00838f'};
      const [bg,col] = (map[p]||'#f5f5f5:#555').split(':');
      return '<span style="background:' + bg + ';color:' + col + ';padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap">' + p + '</span>';
    }

    const tbody = document.getElementById('devBody');
    const countEl = document.getElementById('devCount');
    if (countEl) countEl.textContent = 'Showing ' + filtered.length + ' of ' + DEVIATION_DATA.length + ' deviations';
    if (!tbody) return;

    if (!filtered.length) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:32px;color:#9e9e9e">No matching deviations found</td></tr>';
      return;
    }

    tbody.innerHTML = filtered.map(r =>
      '<tr>' +
      '<td style="color:#9e9e9e;font-size:11px">' + r.sno + '</td>' +
      '<td>' + procChip(r.process) + '</td>' +
      '<td style="font-size:12px;line-height:1.5">' + r.deviation + '</td>' +
      '<td><div style="' + authStyle(r.authority) + ';padding:6px 10px;border-radius:8px;font-size:11px;font-weight:600;line-height:1.5">' + r.authority + '</div></td>' +
      '</tr>'
    ).join('');
  };

  window.renderDeviation();
}

async function buildPayout(el) {
  const role = currentUser.designation;
  const uid  = currentUser.id;
  const emps = getEmpData();

  // Show loading state
  el.innerHTML = '<div style="padding:40px;text-align:center;color:#1a237e">'
    + '<div style="font-size:24px;margin-bottom:12px">⏳</div>'
    + '<div style="font-size:14px;font-weight:600">Loading Payout Data...</div>'
    + '<div style="font-size:12px;color:#9e9e9e;margin-top:6px">Fetching from GitHub</div>'
    + '</div>';

  const data = await loadPayoutData();
  if (!data) {
    el.innerHTML = '<div style="padding:40px;text-align:center;color:#c62828">'
      + '<div style="font-size:24px;margin-bottom:12px">⚠️</div>'
      + '<div style="font-size:14px;font-weight:600">Failed to load payout data</div>'
      + '<div style="font-size:12px;color:#9e9e9e;margin-top:6px">Check internet connection and try again</div>'
      + '<button onclick="delete el.dataset.built; buildPayout(el)" style="margin-top:16px;padding:8px 16px;background:#1a237e;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px">Retry</button>'
      + '</div>';
    return;
  }

  // ── Scope channels to user role ──
  function scopeChannels(chs) {
    if (role==='RH') return chs.filter(c=>c.rh_id===uid);
    if (role==='TH') {
      const thBmIds = new Set(emps.filter(e=>e.designation==='BM'&&(e.th_id===uid||e.am_id===uid)).map(e=>e.id));
      return chs.filter(c=>c.th_id===uid||thBmIds.has(c.bm_id));
    }
    if (role==='AM') return chs.filter(c=>c.am_id===uid);
    if (role==='BM') return chs.filter(c=>c.bm_id===uid);
    return chs;
  }

  // ── Scope cases to user role ──
  function scopeCases(cases) {
    if (role==='RH') return cases.filter(c=>c.rh_id===uid);
    if (role==='TH') {
      const thBmIds = new Set(emps.filter(e=>e.designation==='BM'&&(e.th_id===uid||e.am_id===uid)).map(e=>e.id));
      return cases.filter(c=>c.th_id===uid||thBmIds.has(c.bm_id));
    }
    if (role==='AM') return cases.filter(c=>c.am_id===uid);
    if (role==='BM') return cases.filter(c=>c.bm_id===uid);
    return cases;
  }

  let activeChs  = scopeChannels(getPAYOUT_CHANNELS());
  let activeCases= scopeCases(getPAYOUT_CASES());

  // ── Filter state ──
  let _state='', _am='', _bm='', _prod='all', _search='', _expanded=null;

  function fmtL(n) {
    if (!n) return '—';
    if (n>=1e7) return '₹'+(n/1e7).toFixed(2)+' Cr';
    if (n>=1e5) return '₹'+(n/1e5).toFixed(2)+' L';
    return '₹'+Math.round(n).toLocaleString('en-IN');
  }

  function render() {
    let chs = activeChs;
    let cases = activeCases;

    // Apply filters
    if (_state) { chs=chs.filter(c=>c.state===_state); cases=cases.filter(c=>c.state===_state); }
    if (_am)    { chs=chs.filter(c=>c.am_id===_am);    cases=cases.filter(c=>c.am_id===_am); }
    if (_bm)    { chs=chs.filter(c=>c.bm_id===_bm);    cases=cases.filter(c=>c.bm_id===_bm); }
    if (_prod!=='all') { chs=chs.filter(c=>_prod==='UC'?c.uc_cases>0:c.cv_cases>0); cases=cases.filter(c=>c.product_type===_prod); }
    if (_search) {
      const q=_search.toLowerCase();
      chs=chs.filter(c=>c.channel_name.toLowerCase().includes(q)||c.dcid.toLowerCase().includes(q));
    }

    // Summary KPIs
    const totUCGMV  = chs.reduce((s,c)=>s+c.uc_gmv,0);
    const totCVGMV  = chs.reduce((s,c)=>s+c.cv_gmv,0);
    const totUCPay  = chs.reduce((s,c)=>s+c.uc_final_payout,0);
    const totCVPay  = chs.reduce((s,c)=>s+c.cv_final_payout,0);
    const totHold   = chs.reduce((s,c)=>s+c.total_hold,0);
    const totCases  = chs.reduce((s,c)=>s+c.uc_cases+c.cv_cases,0);
    const holdChs   = chs.filter(c=>c.total_hold>0).length;

    // Filters UI
    const states  = [...new Set(activeChs.map(c=>c.state).filter(Boolean))].sort();
    const ams     = role==='RH'||role==='TH' ? emps.filter(e=>e.designation==='AM'&&(role==='RH'?e.rh_id===uid:e.th_id===uid||e.am_id===uid)) : [];
    const bms     = role!=='BM' ? emps.filter(e=>e.designation==='BM'&&(_am?e.am_id===_am:(role==='AM'?e.am_id===uid:role==='TH'?(e.th_id===uid||e.am_id===uid):e.rh_id===uid))) : [];

    return `
      <!-- Filters -->
      <div style="background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:14px 16px;margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <div style="font-weight:700;color:#1a237e;font-size:13px">Filters:</div>
        ${role==='RH'||role==='TH'?`<select onchange="window._payoutAM=this.value;window._payoutBM='';window._payoutRender()" style="padding:5px 10px;border:1px solid #c5cae9;border-radius:8px;font-size:12px;background:#f5f7ff">
          <option value="">All AMs</option>${ams.map(a=>`<option value="${a.id}" ${_am===a.id?'selected':''}>${a.name}</option>`).join('')}
        </select>`:''}
        ${role!=='BM'?`<select onchange="window._payoutBM=this.value;window._payoutRender()" style="padding:5px 10px;border:1px solid #c5cae9;border-radius:8px;font-size:12px;background:#f5f7ff">

async function submitIssue() {
  const channel = document.getElementById('iss_channel').value.trim();
  const dcid    = document.getElementById('iss_dcid').value.trim();
  const gst     = document.getElementById('iss_gst').value;
  const month   = document.getElementById('iss_month').value;
  const product = document.getElementById('iss_product').value;
  const remarks = document.getElementById('iss_remarks').value.trim();
  const msg     = document.getElementById('issueMsg');

  if (!channel || !dcid || !gst || !month || !product || !remarks) {
    msg.style.color = '#e53935';
    msg.textContent = ' Please fill all fields.';
    return;
  }

  const btn = document.getElementById('issueSubmitBtn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';
  msg.textContent = '';

  try {
    const res = await apiPost({
      action: 'postIssue',
      bm: currentUser.name,
      channel, dcid, gst, month, product, remarks
    });

    if (res.success) {
      ['iss_channel','iss_dcid','iss_remarks'].forEach(id => document.getElementById(id).value = '');
      ['iss_gst','iss_month','iss_product'].forEach(id => document.getElementById(id).value = '');
      msg.style.color = '#43a047';
      msg.textContent = ' Issue ' + res.id + ' submitted! Your AM/TH/RH will respond soon.';
      await loadIssues();
    } else {
      msg.style.color = '#e53935';
      msg.textContent = ' Error: ' + (res.error || 'Unknown error');
    }
  } catch(e) {
    msg.style.color = '#e53935';
    msg.textContent = ' Network error. Check your internet connection.';
  }

  btn.disabled = false;
  btn.textContent = 'Submit Issue';
}

async function loadIssues() {
  if (issuesLoading) return;
  issuesLoading = true;
  try {
    const data = await apiGet('getIssues');
    issuesCache = data.issues || [];
    const activeFilter = document.querySelector('.filter-btn.active');
    renderIssues(activeFilter ? activeFilter.textContent.trim().toLowerCase().replace('(!) ','').replace(' ','') : 'all');
  } catch(e) {
    const c = document.getElementById('issuesList');
    if (c) c.innerHTML = `<div style="text-align:center;padding:32px;color:#e53935">
       Could not load issues. Check the Apps Script URL in the dashboard.<br>
      <small style="color:#9e9e9e">Make sure the URL is set and the web app is deployed as "Anyone can access".</small>
    </div>`;
  }
  issuesLoading = false;
}

function filterIssues(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));

}

function getMyBMNames() {
  // Returns a Set of BM names (lowercase) that report under the current user
  const d = currentUser.designation;
  const id = currentUser.id;
  const bmNames = new Set();
  if (d === 'BM') {
    bmNames.add(currentUser.name.toLowerCase());
    return bmNames;
  }
  // For AM/TH/RH: get BM names from myTxns (already filtered to this user's hierarchy)
  myTxns.forEach(t => {
    if (t.bm) bmNames.add(t.bm.toLowerCase());
  });
  // Also add proper-case names from EMP_DATA for matching
  myTxns.forEach(t => {
    const emp = resolveEmpById(t.bm_id);
    if (emp) bmNames.add(emp.name.toLowerCase());
  });
  return bmNames;
}

  let visible = issuesCache.filter(i => {
    const bmName = (i.bm || '').toLowerCase();
    return myBMs.has(bmName);

  if (filter === 'closed') visible = visible.filter(i => i.status === 'closed');

function downloadIssuesExcel() {
  const myBMs = getMyBMNames();
  const data = issuesCache.filter(i => myBMs.has((i.bm||'').toLowerCase()));

  if (!data.length) {
    alert('No issues to download.');
    return;
  }

  // Build CSV content
  const headers = ['Issue ID','BM Name','Channel/Dealer','DCID','GST','Month','Product','Remarks','Status','Raised On','Replies'];
  const rows = data.map(i => {
    const replies = (i.replies||[]).map(r => `[${r.role}] ${r.by}: ${r.text} (${r.at})`).join(' | ');
    return [
      i.id || '',
      i.bm || '',
      i.channel || '',
      i.dcid || '',
      i.gst || '',
      i.month || '',
      i.product || '',
      (i.remarks || '').replace(/,/g, ';').replace(/\n/g, ' '),
      i.status || '',
      i.createdAt || '',
      replies.replace(/,/g, ';')
    ];
  });

  const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type: 'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Rupyy_Issues_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

async function postReply(issueId) {
  const input = document.getElementById('replyInput_' + issueId);
  if (!input || !input.value.trim()) return;
  const text = input.value.trim();
  input.disabled = true;

  try {
    await apiPost({
      action: 'postReply',
      issueId,
      by: currentUser.name,
      role: currentUser.designation,
      text
    });
    input.value = '';
    await loadIssues();
  } catch(e) {
    alert('Could not post reply. Check internet connection.');
  }
  input.disabled = false;
}

async function toggleStatus(issueId, newStatus) {
  try {
    await apiPost({ action: 'updateStatus', issueId, status: newStatus });
    await loadIssues();
  } catch(e) {
    alert('Could not update status.');
  }
}



</script>
<script>

// ========== HIERARCHY VIEW (TH & RH) ==========

// Helper: compute stats for a set of transactions + emp target
function computeStats(txns, emp) {
  const amt   = txns.reduce((s,t) => s+t.amt, 0);
  const ucAmt = txns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
  const cvAmt = txns.filter(t=>t.product==='Used Commercial Vehicle').reduce((s,t)=>s+t.amt,0);
  const ncvAmt= txns.filter(t=>t.product==='New Commercial Vehicle').reduce((s,t)=>s+t.amt,0);
  const ucTgt = emp ? (emp.uc_tgt||0)*1e5 : 0;
  const cvTgt = emp ? (emp.cv_tgt||0)*1e5 : 0;
  const tgt   = ucTgt + cvTgt;
  const ach   = tgt > 0 ? pct(amt,tgt) : 0;
  const cases = txns.length;
  const ch    = (() => {
    const bmCh = {};
    txns.forEach(t => { if (!bmCh[t.bm]||t.ch_check>bmCh[t.bm]) bmCh[t.bm]=t.ch_check; });
    return Object.values(bmCh).reduce((s,v)=>s+v,0);
  })();
  return { amt, ucAmt, cvAmt:cvAmt+ncvAmt, tgt, ach, cases, ch };
}

function achBadge(p) {
  const cls = p>=100?'badge-green':p>=70?'badge-blue':p>=50?'badge-orange':'badge-red';
  return `<span class="badge ${cls}">${p}%</span>`;
}

function statRow(label, val, tgt, ach) {
  const bar = tgt>0 ? `<div class="progress-wrap" style="width:80px;display:inline-block;vertical-align:middle;margin-left:6px"><div class="progress-bar ${ach>=100?'bar-green':ach>=70?'bar-green':'bar-orange'}" style="width:${Math.min(ach,100)}%"></div></div>` : '';
  return `<span style="color:#666;font-size:12px">${label}:</span> <b>${fmtCr(val)}</b>${tgt>0?` / ${fmtCr(tgt)} ${achBadge(ach)}${bar}`:''}`;
}

// ─────────────────────────────────────────────
// MAIN BUILD FUNCTION
// ─────────────────────────────────────────────
function buildHierarchy(el) {
  const d = currentUser.designation;

  if (d === 'TH') {
    buildTHHierarchy(el);
  } else if (d === 'RH') {
    buildRHHierarchy(el);
  }
}

// ─────────────────────────────────────────────
// TH VIEW: AM-wise → click → BM-wise inside AM
// ─────────────────────────────────────────────
// ── Shared: build flat BM table with TH/AM filter dropdowns ──
function buildFlatHierarchy(el, scopeTxns, role) {
  const emps     = getEmpData();
  const todayStr = new Date().toISOString().slice(0,10);
  const prevData = window._LIVE_MAY || [];

  const thList = emps.filter(e => e.designation==='TH' &&
    (role==='RH' ? e.rh_id===currentUser.id : e.th_id===currentUser.id));
  const amList = emps.filter(e => e.designation==='AM' &&
    (role==='RH' ? e.rh_id===currentUser.id : e.th_id===currentUser.id));
  const allBMs = emps.filter(e => e.designation==='BM' &&
    (role==='RH' ? e.rh_id===currentUser.id :
     role==='TH' ? (e.th_id===currentUser.id||e.am_id===currentUser.id) :
     e.th_id===currentUser.id));

  function renderTable(filterTH, filterAM) {
    let bms = allBMs;
    if (filterTH) bms = bms.filter(e=>e.th_id===filterTH);
    if (filterAM) bms = bms.filter(e=>e.am_id===filterAM);

    // Build txn maps
    const bmMap  = {}, prevMap = {};
    scopeTxns.forEach(t => { if (!bmMap[t.bm_id]) bmMap[t.bm_id]=[]; bmMap[t.bm_id].push(t); });
    prevData.forEach(t  => { if (!prevMap[t.bm_id]) prevMap[t.bm_id]=[]; prevMap[t.bm_id].push(t); });
    bms.forEach(e => { if (!bmMap[e.id]) bmMap[e.id]=[]; });

    const rows = bms.map(e => {
      const txns    = bmMap[e.id] || [];
      const prev    = toLMTD(prevMap[e.id] || []);
      // Current month
      const ucTxns  = txns.filter(t=>t.product==='Used Car');
      const cvTxns  = txns.filter(t=>t.product!=='Used Car');
      const ucAmt   = ucTxns.reduce((s,t)=>s+t.amt,0);
      const cvAmt   = cvTxns.reduce((s,t)=>s+t.amt,0);
      const tot     = ucAmt+cvAmt;
      // LMTD
      const prevUC  = toLMTD(prev.filter(t=>t.product==='Used Car')).reduce((s,t)=>s+t.amt,0);
      const prevCV  = toLMTD(prev.filter(t=>t.product!=='Used Car')).reduce((s,t)=>s+t.amt,0);
      // Targets
      const ucTgt   = (e.uc_tgt||0)*1e5;
      const cvTgt   = (e.cv_tgt||0)*1e5;
      const totTgt  = ucTgt+cvTgt;
      const ucAch   = ucTgt>0?Math.round((ucAmt/ucTgt)*100):null;
      const cvAch   = cvTgt>0?Math.round((cvAmt/cvTgt)*100):null;
      // Channels
      const ch      = countChannels(txns, e);
      const prevCh  = countChannels(toLMTD(prevMap[e.id]||[]), e);
      const chTgt   = e.ch_tgt||0;
      const chAch   = chTgt>0?Math.round((ch/chTgt)*100):null;
      // FTD
      const ftd     = txns.filter(t=>t.date===todayStr);
      const ftdUC   = ftd.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
      const ftdCV   = ftd.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);
      // FTD New channels (channels activated today that had no disbursement before today this month)
      const ftdDcids     = new Set(ftd.filter(t=>t.dcid).map(t=>t.dcid));
      const prevMonthDcids= new Set((prevMap[e.id]||[]).filter(t=>t.dcid).map(t=>t.dcid));
      const beforeTodayDcids = new Set(txns.filter(t=>t.date<todayStr&&t.dcid).map(t=>t.dcid));
      // FTD unique new UC channels = channels active in FTD (UC), not active before today this month, not in prev month
      const ftdNewCh = [...ftdDcids].filter(d => {
        const t = ftd.filter(x=>x.dcid===d);
        const hasUC = t.some(x=>x.product==='Used Car');
        return hasUC && !beforeTodayDcids.has(d);
      }).length;

      const amEmp = emps.find(a=>a.id===e.am_id);
      const thEmp = emps.find(a=>a.id===e.th_id);
      return { e, txns, ucAmt, cvAmt, tot, ucTgt, cvTgt, totTgt, ucAch, cvAch,
               prevUC, prevCV, ch, prevCh, chTgt, chAch,
               ftdUC, ftdCV, ftdNewCh,
               amName: amEmp?amEmp.name:'Direct', thName: thEmp?thEmp.name:'—' };
    }).sort((a,b)=>b.tot-a.tot);

    // Totals
    const totDisb = rows.reduce((s,r)=>s+r.tot,0);
    const totUC   = rows.reduce((s,r)=>s+r.ucAmt,0);
    const totCV   = rows.reduce((s,r)=>s+r.cvAmt,0);
    const totCases= rows.reduce((s,r)=>s+r.txns.length,0);
    const onTrack = rows.filter(r=>r.ucAch!==null&&r.ucAch>=70||r.cvAch!==null&&r.cvAch>=70).length;
    const zeroBMs = rows.filter(r=>r.txns.length===0).length;

    function gTag(cur, prev, isAmt=true) {
      if (!prev && prev!==0) return '<span style="color:#ccc">—</span>';
      const d = cur-prev; const up = d>=0;
      const col = up?'#2e7d32':'#c62828';
      const bg  = up?'#e8f5e9':'#ffebee';

      return '<span style="background:'+bg+';color:'+col+';padding:2px 6px;border-radius:8px;font-size:10px;font-weight:700">'+(up?'&#9650;':'&#9660;')+' '+val+'</span>';
    }

    function achBadgeSmall(pct) {
      if (pct===null) return '<span style="color:#9e9e9e">—</span>';
      const col = pct>=100?'#2e7d32':pct>=70?'#1565c0':'#c62828';
      const bg  = pct>=100?'#e8f5e9':pct>=70?'#e3f2fd':'#ffebee';

    }

    return `
      <div class="kpi-grid" style="grid-template-columns:repeat(5,1fr);margin-bottom:16px">
        <div class="kpi"><div class="kpi-label">Total BMs</div><div class="kpi-value">${rows.length}</div></div>

        <div class="kpi"><div class="kpi-label">UC</div><div class="kpi-value" style="color:#1565c0;font-size:20px">${fmtCr(totUC)}</div></div>
        <div class="kpi"><div class="kpi-label">CV</div><div class="kpi-value" style="color:#6a1b9a;font-size:20px">${fmtCr(totCV)}</div></div>
        <div class="kpi"><div class="kpi-label">On Track / Zero</div><div class="kpi-value" style="color:#2e7d32">${onTrack}<span style="color:#c62828;font-size:14px"> / ${zeroBMs}</span></div></div>
      </div>
      <div style="overflow-x:auto">
        <table style="min-width:1200px;border-collapse:collapse;font-size:12px;width:100%">
          <thead>
            <tr style="background:#0d1b5e;color:#fff">
              <th style="${hdrL}" rowspan="2">#</th>
              <th style="${hdrL}" rowspan="2">BM Name</th>
              <th style="${hdrL}" rowspan="2">AM Name</th>
              ${role==='RH'?`<th style="${hdrL}" rowspan="2">TH Name</th>`:''}
              <th style="${hdrStyle}" rowspan="2">Total<br>TGT</th>
              <th style="${hdrStyle}" rowspan="2">Total<br>Disb</th>
              <th style="padding:6px 8px;text-align:center;color:#fff;font-weight:700;background:#1a237e;border-right:2px solid rgba(255,255,255,.2)" colspan="3">UC</th>
              <th style="padding:6px 8px;text-align:center;color:#fff;font-weight:700;background:#4a148c;border-right:2px solid rgba(255,255,255,.2)" colspan="3">CV</th>
              <th style="padding:6px 8px;text-align:center;color:#fff;font-weight:700;background:#006064;border-right:2px solid rgba(255,255,255,.2)" colspan="3">Channel</th>
              <th style="padding:6px 8px;text-align:center;color:#fff;font-weight:700;background:#b71c1c" colspan="3">FTD</th>
            </tr>
            <tr style="background:#1a237e;color:#fff;font-size:10px">
              <th style="${hdrStyle}">TGT</th>
              <th style="${hdrStyle}">ACH</th>
              <th style="padding:9px 8px;text-align:center;white-space:nowrap;font-size:10px;font-weight:700;color:#fff;background:#283593;border-right:2px solid rgba(255,255,255,.2)">ACH%<br>vs LMTD</th>
              <th style="padding:9px 8px;text-align:right;white-space:nowrap;font-size:10px;font-weight:700;color:#fff;background:#4a148c">TGT</th>
              <th style="padding:9px 8px;text-align:right;white-space:nowrap;font-size:10px;font-weight:700;color:#fff;background:#4a148c">ACH</th>
              <th style="padding:9px 8px;text-align:center;white-space:nowrap;font-size:10px;font-weight:700;color:#fff;background:#6a1b9a;border-right:2px solid rgba(255,255,255,.2)">ACH%<br>vs LMTD</th>
              <th style="padding:9px 8px;text-align:right;white-space:nowrap;font-size:10px;font-weight:700;color:#fff;background:#006064">TGT</th>
              <th style="padding:9px 8px;text-align:right;white-space:nowrap;font-size:10px;font-weight:700;color:#fff;background:#006064">ACH</th>
              <th style="padding:9px 8px;text-align:center;white-space:nowrap;font-size:10px;font-weight:700;color:#fff;background:#00838f;border-right:2px solid rgba(255,255,255,.2)">ACH%<br>vs LMTD</th>
              <th style="padding:9px 8px;text-align:right;white-space:nowrap;font-size:10px;font-weight:700;color:#fff;background:#b71c1c">UC</th>
              <th style="padding:9px 8px;text-align:right;white-space:nowrap;font-size:10px;font-weight:700;color:#fff;background:#b71c1c">CV</th>
              <th style="padding:9px 8px;text-align:center;white-space:nowrap;font-size:10px;font-weight:700;color:#fff;background:#c62828">New<br>Ch</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((r,i) => {
              const rowBg = r.txns.length===0?'background:#fafafa;opacity:.65':i%2===0?'':'background:#f8f9ff';
              const totAch = r.totTgt>0?achBadgeSmall(Math.round((r.tot/r.totTgt)*100)):achBadgeSmall(null);
              return `<tr style="${rowBg}">
                <td style="padding:7px 10px;color:#9e9e9e;font-size:11px;border-bottom:1px solid #f0f0f0">${i+1}</td>

                  ${r.txns.length===0?'<span style="font-size:9px;color:#e53935;margin-left:4px">No txn</span>':''}
                </td>
                <td style="padding:7px 8px;font-size:11px;color:#555;border-bottom:1px solid #f0f0f0">${r.amName}</td>
                ${role==='RH'?`<td style="padding:7px 8px;font-size:11px;color:#555;border-bottom:1px solid #f0f0f0">${r.thName}</td>`:''}
                <td style="padding:7px 8px;text-align:right;border-bottom:1px solid #f0f0f0;font-size:11px;color:#666">${r.totTgt>0?fmtCr(r.totTgt):'—'}</td>
                <td style="padding:7px 8px;text-align:right;border-bottom:1px solid #f0f0f0;font-weight:700">${fmtCr(r.tot)}<br><small style="font-weight:400;color:#9e9e9e">${r.txns.length}c</small></td>

                  ${r.ftdNewCh>0?`<span style="background:#ffebee;color:#c62828;padding:2px 8px;border-radius:8px;font-weight:700">${r.ftdNewCh}</span>`:'<span style="color:#ccc">—</span>'}

              <td style="padding:8px;text-align:right;font-size:13px">${fmtCr(totDisb)}</td>

              <td style="padding:8px;text-align:right">${fmtCr(rows.reduce((s,r)=>s+r.cvTgt,0))}</td>
              <td style="padding:8px;text-align:right;color:#6a1b9a;font-size:13px">${fmtCr(totCV)}</td>
              <td></td>
              <td style="padding:8px;text-align:right">${rows.reduce((s,r)=>s+(r.chTgt||0),0)}</td>

    </div>
    <div id="hierTableBody">${renderTable('', '')}</div>
  `;

  window._hierRenderFn = renderTable;
  window._hierRole = role;
}

function applyWkFilter() {
  const thVal = document.getElementById('wkTHFilter')?.value || '';
  const amVal = document.getElementById('wkAMFilter')?.value || '';
  const rows  = (window._wkBmRows || []).filter(r => {
    const empId  = r.emp?.id || '';
    const empAMId= r.emp?.am_id || '';
    const empTHId= r.emp?.th_id || '';
    if (thVal && empTHId !== thVal) return false;
    if (amVal && empAMId !== amVal) return false;
    return true;
  });
  const tbody = document.getElementById('wkFlatRows');
  if (tbody && window._wkBmTableRows) {
    tbody.innerHTML = window._wkBmTableRows(rows);
  }
  // Update AM dropdown when TH selected
  if (thVal && window._wkRole === 'RH') {
    const amSel = document.getElementById('wkAMFilter');
    if (amSel) {
      const ams = getEmpData().filter(e=>e.designation==='AM'&&e.th_id===thVal);
      amSel.innerHTML = '<option value="">All AM</option>' + ams.map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
    }
  }
}

function applyHierFilter() {
  const thVal = document.getElementById('hierTHFilter')?.value || '';
  const amVal = document.getElementById('hierAMFilter')?.value || '';

  // When TH selected, reset AM filter to show only AMs under that TH
  if (thVal) {
    const amSel = document.getElementById('hierAMFilter');
    const emps  = getEmpData();
    const amsUnderTH = emps.filter(e=>e.designation==='AM'&&e.th_id===thVal);
    if (amSel) {
      const opts = '<option value="">All AM</option>' + amsUnderTH.map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
      if (amSel.innerHTML !== opts) amSel.innerHTML = opts;
    }
  }

  const body = document.getElementById('hierTableBody');
  if (body && window._hierRenderFn) {
    body.innerHTML = window._hierRenderFn(thVal, amVal);
  }
}

function buildTHHierarchy(el) {
  buildFlatHierarchy(el, myTxns, 'TH');
}

function buildRHHierarchy(el) {
  buildFlatHierarchy(el, myTxns, 'RH');
}


function buildTHCard(thName, thEmp, thStats, thId, amEntries) {
  return `
    <div style="background:#fff;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08);margin-bottom:20px;overflow:hidden;border-left:5px solid #1a237e">
      <div onclick="toggleSection('${thId}')" style="padding:18px 22px;cursor:pointer;background:linear-gradient(135deg,#f5f7ff,#fff);display:flex;align-items:center;justify-content:space-between;user-select:none">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <span style="font-size:16px;font-weight:800;color:#1a237e">${thName}</span>
            <span class="badge badge-blue">TH</span>
            ${thEmp ? achBadge(thStats.ach) : '<span class="badge badge-grey">No Target</span>'}
          </div>
          <div style="margin-top:8px;display:flex;gap:20px;flex-wrap:wrap">
            <span style="font-size:13px">${statRow('Disb', thStats.amt, thStats.tgt, thStats.ach)}</span>
            <span style="font-size:12px;color:#555">UC: <b>${fmtCr(thStats.ucAmt)}</b></span>
            <span style="font-size:12px;color:#555">CV: <b>${fmtCr(thStats.cvAmt)}</b></span>
            <span style="font-size:12px;color:#555">Cases: <b>${thStats.cases}</b></span>
            <span style="font-size:12px;color:#555">AMs: <b>${amEntries.length}</b></span>
          </div>
        </div>
        <div style="font-size:22px;color:#9e9e9e;margin-left:12px" id="arr_${thId}">▼</div>
      </div>
      <div id="${thId}" style="display:none;padding:12px 16px 16px">
        ${amEntries.map(([amId, amTxns]) => {
          const isDirect = amId === '__direct__';
          const amEmp    = isDirect ? null : resolveEmpById(amId);
          const displayAM = isDirect ? 'Direct BMs (No AM)' : (amEmp ? amEmp.name : 'AM ' + amId);
          const amStats  = computeStats(amTxns, amEmp);
          const cardId   = 'am_' + thId + '_' + amId.replace(/[^a-zA-Z0-9]/g,'_');

          // BMs under this AM — group by bm_id
          const bmMap = {};
          amTxns.forEach(t => {
            const key = t.bm_id || t.bm;
            if (!bmMap[key]) bmMap[key] = [];
            bmMap[key].push(t);
          });
          // Add zero-txn BMs from emp sheet
          if (!isDirect) {
            getEmpData().forEach(e => {
              if (e.designation === 'BM' && e.am_id === amId && !bmMap[e.id]) bmMap[e.id] = [];
            });
          }
          const bmRows = Object.entries(bmMap).sort((a,b)=>b[1].reduce((s,t)=>s+t.amt,0)-a[1].reduce((s,t)=>s+t.amt,0));

          return (
            '<div style="background:#f8f9ff;border-radius:10px;margin-bottom:12px;overflow:hidden;border-left:4px solid #283593">'
            +'<div onclick="toggleSection(\'' + cardId + '\')" style="padding:14px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none">'
            +'<div style="flex:1">'
            +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
            +'<span style="font-size:14px;font-weight:700;color:#283593">' + displayAM + '</span>'
            +(!isDirect ? '<span class="badge badge-blue" style="font-size:10px">AM</span>' : '')
            +(amEmp ? achBadge(amStats.ach) : '')
            +'</div>'
            +'<div style="margin-top:6px;display:flex;gap:14px;flex-wrap:wrap">'
            +'<span style="font-size:12px">' + statRow('Disb', amStats.amt, amStats.tgt, amStats.ach) + '</span>'
            +'<span style="font-size:11px;color:#666">UC: <b>' + fmtCr(amStats.ucAmt) + '</b></span>'
            +'<span style="font-size:11px;color:#666">CV: <b>' + fmtCr(amStats.cvAmt) + '</b></span>'
            +'<span style="font-size:11px;color:#666">Cases: <b>' + amStats.cases + '</b> | BMs: <b>' + bmRows.length + '</b></span>'
            +'</div></div>'
            +'<div style="font-size:18px;color:#9e9e9e;margin-left:10px" id="arr_' + cardId + '">▼</div>'
            +'</div>'
            +'<div id="' + cardId + '" style="display:none;padding:0 16px 14px;overflow-x:auto">'
            + buildBMTable(bmRows)
            +'</div></div>'
          );
        }).join('')}
      </div>
    </div>
  `;
}

// ── Helper: BM rows table ─────────────────────────────
function buildBMTable(bmRows) {
  if (!bmRows.length) return '<div class="empty">No BMs found.</div>';
  const todayStr = new Date().toISOString().slice(0,10);
  return `
    <table>
      <thead><tr>
        <th>BM Name</th><th>Tier</th>
        <th>Disbursement</th><th>UC Tgt</th><th>CV Tgt</th><th>% Ach</th>
        <th>UC</th><th>CV</th><th>Cases</th><th>Active Ch</th><th>Ch Tgt</th><th>Ch Ach%</th>
        <th style="color:#1565c0">FTD UC</th><th style="color:#880e4f">FTD CV</th>
      </tr></thead>
      <tbody>
        ${bmRows.map(([key, bmTxns]) => {
          const bmId    = bmTxns.length > 0 ? bmTxns[0].bm_id : key;
          const bmEmp   = resolveEmpById(bmId) || (bmTxns.length > 0 ? resolveEmpName(bmTxns[0].bm) : null);
          const bmStats = computeStats(bmTxns, bmEmp);
          const tier    = bmEmp ? bmEmp.tier || '—' : '—';
          const ucTgt   = bmEmp ? fmtCr((bmEmp.uc_tgt||0)*1e5) : '—';
          const cvTgt   = bmEmp ? fmtCr((bmEmp.cv_tgt||0)*1e5) : '—';
          const chTgt   = bmEmp ? (bmEmp.ch_tgt || 0) : 0;
          const bmCh    = new Set(bmTxns.filter(t=>t.ch_check>0).map(t=>t.dcid)).size;
          const chAch   = chTgt > 0 ? Math.round((bmCh/chTgt)*100) : null;
          const displayName = bmEmp ? bmEmp.name : (bmTxns.length > 0 ? bmTxns[0].bm : key);
          const ftdTxns = bmTxns.filter(t => t.date && t.date.slice(0,10) === todayStr);
          const ftdUC   = ftdTxns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
          const ftdCV   = ftdTxns.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);
          const zeroRow = bmTxns.length === 0;
          return `<tr ${zeroRow?'style="opacity:0.65;background:#fafafa"':''}>
            <td><b style="font-size:12px">${displayName}</b>${zeroRow?'<span style="font-size:10px;color:#e53935;margin-left:4px">No txns</span>':''}</td>
            <td><span class="badge badge-grey" style="font-size:10px">${tier}</span></td>
            <td><b>${zeroRow?'₹0':fmtCr(bmStats.amt)}</b></td>
            <td style="font-size:11px;color:#666">${ucTgt}</td>
            <td style="font-size:11px;color:#666">${cvTgt}</td>
            <td>${bmStats.tgt>0 ? achBadge(bmStats.ach) : '<span class="badge badge-grey">—</span>'}</td>
            <td style="font-size:11px">${zeroRow?'—':fmtCr(bmStats.ucAmt)}</td>
            <td style="font-size:11px">${zeroRow?'—':fmtCr(bmStats.cvAmt)}</td>
            <td>${bmStats.cases}</td>
            <td><b>${bmCh}</b></td>
            <td style="font-size:11px;color:#666">${chTgt || '—'}</td>
            <td>${chAch !== null ? achBadge(chAch) : '<span class="badge badge-grey">—</span>'}</td>
            <td style="font-size:11px;color:#1565c0;font-weight:700">${ftdUC>0?fmtCr(ftdUC):'<span style="color:#9e9e9e">—</span>'}</td>
            <td style="font-size:11px;color:#880e4f;font-weight:700">${ftdCV>0?fmtCr(ftdCV):'<span style="color:#9e9e9e">—</span>'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}
// Toggle expand/collapse
function toggleSection(id) {
  const el = document.getElementById(id);
  const arr = document.getElementById('arr_' + id);
  if (!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  if (arr) arr.textContent = isOpen ? '▼' : '▲';
}

</script>
