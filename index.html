<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rupyy Performance Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1a237e;--accent:#e53935;--gold:#f9a825;
  --green:#2e7d32;--teal:#00838f;--bg:#f0f2f5;
  --card:#fff;--text:#212121;--muted:#757575;
}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a237e 0%,#283593 50%,#e53935 100%)}
.login-box{background:#fff;border-radius:16px;padding:48px 40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo h1{color:var(--primary);font-size:32px;font-weight:800;letter-spacing:-1px}
.login-logo p{color:var(--muted);font-size:13px;margin-top:4px}
.login-field{margin-bottom:20px}
.login-field label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.login-field input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;outline:none;transition:border .2s}
.login-field input:focus{border-color:var(--primary)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#1a237e,#283593);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:transform .1s,box-shadow .2s}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(26,35,126,.4)}
.login-err{color:#e53935;font-size:13px;text-align:center;margin-top:12px;min-height:20px}

.app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-logo{font-size:22px;font-weight:800;letter-spacing:-1px}
.topbar-badge{background:rgba(255,255,255,.15);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.5px}
.topbar-right{display:flex;align-items:center;gap:16px}
.user-info{text-align:right}
.user-info .name{font-size:14px;font-weight:600}
.user-info .role{font-size:11px;opacity:.7}
.logout-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:background .2s}
.logout-btn:hover{background:rgba(255,255,255,.25)}

.nav{background:#fff;border-bottom:1px solid #e0e0e0;padding:0 24px;display:flex;gap:4px;overflow-x:auto}
.nav-btn{padding:14px 18px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s}
.nav-btn.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.nav-btn:hover{color:var(--primary)}

.main{padding:24px;flex:1}
.page{display:none}
.page.active{display:block}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.kpi{background:var(--card);border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.kpi-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.kpi-value{font-size:28px;font-weight:800;color:var(--primary);line-height:1}
.kpi-sub{font-size:12px;color:var(--muted);margin-top:6px}
.kpi-bar{height:6px;background:#e0e0e0;border-radius:3px;margin-top:12px;overflow:hidden}
.kpi-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#1a237e,#e53935);transition:width 1s}

.section-title{font-size:16px;font-weight:700;color:var(--primary);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--bg)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
@media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}}
.card{background:var(--card);border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px}

table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--bg)}
tbody td{padding:10px 12px;border-bottom:1px solid var(--bg)}
tbody tr:hover{background:#f9fafb}
tbody tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#e8f5e9;color:#2e7d32}
.badge-blue{background:#e3f2fd;color:#1565c0}
.badge-orange{background:#fff3e0;color:#e65100}
.badge-red{background:#fce4ec;color:#c62828}
.badge-grey{background:#f5f5f5;color:#616161}
.badge-gold{background:#fff8e1;color:#f57f17}

.progress-wrap{background:#e0e0e0;border-radius:4px;height:8px;overflow:hidden}
.progress-bar{height:100%;border-radius:4px;transition:width .8s}
.bar-green{background:#43a047}
.bar-orange{background:#fb8c00}
.bar-red{background:#e53935}

.incentive-box{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;border-radius:16px;padding:28px;margin-bottom:24px}
.incentive-title{font-size:13px;opacity:.7;text-transform:uppercase;letter-spacing:.5px}
.incentive-amount{font-size:48px;font-weight:800;line-height:1;margin:8px 0}
.incentive-breakdown{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:20px}
.incentive-item{background:rgba(255,255,255,.1);border-radius:8px;padding:12px}
.incentive-item .ivalue{font-size:18px;font-weight:700}
.incentive-item .ilabel{font-size:11px;opacity:.7;margin-top:4px}

.slab-table{background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.slab-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;padding:12px 16px;border-bottom:1px solid var(--bg);font-size:13px;align-items:center}
.slab-header{background:#f5f5f5;font-weight:700;color:var(--muted);font-size:11px;text-transform:uppercase}
.slab-active{background:#e8f5e9;font-weight:600}
.slab-future{opacity:.5}

.tree-node{margin-left:20px;border-left:2px solid #e0e0e0;padding-left:16px;margin-top:8px}
.tree-leaf{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--card);border-radius:8px;margin-bottom:6px;font-size:13px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.tree-leaf .tname{font-weight:600;flex:1}
.tree-leaf .tamt{font-weight:700;color:var(--primary)}

.insight-list{display:flex;flex-direction:column;gap:12px}
.insight-item{background:var(--card);border-radius:10px;padding:16px;border-left:4px solid;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.insight-item.good{border-color:#43a047}
.insight-item.warn{border-color:#fb8c00}
.insight-item.action{border-color:#e53935}
.insight-title{font-size:14px;font-weight:700;margin-bottom:4px}
.insight-body{font-size:13px;color:var(--muted)}

.chip{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;margin-right:4px}
.chip-uc{background:#e3f2fd;color:#1565c0}
.chip-cv{background:#f3e5f5;color:#6a1b9a}
.chip-ncv{background:#fff3e0;color:#e65100}

.empty{text-align:center;padding:48px;color:var(--muted);font-size:14px}
.highlight-number{font-size:22px;font-weight:800;color:var(--primary)}

.issue-form{background:#f8f9ff;border:2px dashed #c5cae9;border-radius:12px;padding:24px;margin-bottom:24px}
.issue-form h3{color:var(--primary);margin-bottom:16px;font-size:15px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:700px){.form-grid{grid-template-columns:1fr}}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.form-field input,.form-field select,.form-field textarea{padding:10px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:13px;outline:none;font-family:inherit;background:#fff;transition:border .2s}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--primary)}
.form-field textarea{resize:vertical;min-height:72px}
.submit-btn{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;transition:opacity .2s}
.submit-btn:hover{opacity:.9}
.issue-card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:16px;overflow:hidden;border-left:4px solid #e53935}
.issue-card.closed{border-left-color:#43a047;opacity:.85}
.issue-header{padding:16px 20px;display:flex;align-items:flex-start;gap:12px}
.issue-meta{flex:1}
.issue-id{font-size:11px;color:var(--muted);font-weight:600}
.issue-title{font-size:14px;font-weight:700;margin:4px 0}
.issue-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.issue-body{padding:0 20px 16px;font-size:13px;color:#555;border-top:1px solid #f5f5f5;padding-top:12px}
.issue-body b{color:#333}
.replies-section{padding:0 20px 16px}
.reply-item{background:#f9fafb;border-radius:8px;padding:10px 14px;margin-bottom:8px;font-size:13px}
.reply-meta{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600}
.reply-form{display:flex;gap:8px;margin-top:8px}
.reply-form input{flex:1;padding:8px 12px;border:1.5px solid #e0e0e0;border-radius:6px;font-size:13px;outline:none}
.reply-form input:focus{border-color:var(--primary)}
.reply-form button{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.btn-reply{background:var(--primary);color:#fff}
.btn-close{background:#e8f5e9;color:#2e7d32}
.btn-open{background:#fce4ec;color:#c62828}
.status-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase}
.status-open{background:#fce4ec;color:#c62828}
.status-closed{background:#e8f5e9;color:#2e7d32}
.filter-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:6px 14px;border:1.5px solid #e0e0e0;border-radius:20px;background:#fff;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted)}
.filter-btn.active{border-color:var(--primary);background:var(--primary);color:#fff}


.city-tab-btn {
  display: inline-block;
  margin-right: 8px;
  padding: 7px 14px;
  border: 1.5px solid #e0e0e0;
  border-radius: 20px;
  background: #fff;
  color: #555;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .18s;
  white-space: nowrap;
}
.city-tab-btn.active, .city-tab-btn:hover {
  background: #1a237e;
  color: #fff;
  border-color: #1a237e;
}
</style>
</head>

// ========== DRR / SHORTFALL HELPERS ==========
function getRemainingWorkingDays() {
  // Working days remaining in current month from today (excl. Sundays)
  const today = new Date();
  today.setHours(0,0,0,0);
  const monthEnd = new Date(today.getFullYear(), today.getMonth()+1, 0); // last day of month
  let count = 0;
  let d = new Date(today);
  while (d <= monthEnd) {
    if (d.getDay() !== 0) count++; // 0 = Sunday
    d.setDate(d.getDate() + 1);
  }
  return count;
}

// ========== CORE STATE ==========
let currentUser = null;
let myTxns = [];
let charts = {};

function fmtCr(amt) {
  if (amt >= 1e7) return '₹' + (amt/1e7).toFixed(2) + ' Cr';
  if (amt >= 1e5) return '₹' + (amt/1e5).toFixed(2) + ' L';
  return '₹' + amt.toLocaleString();
}
function fmtL(amt) { return (amt/100000).toFixed(2) + ' L'; }
function pct(a,b) { return b>0 ? Math.min(Math.round(a/b*100),999) : 0; }
function tenureMonths(joining) {
  if (!joining || joining==='NaT') return 0;
  const d = new Date(joining);
  const now = new Date('2026-05-31');
  return (now.getFullYear()-d.getFullYear())*12 + (now.getMonth()-d.getMonth());
}

// ========== AUTH ==========
function doLogin() {
  const name = document.getElementById('loginName').value.trim().toLowerCase();
  const pass = document.getElementById('loginPass').value.trim();
  const emp = EMP_DATA.find(e => e.email.toLowerCase() === name && String(e.password) === String(pass));
  if (!emp) {
    document.getElementById('loginErr').textContent = 'Invalid email or password';
    return;
  }
  currentUser = emp;
  filterMyTxns();
  initApp();
}

function doLogout() {
  currentUser = null; myTxns = [];
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  charts = {};
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginName').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginErr').textContent = '';
}

function filterMyTxns() {
  const d = currentUser.designation;
  const id = currentUser.id;
  const n = currentUser.name;
  if (d === 'BM') {
    // Match by Employee ID — 100% reliable, no name casing issues
    myTxns = TXN_DATA.filter(t => t.bm_id === id);
  } else if (d === 'AM') {
    myTxns = TXN_DATA.filter(t => t.am_id === id);
  } else if (d === 'TH') {
    myTxns = TXN_DATA.filter(t => t.th_id === id);
  } else if (d === 'RH') {
    myTxns = TXN_DATA.filter(t => t.rh_id === id);
  }
}

// ========== INIT APP ==========
function initApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('topName').textContent = currentUser.name;
  document.getElementById('topRole').textContent = currentUser.designation + (currentUser.city ? ' · ' + currentUser.city : '');
  document.getElementById('topBadge').textContent = currentUser.designation;

  const pages = buildPageList();
  const nav = document.getElementById('navBar');
  nav.innerHTML = pages.map((p,i) => `<button class="nav-btn ${i===0?'active':''}" onclick="showPage('${p.id}',this)">${p.label}</button>`).join('');

  const main = document.getElementById('mainContent');
  main.innerHTML = pages.map(p => `<div class="page ${p.id==='overview'?'active':''}" id="page_${p.id}"></div>`).join('');

  showPage(pages[0].id, nav.children[0]);
}

function buildPageList() {
  const d = currentUser.designation;
  const pages = [
    {id:'overview', label:'📊 Overview'},
  ];
  // Hierarchy placed right after Overview for TH and RH
  if (d === 'TH' || d === 'RH') {
    pages.push({id:'hierarchy', label:'🏗️ Hierarchy View'});
  }
  pages.push(
    {id:'channels', label:'🔗 Channels'},
    {id:'dealers', label:'🏪 Top Dealers'},
    {id:'banks', label:'🏦 Banks'}
  );
  if (d === 'BM') {
    pages.push({id:'incentive', label:'💰 Incentive'});
  }
  if (d === 'AM') {
    pages.push({id:'team', label:'👥 My Team'});
  }
  if (d === 'AM' || d === 'TH' || d === 'RH') {
    pages.push({id:'insights', label:'💡 Insights'});
  }
  pages.push({id:'issues', label:'🔔 Issues'});
  return pages;
}

function showPage(id, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const page = document.getElementById('page_' + id);
  if (page) {
    page.classList.add('active');
    if (!page.dataset.built) {
      page.dataset.built = '1';
      buildPage(id, page);
    }
  }
}

// ========== PAGE BUILDERS ==========
function buildPage(id, el) {
  switch(id) {
    case 'overview':  buildOverview(el); break;
    case 'channels':  buildChannels(el); break;
    case 'dealers':   buildDealers(el); break;
    case 'banks':     buildBanks(el); break;
    case 'incentive': buildIncentive(el); break;
    case 'team':      buildTeam(el); break;
    case 'insights':  buildInsights(el); break;
    case 'issues':    buildIssues(el); break;
    case 'hierarchy': buildHierarchy(el); break;
  }
}

          return `<div style="display:flex;align-items:center;justify-content:space-between;font-size:11.5px">
            <div style="display:flex;align-items:center;gap:6px">
              <span style="width:10px;height:10px;border-radius:2px;background:${pxColors[i]};display:inline-block;flex-shrink:0"></span>
              <span style="color:#555">${lbl}</span>
            </div>
            <div style="text-align:right">
              <b style="color:#1a237e">${fmtCr(val)}</b>
              <span style="color:#9e9e9e;margin-left:4px">${share}%</span>
            </div>
          </div>`;
        }).join('');
      }
    }

    // Daily trend — with zero-day tracking for BM
    const byDate = {};
    myTxns.forEach(t => {
      const d = t.date ? t.date.slice(0,10) : 'Unknown';
      byDate[d] = (byDate[d]||0) + t.amt;
    });

    // Build full working-day range (Mon–Sat) from first txn date to today
    const isBM = currentUser.designation === 'BM';
    let allDates = [];
    if (isBM && Object.keys(byDate).length > 0) {
      const txnDates = Object.keys(byDate).filter(d=>d!=='Unknown').sort();
      const startDate = new Date(txnDates[0]);
      const endDate   = new Date(); // today
      // clamp end to last day of month if month already ended
      const lastTxnDate = new Date(txnDates[txnDates.length-1]);
      const useEnd = endDate < lastTxnDate ? lastTxnDate : endDate;

      for (let d = new Date(startDate); d <= useEnd; d.setDate(d.getDate()+1)) {
        const day = d.getDay(); // 0=Sun
        if (day !== 0) { // exclude Sundays only
          allDates.push(d.toISOString().slice(0,10));
        }
      }
    } else {
      allDates = Object.keys(byDate).filter(d=>d!=='Unknown').sort();
    }

    const barColors = allDates.map(d => (byDate[d]||0) === 0 ? '#ef5350aa' : '#1a237e80');
    const barBorders = allDates.map(d => (byDate[d]||0) === 0 ? '#c62828' : '#1a237e');

    const ctx2 = document.getElementById('chartTrend');
    if (ctx2 && !charts.trend) {
      charts.trend = new Chart(ctx2, {
        type:'bar',
        data:{
          labels: allDates.map(d => d.slice(5)),
          datasets:[{
            label:'Disbursement',
            data: allDates.map(d => byDate[d]||0),
            backgroundColor: barColors,
            borderColor: barBorders,
            borderWidth:1,
            borderRadius:4
          }]
        },
        options:{
          plugins:{
            legend:{display:false},
            tooltip:{callbacks:{label: ctx => ` ${fmtCr(ctx.raw)}${ctx.raw===0?' — Zero day':''}`}}
          },
          scales:{
            y:{ticks:{callback:v=>fmtCr(v)},grid:{color:'#f0f0f0'}},
            x:{grid:{display:false},ticks:{font:{size:10}}}
          }
        }
      });
    }

    // Zero-days summary — BM only
    if (isBM) {
      const zeroDays = allDates.filter(d => (byDate[d]||0) === 0);
      // exclude future dates (today or later with no data is ok if today)
      const todayStr = new Date().toISOString().slice(0,10);
      const zeroPast = zeroDays.filter(d => d < todayStr);

      const badgeEl = document.getElementById('zeroDaysBadge');
      if (badgeEl) {
        if (zeroPast.length === 0) {
          badgeEl.innerHTML = `<span style="background:#e8f5e9;color:#2e7d32;font-size:12px;font-weight:700;padding:4px 10px;border-radius:12px">✅ No zero days</span>`;
        } else {
          badgeEl.innerHTML = `<span style="background:#ffebee;color:#c62828;font-size:12px;font-weight:700;padding:4px 10px;border-radius:12px">🔴 ${zeroPast.length} zero day${zeroPast.length>1?'s':''}</span>`;
        }
      }

      const detailEl = document.getElementById('zeroDaysDetail');
      if (detailEl && zeroPast.length > 0) {
        detailEl.innerHTML = `
          <div style="background:#fff5f5;border:1px solid #ffcdd2;border-radius:8px;padding:10px 14px;font-size:12px">
            <span style="color:#c62828;font-weight:700">No activity on: </span>
            <span style="color:#555">${zeroPast.map(d => {
              const dt = new Date(d);
              return dt.toLocaleDateString('en-IN',{day:'numeric',month:'short',weekday:'short'});
            }).join(' &nbsp;·&nbsp; ')}</span>
          </div>`;
      }
    }
  }, 100);
}

function getActiveChannels() {
  const d = currentUser.designation;
  if (d === 'BM') {
    // Max ch_check for this BM
    const vals = myTxns.map(t => t.ch_check).filter(v => v > 0);
    return vals.length > 0 ? Math.max(...vals) : 0;
  } else {
    // Sum of max ch_check per unique BM
    const bmMax = {};
    myTxns.forEach(t => {
      if (!bmMax[t.bm] || t.ch_check > bmMax[t.bm]) bmMax[t.bm] = t.ch_check;
    });
    return Object.values(bmMax).reduce((s,v) => s+v, 0);
  }
}

// ========== CHANNELS ==========
function buildChannels(el) {
  const d = currentUser.designation;

  if (d === 'BM') {
    const chActive = getActiveChannels();
    const chTgt = currentUser.ch_tgt || 0;
    const ucDealers = [...new Set(myTxns.filter(t=>t.product==='Used Car').map(t=>t.dealer))].length;

    el.innerHTML = `
      <div class="kpi-grid">
        <div class="kpi">
          <div class="kpi-label">Active Channels</div>
          <div class="kpi-value">${chActive}</div>
          <div class="kpi-sub">Target: ${chTgt}</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Unique UC Dealers</div>
          <div class="kpi-value">${ucDealers}</div>
          <div class="kpi-sub">Used for dealer bonus</div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Dealer Bonus Eligibility</div>
        <div style="padding:8px 0">${getDealerBonusInfo(ucDealers)}</div>
      </div>
    `;
  } else {
    // Show BM-level channel summary
    const bmMap = {};
    myTxns.forEach(t => {
      if (!bmMap[t.bm]) bmMap[t.bm] = {bm:t.bm, ch:0, ucDealers:new Set(), amt:0};
      if (t.ch_check > bmMap[t.bm].ch) bmMap[t.bm].ch = t.ch_check;
      if (t.product==='Used Car') bmMap[t.bm].ucDealers.add(t.dealer);
      bmMap[t.bm].amt += t.amt;
    });
    const rows = Object.values(bmMap);
    // Find emp data for channel target
    rows.forEach(r => {
      const emp = EMP_DATA.find(e => e.name.toLowerCase()===r.bm.toLowerCase());
      r.chTgt = emp ? emp.ch_tgt : 0;
    });
    rows.sort((a,b) => b.ch - a.ch);

    el.innerHTML = `
      <div class="card">
        <div class="card-title">BM Channel Performance</div>
        <table>
          <thead><tr><th>BM Name</th><th>Active Ch</th><th>CH Target</th><th>% Ach</th><th>UC Dealers</th><th>Disbursement</th></tr></thead>
          <tbody>
            ${rows.map(r => {
              const p = r.chTgt>0 ? pct(r.ch,r.chTgt) : 0;
              return `<tr>
                <td><b>${r.bm}</b></td>
                <td>${r.ch}</td>
                <td>${r.chTgt||'—'}</td>
                <td><span class="badge ${p>=100?'badge-green':p>=70?'badge-blue':'badge-orange'}">${r.chTgt>0?p+'%':'—'}</span></td>
                <td>${r.ucDealers.size}</td>
                <td>${fmtCr(r.amt)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  }
}

function getDealerBonusInfo(ucDealers) {
  let bonus = 0, label = 'No bonus (< 9 dealers)';
  if (ucDealers >= 13) { bonus = 15; label = '🎉 +15% bonus (13+ dealers)'; }
  else if (ucDealers >= 11) { bonus = 12; label = '✨ +12% bonus (11-12 dealers)'; }
  else if (ucDealers >= 9) { bonus = 10; label = '✅ +10% bonus (9-10 dealers)'; }
  else { label = `❌ No bonus — need ${9-ucDealers} more dealer(s) to unlock 10% bonus`; }
  return `<div style="font-size:16px;font-weight:600;color:${bonus>0?'#2e7d32':'#e53935'}">${label}</div>
          <div style="margin-top:8px;font-size:13px;color:#757575">You have <b>${ucDealers}</b> unique Used Car dealers active this month.</div>`;
}

// ========== DEALERS ==========
function buildDealers(el) {
  if (currentUser.designation === 'RH') {
    buildDealersRH(el);
    return;
  }

  const dealerMap = {};
  myTxns.forEach(t => {
    if (!dealerMap[t.dealer]) dealerMap[t.dealer] = {name:t.dealer, amt:0, cases:0, products:new Set()};
    dealerMap[t.dealer].amt += t.amt;
    dealerMap[t.dealer].cases++;
    dealerMap[t.dealer].products.add(t.product);
  });
  const dealers = Object.values(dealerMap).sort((a,b)=>b.amt-a.amt).slice(0,15);
  const maxAmt = dealers[0]?.amt || 1;

  el.innerHTML = `
    <div class="card">
      <div class="card-title">Top Dealers by Disbursement</div>
      <table>
        <thead><tr><th>#</th><th>Dealer Name</th><th>Products</th><th>Cases</th><th>Disbursement</th><th>Share</th></tr></thead>
        <tbody>
          ${dealers.map((d,i) => `<tr>
            <td style="color:#9e9e9e">${i+1}</td>
            <td><b>${d.name}</b></td>
            <td>${[...d.products].map(p => {
              if(p==='Used Car') return '<span class="chip chip-uc">UC</span>';
              if(p==='Used Commercial Vehicle') return '<span class="chip chip-cv">UCV</span>';
              return '<span class="chip chip-ncv">NCV</span>';
            }).join('')}</td>
            <td>${d.cases}</td>
            <td><b>${fmtCr(d.amt)}</b></td>
            <td style="min-width:100px">
              <div class="progress-wrap"><div class="progress-bar bar-green" style="width:${pct(d.amt,maxAmt)}%"></div></div>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function buildDealersRH(el) {
  // Get all states that have data, sorted by total disbursement
  const cityTotals = {};
  myTxns.forEach(t => {
    const c = t.state || t.city || 'Unknown';
    cityTotals[c] = (cityTotals[c] || 0) + t.amt;
  });
  const cities = Object.keys(cityTotals).filter(c => c && c !== 'nan').sort((a,b) => cityTotals[b] - cityTotals[a]);

  // Also build overall top 15
  const dealerMapAll = {};
  myTxns.forEach(t => {
    if (!dealerMapAll[t.dealer]) dealerMapAll[t.dealer] = {name:t.dealer, amt:0, cases:0, city:t.city||'', products:new Set()};
    dealerMapAll[t.dealer].amt += t.amt;
    dealerMapAll[t.dealer].cases++;
    dealerMapAll[t.dealer].products.add(t.product);
  });

  function dealerChips(products) {
    return [...products].map(p => {
      if(p==='Used Car') return '<span class="chip chip-uc">UC</span>';
      if(p==='Used Commercial Vehicle') return '<span class="chip chip-cv">UCV</span>';
      return '<span class="chip chip-ncv">NCV</span>';
    }).join('');
  }

  function dealerTable(txnList, top=10) {
    const dm = {};
    txnList.forEach(t => {
      if (!dm[t.dealer]) dm[t.dealer] = {name:t.dealer, amt:0, cases:0, products:new Set()};
      dm[t.dealer].amt += t.amt;
      dm[t.dealer].cases++;
      dm[t.dealer].products.add(t.product);
    });
    const list = Object.values(dm).sort((a,b)=>b.amt-a.amt).slice(0, top);
    const maxA = list[0]?.amt || 1;
    if (!list.length) return '<div class="empty">No data for this city.</div>';
    return `<table>
      <thead><tr><th>#</th><th>Dealer Name</th><th>Products</th><th>Cases</th><th>Disbursement</th><th>Share</th></tr></thead>
      <tbody>
        ${list.map((d,i) => `<tr>
          <td style="color:#9e9e9e">${i+1}</td>
          <td><b>${d.name}</b></td>
          <td>${dealerChips(d.products)}</td>
          <td>${d.cases}</td>
          <td><b>${fmtCr(d.amt)}</b></td>
          <td style="min-width:100px"><div class="progress-wrap"><div class="progress-bar bar-green" style="width:${pct(d.amt,maxA)}%"></div></div></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  }

  // Build city tabs HTML
  const tabBtns = ['🌐 All', ...cities].map((c, i) => 
    `<button class="city-tab-btn ${i===0?'active':''}" onclick="switchCityTab(this,'city_tab_${i}')">${c === '🌐 All' ? c : '🗺️ '+c}</button>`
  ).join('');

  const tabPanels = ['🌐 All'].concat(cities).map((c, i) => {
    const txns = c === '🌐 All' ? myTxns : myTxns.filter(t => (t.state||t.city||'Unknown') === c);
    const top = c === '🌐 All' ? 15 : 10;
    const title = c === '🌐 All' ? 'Top 15 Channels — All States' : `Top 10 Channels — ${c} (₹${fmtCr(cityTotals[c])} | ${txns.length} cases)`;
    return `<div id="city_tab_${i}" class="city-tab-panel" style="display:${i===0?'block':'none'}">
      <div class="card-title" style="margin-bottom:12px">${title}</div>
      ${dealerTable(txns, top)}
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="card">
      <div class="card-title">State-wise Top Channels</div>
      <div style="overflow-x:auto;white-space:nowrap;margin-bottom:16px;padding-bottom:4px">
        ${tabBtns}
      </div>
      ${tabPanels}
    </div>
  `;
}

function switchCityTab(btn, panelId) {
  // Deactivate all tabs
  btn.parentElement.querySelectorAll('.city-tab-btn').forEach(b => b.classList.remove('active'));
  // Hide all panels
  btn.closest('.card').querySelectorAll('.city-tab-panel').forEach(p => p.style.display='none');
  // Activate clicked
  btn.classList.add('active');
  document.getElementById(panelId).style.display = 'block';
}

// ========== INCENTIVE (BM Only) ==========
function buildIncentive(el) {
  // CV BMs have a different incentive structure — show info message only
  const bmProduct = currentUser.product || 'UC';
  if (bmProduct === 'CV') {
    el.innerHTML = `
      <div class="card" style="text-align:center;padding:48px 32px">
        <div style="font-size:48px;margin-bottom:16px">📋</div>
        <div style="font-size:20px;font-weight:700;color:#1a237e;margin-bottom:12px">CV BM — Custom Incentive Structure</div>
        <div style="font-size:14px;color:#757575;max-width:420px;margin:0 auto;line-height:1.7">
          Your incentive structure is different from the standard UC slab model.<br>
          Please check with your manager or HR for your applicable incentive details.
        </div>
        <div style="margin-top:28px;display:flex;gap:16px;justify-content:center;flex-wrap:wrap">
          <div style="background:#f5f7ff;border-radius:10px;padding:16px 24px;min-width:120px">
            <div style="font-size:22px;font-weight:700;color:#1a237e">${fmtCr(myTxns.reduce((s,t)=>s+t.amt,0))}</div>
            <div style="font-size:12px;color:#757575;margin-top:4px">Total Disbursement</div>
          </div>
          <div style="background:#f5f7ff;border-radius:10px;padding:16px 24px;min-width:120px">
            <div style="font-size:22px;font-weight:700;color:#1a237e">${myTxns.length}</div>
            <div style="font-size:12px;color:#757575;margin-top:4px">Total Cases</div>
          </div>
          <div style="background:#f5f7ff;border-radius:10px;padding:16px 24px;min-width:120px">
            <div style="font-size:22px;font-weight:700;color:#1a237e">${Math.max(...myTxns.map(t=>t.ch_check||0),0)}</div>
            <div style="font-size:12px;color:#757575;margin-top:4px">Active Channels</div>
          </div>
        </div>
      </div>
    `;
    return;
  }


  const ucAmt = myTxns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
  const ucvAmt = myTxns.filter(t=>t.product==='Used Commercial Vehicle').reduce((s,t)=>s+t.amt,0);
  const ncvAmt = myTxns.filter(t=>t.product==='New Commercial Vehicle').reduce((s,t)=>s+t.amt,0);

  // Effective GMV
  const effGMV = ucAmt + ucvAmt + (ncvAmt * 0.5);
  const effGMV_Cr = effGMV / 1e7;

  const tier = currentUser.tier || 'T3';
  const tenMo = tenureMonths(currentUser.joining);
  const gt1yr = tenMo >= 12;

  // Incentive slabs (effective GMV in Cr, rate in %)
  const slabs = [
    {min:0.8, max:1.0,  rates:{T3:0.03, T2:null, T1:null}, label:'80L - 1Cr'},
    {min:1.0, max:1.25, rates:{T3:0.04, T2:0.04, T1:0.04}, label:'1Cr - 1.25Cr'},
    {min:1.25,max:1.5,  rates:{T3:0.06, T2:0.06, T1:0.06}, label:'1.25Cr - 1.5Cr'},
    {min:1.5, max:1.75, rates:{T3:0.09, T2:0.09, T1:0.09}, label:'1.5Cr - 1.75Cr'},
    {min:1.75,max:2.0,  rates:{T3:0.11, T2:0.11, T1:0.11}, label:'1.75Cr - 2Cr'},
    {min:2.0, max:2.5,  rates:{T3:0.12, T2:0.12, T1:0.12}, label:'2Cr - 2.5Cr'},
    {min:2.5, max:3.0,  rates:{T3:0.14, T2:0.14, T1:0.14}, label:'2.5Cr - 3Cr'},
    {min:3.0, max:999,  rates:{T3:0.15, T2:0.15, T1:0.15}, label:'3Cr+'},
  ];

  // Find applicable slab
  let activeSlab = null;
  let appliedRate = 0;
  for (const s of slabs) {
    const tierRate = s.rates[tier];
    // Tenure rule: if >1yr, T3 starts from 1Cr, T2/T1 from 1.25Cr
    if (gt1yr) {
      if (tier === 'T3' && s.max <= 0.8) continue; // effectively: 1Cr threshold applies, skip first slab
      // More precisely: if tenure>1yr, T3 skips 80L-1Cr slab
      if (tier === 'T3' && s.label === '80L - 1Cr') continue;
      if ((tier === 'T2' || tier === 'T1') && (s.label === '80L - 1Cr' || s.label === '1Cr - 1.25Cr')) continue;
    }
    if (tierRate !== null && effGMV_Cr >= s.min && effGMV_Cr < s.max) {
      activeSlab = s;
      appliedRate = tierRate;
    }
    if (effGMV_Cr >= 3.0 && s.label === '3Cr+') {
      activeSlab = s;
      appliedRate = tierRate;
    }
  }

  const baseIncentive = activeSlab ? effGMV * (appliedRate / 100) : 0;

  // Dealer bonus
  const ucDealers = [...new Set(myTxns.filter(t=>t.product==='Used Car').map(t=>t.dealer))].length;
  let dealerBonusPct = 0;
  if (ucDealers >= 13) dealerBonusPct = 15;
  else if (ucDealers >= 11) dealerBonusPct = 12;
  else if (ucDealers >= 9) dealerBonusPct = 10;

  const dealerBonus = baseIncentive * (dealerBonusPct / 100);
  const totalIncentive = baseIncentive + dealerBonus;

  el.innerHTML = `
    <div class="incentive-box">
      <div class="incentive-title">Estimated Incentive (May 2026)</div>
      <div class="incentive-amount">${fmtCr(totalIncentive)}</div>
      <div class="incentive-breakdown">
        <div class="incentive-item">
          <div class="ivalue">${fmtCr(effGMV)}</div>
          <div class="ilabel">Effective GMV</div>
        </div>
        <div class="incentive-item">
          <div class="ivalue">${activeSlab ? appliedRate+'%' : 'Not yet'}</div>
          <div class="ilabel">Base Rate (${activeSlab?.label||'below threshold'})</div>
        </div>
        <div class="incentive-item">
          <div class="ivalue">${dealerBonusPct > 0 ? '+'+dealerBonusPct+'%' : 'None'}</div>
          <div class="ilabel">Dealer Bonus (${ucDealers} UC dealers)</div>
        </div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">GMV Components</div>
        <table>
          <thead><tr><th>Product</th><th>Actual</th><th>Weight</th><th>Effective</th></tr></thead>
          <tbody>

// ========== TEAM ==========
function buildTeam(el) {
  const d = currentUser.designation;

  // Get unique BMs under this manager
  const bmSet = new Set(myTxns.map(t => t.bm));
  const bmStats = {};

  myTxns.forEach(t => {
    if (!bmStats[t.bm]) bmStats[t.bm] = {bm:t.bm, amt:0, uc:0, cv:0, ncv:0, cases:0, ch:0, am:t.am, th:t.th};
    bmStats[t.bm].amt += t.amt;
    if (t.product==='Used Car') bmStats[t.bm].uc += t.amt;
    if (t.product==='Used Commercial Vehicle') bmStats[t.bm].cv += t.amt;
    if (t.product==='New Commercial Vehicle') bmStats[t.bm].ncv += t.amt;
    bmStats[t.bm].cases++;
    if (t.ch_check > bmStats[t.bm].ch) bmStats[t.bm].ch = t.ch_check;
  });

  const bms = Object.values(bmStats).sort((a,b) => b.amt - a.amt);

  // Enrich with targets
  bms.forEach(b => {
    const emp = resolveEmpName(b.bm);
    b.ucTgt = emp ? emp.uc_tgt * 1e5 : 0;
    b.cvTgt = emp ? emp.cv_tgt * 1e5 : 0;
    b.chTgt = emp ? emp.ch_tgt : 0;
    b.tier = emp ? emp.tier : '';
    b.totalTgt = b.ucTgt + b.cvTgt;
  });

  el.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi">
        <div class="kpi-label">Active BMs</div>
        <div class="kpi-value">${bms.length}</div>

        <div class="kpi-label">Team Disbursement</div>

      <div class="kpi">
        <div class="kpi-label">Team Cases</div>
        <div class="kpi-value">${bms.reduce((s,b)=>s+b.cases,0)}</div>
      </div>

      <div class="card-title">BM Performance — May 2026</div>
      <table>
        <thead><tr>
          <th>BM Name</th><th>Tier</th>
          <th>Disbursement</th><th>Target</th><th>% Achv</th>
          <th>UC</th><th>CV</th>
          <th>Cases</th><th>Ch</th>
        </tr></thead>
        <tbody>
          ${bms.map(b => {
            const p = pct(b.amt, b.totalTgt);
            return `<tr>
              <td><b>${b.bm}</b></td>
              <td><span class="badge badge-blue">${b.tier||'—'}</span></td>
              <td><b>${fmtCr(b.amt)}</b></td>
              <td style="color:#9e9e9e">${b.totalTgt>0?fmtCr(b.totalTgt):'—'}</td>
              <td><span class="badge ${p>=100?'badge-green':p>=70?'badge-blue':'badge-orange'}">${b.totalTgt>0?p+'%':'—'}</span></td>
              <td style="font-size:12px">${fmtCr(b.uc)}</td>
              <td style="font-size:12px">${fmtCr(b.cv+b.ncv)}</td>
              <td>${b.cases}</td>
              <td>${b.ch}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

// ========== INSIGHTS ==========
function buildInsights(el) {
  // Compute BM stats
  const bmStats = {};
  myTxns.forEach(t => {
    if (!bmStats[t.bm]) bmStats[t.bm] = {bm:t.bm, amt:0, uc:0, cases:0, ch:0};
    bmStats[t.bm].amt += t.amt;
    if (t.product==='Used Car') bmStats[t.bm].uc += t.amt;
    bmStats[t.bm].cases++;
    if (t.ch_check > bmStats[t.bm].ch) bmStats[t.bm].ch = t.ch_check;
  });

  const bms = Object.values(bmStats);
  bms.forEach(b => {
    const emp = resolveEmpName(b.bm);
    b.ucTgt = emp ? emp.uc_tgt * 1e5 : 0;
    b.cvTgt = emp ? emp.cv_tgt * 1e5 : 0;
    b.chTgt = emp ? emp.ch_tgt : 0;
    b.totalTgt = b.ucTgt + b.cvTgt;
  });

  const insights = [];

  // Top performer
  const topBM = [...bms].sort((a,b)=>b.amt-a.amt)[0];
  if (topBM) {
    insights.push({type:'good', title:`🏆 Top Performer: ${topBM.bm}`, body:`Disbursed ${fmtCr(topBM.amt)} with ${topBM.cases} cases this month. Excellent contribution.`});
  }

  // BMs below 70%
  const laggards = bms.filter(b => b.totalTgt > 0 && pct(b.amt,b.totalTgt) < 70);
  if (laggards.length > 0) {
    insights.push({type:'action', title:`⚠️ ${laggards.length} BM(s) Below 70% Achievement`, body:`${laggards.map(b=>b.bm+' ('+pct(b.amt,b.totalTgt)+'%)').join(', ')} need immediate attention and support.`});
  }

  // BMs above 100%
  const achievers = bms.filter(b => b.totalTgt > 0 && pct(b.amt,b.totalTgt) >= 100);
  if (achievers.length > 0) {
    insights.push({type:'good', title:`✅ ${achievers.length} BM(s) at 100%+ Achievement`, body:`${achievers.map(b=>b.bm).join(', ')} have crossed their targets. Consider stretch goals.`});
  }

  // Channel gaps
  const chGap = bms.filter(b => b.chTgt > 0 && b.ch < b.chTgt * 0.7);
  if (chGap.length > 0) {
    insights.push({type:'warn', title:`🔗 ${chGap.length} BM(s) Have Channel Activation Gaps`, body:`${chGap.map(b=>b.bm+' ('+b.ch+'/'+b.chTgt+')').join(', ')}. Focus on dealer onboarding in remaining days.`});
  }

  // UC concentration
  const totalAmt = myTxns.reduce((s,t)=>s+t.amt,0);
  const ucPct = totalAmt > 0 ? pct(myTxns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0), totalAmt) : 0;
  if (ucPct < 60) {
    insights.push({type:'warn', title:`📦 Low Used Car Mix: ${ucPct}%`, body:`Used Car is only ${ucPct}% of total disbursement. Push BMs to focus on UC pipeline.`});
  } else {
    insights.push({type:'good', title:`📦 Healthy Used Car Mix: ${ucPct}%`, body:`Used Car contributes ${ucPct}% of total disbursement — good product balance.`});
  }

  // Bank concentration
  const bankMap = {};
  myTxns.forEach(t => { bankMap[t.bank]=(bankMap[t.bank]||0)+t.amt; });
  const topBank = Object.entries(bankMap).sort((a,b)=>b[1]-a[1])[0];
  if (topBank && pct(topBank[1], totalAmt) > 40) {
    insights.push({type:'warn', title:`🏦 High Bank Concentration`, body:`${topBank[0].slice(0,40)} accounts for ${pct(topBank[1],totalAmt)}% of disbursements. Consider diversifying lender mix.`});
  }

  el.innerHTML = `
    <div class="section-title">Business Insights — May 2026</div>
    <div class="insight-list">
      ${insights.map(i => `
        <div class="insight-item ${i.type}">
          <div class="insight-title">${i.title}</div>
          <div class="insight-body">${i.body}</div>
        </div>
      `).join('')}
    </div>
  `;
}
</script>

<script>
// ========== ISSUES MODULE — Google Sheets Backend ==========

// ▼▼▼ PASTE YOUR APPS SCRIPT WEB APP URL HERE ▼▼▼
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxjqM_mE_6G7kaysiON-HQwZ46eRDl9tH2EAEuA4YM0SSjLBH0lKb8RdPjhR0vWwjcv/exec';
// ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

let issuesCache = [];
let issuesLoading = false;

// ── API helpers ────────────────────────────────────────────
async function apiGet(action) {
  const res = await fetch(`${APPS_SCRIPT_URL}?action=${action}`);
  return res.json();
}
async function apiPost(payload) {
  const res = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(payload)
  });
  return res.json();
}

// ── Build Issues page ──────────────────────────────────────
function buildIssues(el) {
  const d = currentUser.designation;
  const isBM = d === 'BM';

  el.innerHTML = `
    ${isBM ? buildIssueForm() : ''}
    <div class="card" style="margin-bottom:0">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">

        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <div class="filter-row" style="margin-bottom:0">

function buildIssueForm() {
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `
    <div class="issue-form">
      <h3>🔔 Raise a New Issue</h3>
      <div class="form-grid">
        <div class="form-field">
          <label>Channel / Dealer Name *</label>
          <input type="text" id="iss_channel" placeholder="e.g. Raj Motors">

        <div class="form-field">
          <label>GST / NON-GST *</label>
          <select id="iss_gst">
            <option value="">Select...</option>
            <option>GST</option>
            <option>NON-GST</option>
          </select>

          <label>Product *</label>

            <option value="CV">Commercial Vehicle (CV)</option>

        </div>
        <div class="form-field" style="grid-column:1/-1">
          <label>Complete Remarks / Issue Description *</label>

      </div>

}

async function submitIssue() {
  const channel = document.getElementById('iss_channel').value.trim();
  const dcid    = document.getElementById('iss_dcid').value.trim();
  const gst     = document.getElementById('iss_gst').value;
  const month   = document.getElementById('iss_month').value;
  const product = document.getElementById('iss_product').value;
  const remarks = document.getElementById('iss_remarks').value.trim();
  const msg     = document.getElementById('issueMsg');

  if (!channel || !dcid || !gst || !month || !product || !remarks) {
    msg.style.color = '#e53935';
    msg.textContent = '⚠️ Please fill all fields.';
    return;
  }

  const btn = document.getElementById('issueSubmitBtn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';
  msg.textContent = '';

  try {
    const res = await apiPost({
      action: 'postIssue',
      bm: currentUser.name,
      channel, dcid, gst, month, product, remarks
    });

    if (res.success) {
      ['iss_channel','iss_dcid','iss_remarks'].forEach(id => document.getElementById(id).value = '');
      ['iss_gst','iss_month','iss_product'].forEach(id => document.getElementById(id).value = '');
      msg.style.color = '#43a047';
      msg.textContent = '✅ Issue ' + res.id + ' submitted! Your AM/TH/RH will respond soon.';
      await loadIssues();
    } else {
      msg.style.color = '#e53935';
      msg.textContent = '❌ Error: ' + (res.error || 'Unknown error');
    }
  } catch(e) {
    msg.style.color = '#e53935';
    msg.textContent = '❌ Network error. Check your internet connection.';
  }

  btn.disabled = false;
  btn.textContent = 'Submit Issue';
}

async function loadIssues() {
  if (issuesLoading) return;
  issuesLoading = true;
  try {
    const data = await apiGet('getIssues');
    issuesCache = data.issues || [];
    const activeFilter = document.querySelector('.filter-btn.active');
    renderIssues(activeFilter ? activeFilter.textContent.trim().toLowerCase().replace('🔴 ','').replace('🟢 ','') : 'all');
  } catch(e) {
    const c = document.getElementById('issuesList');
    if (c) c.innerHTML = `<div style="text-align:center;padding:32px;color:#e53935">
      ⚠️ Could not load issues. Check the Apps Script URL in the dashboard.<br>
      <small style="color:#9e9e9e">Make sure the URL is set and the web app is deployed as "Anyone can access".</small>
    </div>`;
  }
  issuesLoading = false;
}

function filterIssues(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderIssues(type);
}

function renderIssues(filter) {
  const d = currentUser.designation;
  const canReply = ['TH','RH'].includes(d);
  const isBM = d === 'BM';

  let visible = issuesCache;
  if (isBM) {
    visible = issuesCache.filter(i => i.bm && i.bm.toLowerCase() === currentUser.name.toLowerCase());
  }
  if (filter === 'open')   visible = visible.filter(i => i.status === 'open');
  if (filter === 'closed') visible = visible.filter(i => i.status === 'closed');

  const container = document.getElementById('issuesList');
  if (!container) return;

  if (visible.length === 0) {
    container.innerHTML = `<div class="empty">${isBM ? 'You have no issues reported yet.' : 'No issues found.'}</div>`;
    return;
  }

  container.innerHTML = visible.map(issue => `
    <div class="issue-card ${issue.status}" id="card_${issue.id}">
      <div class="issue-header">
        <div class="issue-meta">
          <div class="issue-id">${issue.id} &nbsp;·&nbsp; Raised by <b>${issue.bm}</b> &nbsp;·&nbsp; ${issue.createdAt}</div>
          <div class="issue-title">📌 ${issue.channel} &nbsp;|&nbsp; DCID: ${issue.dcid}</div>
          <div class="issue-tags">
            <span class="badge badge-blue">${issue.product}</span>
            <span class="badge badge-grey">${issue.gst}</span>
            <span class="badge badge-orange">${issue.month}</span>
            <span class="status-badge status-${issue.status}">${issue.status}</span>
          </div>
        </div>
      </div>
      <div class="issue-body">
        <b>Remarks:</b> ${issue.remarks}
      </div>
      <div class="replies-section">
        ${(issue.replies||[]).length > 0 ? issue.replies.map(r => `
          <div class="reply-item">
            <div class="reply-meta">💬 ${r.by} <span class="badge badge-blue" style="font-size:10px">${r.role}</span> &nbsp;·&nbsp; ${r.at}</div>
            <div>${r.text}</div>
          </div>
        `).join('') : '<div style="font-size:12px;color:#9e9e9e;margin-bottom:8px">No replies yet.</div>'}
        ${canReply ? `
          <div class="reply-form">
            <input type="text" id="replyInput_${issue.id}" placeholder="Type your reply..." onkeydown="if(event.key==='Enter') postReply('${issue.id}')">
            <button class="btn-reply" style="padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;background:#1a237e;color:#fff" onclick="postReply('${issue.id}')">Reply</button>
            ${issue.status === 'open'
              ? `<button style="padding:8px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;background:#e8f5e9;color:#2e7d32" onclick="toggleStatus('${issue.id}','closed')">✅ Close</button>`

        ` : ''}

  `).join('');
}

async function postReply(issueId) {
  const input = document.getElementById('replyInput_' + issueId);
  if (!input || !input.value.trim()) return;
  const text = input.value.trim();
  input.disabled = true;

  try {
    await apiPost({
      action: 'postReply',
      issueId,
      by: currentUser.name,
      role: currentUser.designation,
      text
    });
    input.value = '';
    await loadIssues();
  } catch(e) {
    alert('Could not post reply. Check internet connection.');
  }
  input.disabled = false;
}

async function toggleStatus(issueId, newStatus) {
  try {
    await apiPost({ action: 'updateStatus', issueId, status: newStatus });
    await loadIssues();
  } catch(e) {
    alert('Could not update status.');
  }
}

<script>
// ========== HIERARCHY VIEW (TH & RH) ==========

// Helper: compute stats for a set of transactions + emp target
function computeStats(txns, emp) {
  const amt   = txns.reduce((s,t) => s+t.amt, 0);
  const ucAmt = txns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
  const cvAmt = txns.filter(t=>t.product==='Used Commercial Vehicle').reduce((s,t)=>s+t.amt,0);
  const ncvAmt= txns.filter(t=>t.product==='New Commercial Vehicle').reduce((s,t)=>s+t.amt,0);
  const ucTgt = emp ? (emp.uc_tgt||0)*1e5 : 0;
  const cvTgt = emp ? (emp.cv_tgt||0)*1e5 : 0;
  const tgt   = ucTgt + cvTgt;
  const ach   = tgt > 0 ? pct(amt,tgt) : 0;
  const cases = txns.length;
  const ch    = (() => {
    const bmCh = {};
    txns.forEach(t => { if (!bmCh[t.bm]||t.ch_check>bmCh[t.bm]) bmCh[t.bm]=t.ch_check; });
    return Object.values(bmCh).reduce((s,v)=>s+v,0);
  })();
  return { amt, ucAmt, cvAmt:cvAmt+ncvAmt, tgt, ach, cases, ch };
}

function achBadge(p) {
  const cls = p>=100?'badge-green':p>=70?'badge-blue':p>=50?'badge-orange':'badge-red';
  return `<span class="badge ${cls}">${p}%</span>`;
}

function statRow(label, val, tgt, ach) {
  const bar = tgt>0 ? `<div class="progress-wrap" style="width:80px;display:inline-block;vertical-align:middle;margin-left:6px"><div class="progress-bar ${ach>=100?'bar-green':ach>=70?'bar-green':'bar-orange'}" style="width:${Math.min(ach,100)}%"></div></div>` : '';
  return `<span style="color:#666;font-size:12px">${label}:</span> <b>${fmtCr(val)}</b>${tgt>0?` / ${fmtCr(tgt)} ${achBadge(ach)}${bar}`:''}`;
}

// ─────────────────────────────────────────────
// MAIN BUILD FUNCTION
// ─────────────────────────────────────────────
function buildHierarchy(el) {
  const d = currentUser.designation;

  if (d === 'TH') {
    buildTHHierarchy(el);
  } else if (d === 'RH') {
    buildRHHierarchy(el);
  }
}

// ─────────────────────────────────────────────
// TH VIEW: AM-wise → click → BM-wise inside AM
// ─────────────────────────────────────────────
function buildTHHierarchy(el) {
  // Get all AMs under this TH from transactions
  const amMap = {};
  myTxns.forEach(t => {
    const amKey = t.am && t.am !== '-' ? t.am : '__direct__';
    if (!amMap[amKey]) amMap[amKey] = [];
    amMap[amKey].push(t);
  });

  // TH total stats
  const thEmp = EMP_DATA.find(e => e.name.toLowerCase() === currentUser.name.toLowerCase());
  const thStats = computeStats(myTxns, thEmp);

  let html = `
    <!-- TH Summary KPIs -->
    <div class="kpi-grid" style="margin-bottom:20px">
      <div class="kpi">
        <div class="kpi-label">TH Total Disbursement</div>
        <div class="kpi-value">${fmtCr(thStats.amt)}</div>
        <div class="kpi-sub">Target: ${fmtCr(thStats.tgt)} &nbsp;|&nbsp; ${achBadge(thStats.ach)}</div>
        <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(thStats.ach,100)}%"></div></div>
      </div>
      <div class="kpi"><div class="kpi-label">UC</div><div class="kpi-value" style="font-size:22px">${fmtCr(thStats.ucAmt)}</div></div>
      <div class="kpi"><div class="kpi-label">CV</div><div class="kpi-value" style="font-size:22px">${fmtCr(thStats.cvAmt)}</div></div>
      <div class="kpi"><div class="kpi-label">Total Cases</div><div class="kpi-value">${thStats.cases}</div></div>
    </div>

    <div class="section-title">AM-wise Performance</div>
  `;

  // Sort AMs by disbursement
  const amEntries = Object.entries(amMap).sort((a,b) => 
    b[1].reduce((s,t)=>s+t.amt,0) - a[1].reduce((s,t)=>s+t.amt,0)
  );

  amEntries.forEach(([amName, amTxns]) => {
    const displayName = amName === '__direct__' ? 'Direct to TH (No AM)' : amName;
    const amEmp = amName !== '__direct__' ? EMP_DATA.find(e => e.name.toLowerCase() === amName.toLowerCase()) : null;
    const amStats = computeStats(amTxns, amEmp);
    const amId = 'am_' + amName.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');

    // BMs under this AM
    const bmMap = {};
    amTxns.forEach(t => {
      if (!bmMap[t.bm]) bmMap[t.bm] = [];
      bmMap[t.bm].push(t);
    });
    const bmRows = Object.entries(bmMap).sort((a,b) =>
      b[1].reduce((s,t)=>s+t.amt,0) - a[1].reduce((s,t)=>s+t.amt,0)
    );

    html += `
      <!-- AM Card -->
      <div style="background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:16px;overflow:hidden;border-left:4px solid #283593">
        <!-- AM Header (clickable) -->
        <div onclick="toggleSection('${amId}')" style="padding:16px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
              <span style="font-size:15px;font-weight:700;color:#1a237e">${amName==='__direct__'?'📋':''} ${displayName}</span>
              <span class="badge badge-blue">AM</span>
              ${amEmp ? achBadge(amStats.ach) : '<span class="badge badge-grey">No Target</span>'}
            </div>
            <div style="margin-top:8px;display:flex;gap:20px;flex-wrap:wrap">
              <span style="font-size:13px">${statRow('Disb', amStats.amt, amStats.tgt, amStats.ach)}</span>
              <span style="font-size:12px;color:#666">UC: <b>${fmtCr(amStats.ucAmt)}</b></span>
              <span style="font-size:12px;color:#666">CV: <b>${fmtCr(amStats.cvAmt)}</b></span>
              <span style="font-size:12px;color:#666">Cases: <b>${amStats.cases}</b></span>
              <span style="font-size:12px;color:#666">BMs: <b>${bmRows.length}</b></span>
            </div>
          </div>
          <div style="font-size:20px;color:#9e9e9e;margin-left:12px" id="arr_${amId}">▼</div>
        </div>

        <!-- BM Table (collapsed by default) -->
        <div id="${amId}" style="display:none;padding:0 20px 16px">
          <table>
            <thead>
              <tr>
                <th>BM Name</th><th>Tier</th>
                <th>Disbursement</th><th>UC Target</th><th>CV Target</th><th>% Ach</th>
                <th>UC</th><th>CV</th><th>Cases</th><th>Channels</th>
              </tr>
            </thead>
            <tbody>
              ${bmRows.map(([bmName, bmTxns]) => {
                const bmEmp = resolveEmpName(bmName);
                const bmStats = computeStats(bmTxns, bmEmp);
                const tier = bmEmp ? bmEmp.tier || '—' : '—';
                const ucTgt = bmEmp ? fmtCr((bmEmp.uc_tgt||0)*1e5) : '—';
                const cvTgt = bmEmp ? fmtCr((bmEmp.cv_tgt||0)*1e5) : '—';
                const bmCh = Math.max(...bmTxns.map(t=>t.ch_check||0), 0);
                return `<tr>
                  <td><b>${bmName}</b></td>
                  <td><span class="badge badge-grey">${tier}</span></td>
                  <td><b>${fmtCr(bmStats.amt)}</b></td>
                  <td style="font-size:12px;color:#666">${ucTgt}</td>
                  <td style="font-size:12px;color:#666">${cvTgt}</td>
                  <td>${bmStats.tgt > 0 ? achBadge(bmStats.ach) : '<span class="badge badge-grey">—</span>'}</td>
                  <td style="font-size:12px">${fmtCr(bmStats.ucAmt)}</td>
                  <td style="font-size:12px">${fmtCr(bmStats.cvAmt)}</td>
                  <td>${bmStats.cases}</td>
                  <td>${bmCh}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  });

  el.innerHTML = html;
}

// ─────────────────────────────────────────────
// RH VIEW: TH-wise + Direct AM-wise → click → BM-wise
// Handles: RH→TH→AM→BM  AND  RH→AM→BM (direct)
// ─────────────────────────────────────────────
function buildRHHierarchy(el) {
  const rhEmp = EMP_DATA.find(e => e.name.toLowerCase() === currentUser.name.toLowerCase() || e.name.toLowerCase().includes('panigrahy'));
  const rhStats = computeStats(myTxns, rhEmp);

  // Split: transactions under a TH vs direct to RH (no TH)
  const underTH  = myTxns.filter(t => t.th && t.th !== '-' && t.th.trim() !== '');
  const directAM = myTxns.filter(t => !t.th || t.th === '-' || t.th.trim() === '');

  // Group underTH by TH
  const thMap = {};
  underTH.forEach(t => {
    if (!thMap[t.th]) thMap[t.th] = [];
    thMap[t.th].push(t);
  });

  // Group directAM by AM
  const directAMMap = {};
  directAM.forEach(t => {
    const amKey = t.am && t.am !== '-' ? t.am : '__no_am__';
    if (!directAMMap[amKey]) directAMMap[amKey] = [];
    directAMMap[amKey].push(t);
  });

  let html = `
    <!-- RH Summary -->
    <div class="kpi-grid" style="margin-bottom:20px">
      <div class="kpi">
        <div class="kpi-label">Region Total Disbursement</div>
        <div class="kpi-value">${fmtCr(rhStats.amt)}</div>
        <div class="kpi-sub">Target: ${fmtCr(rhStats.tgt)} &nbsp;|&nbsp; ${achBadge(rhStats.ach)}</div>
        <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(rhStats.ach,100)}%"></div></div>
      </div>
      <div class="kpi"><div class="kpi-label">UC</div><div class="kpi-value" style="font-size:22px">${fmtCr(rhStats.ucAmt)}</div></div>
      <div class="kpi"><div class="kpi-label">CV</div><div class="kpi-value" style="font-size:22px">${fmtCr(rhStats.cvAmt)}</div></div>
      <div class="kpi"><div class="kpi-label">Total Cases</div><div class="kpi-value">${rhStats.cases}</div></div>
      <div class="kpi"><div class="kpi-label">Active BMs</div><div class="kpi-value">${new Set(myTxns.map(t=>t.bm)).size}</div></div>
    </div>
  `;

  // ── SECTION 1: TH cards ──────────────────────────────
  const thEntries = Object.entries(thMap).sort((a,b) =>
    b[1].reduce((s,t)=>s+t.amt,0) - a[1].reduce((s,t)=>s+t.amt,0)
  );

  if (thEntries.length > 0) {
    html += `<div class="section-title">TH-wise Performance</div>`;
    thEntries.forEach(([thName, thTxns]) => {
      const thEmp   = EMP_DATA.find(e => e.name.toLowerCase() === thName.toLowerCase());
      const thStats = computeStats(thTxns, thEmp);
      const thId    = 'th_' + thName.replace(/[^a-zA-Z0-9]/g,'_');

      // AMs under this TH
      const amMap = {};
      thTxns.forEach(t => {
        const amKey = t.am && t.am !== '-' ? t.am : '__direct__';
        if (!amMap[amKey]) amMap[amKey] = [];
        amMap[amKey].push(t);
      });
      const amEntries = Object.entries(amMap).sort((a,b) =>
        b[1].reduce((s,t)=>s+t.amt,0) - a[1].reduce((s,t)=>s+t.amt,0)
      );

      html += buildTHCard(thName, thEmp, thStats, thId, amEntries);
    });
  }

  // ── SECTION 2: Direct AM cards (no TH) ──────────────
  const directAMEntries = Object.entries(directAMMap).sort((a,b) =>
    b[1].reduce((s,t)=>s+t.amt,0) - a[1].reduce((s,t)=>s+t.amt,0)
  );

  if (directAMEntries.length > 0) {
    html += `<div class="section-title" style="margin-top:24px">AM Direct to RH (No TH)</div>`;
    directAMEntries.forEach(([amName, amTxns]) => {
      if (amName === '__no_am__') return;
      const amEmp   = EMP_DATA.find(e => e.name.toLowerCase() === amName.toLowerCase());
      const amStats = computeStats(amTxns, amEmp);
      const amId    = 'rham_' + amName.replace(/[^a-zA-Z0-9]/g,'_');

      // BMs under this AM
      const bmMap = {};
      amTxns.forEach(t => {
        if (!bmMap[t.bm]) bmMap[t.bm] = [];
        bmMap[t.bm].push(t);
      });
      const bmRows = Object.entries(bmMap).sort((a,b) =>
        b[1].reduce((s,t)=>s+t.amt,0) - a[1].reduce((s,t)=>s+t.amt,0)
      );

      html += `
        <!-- Direct AM card -->
        <div style="background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:16px;overflow:hidden;border-left:4px solid #00838f">
          <div onclick="toggleSection('${amId}')" style="padding:16px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none">
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                <span style="font-size:15px;font-weight:700;color:#00838f">${amName}</span>
                <span class="badge badge-blue">AM</span>
                <span style="font-size:11px;color:#9e9e9e;font-style:italic">Direct → RH</span>
                ${amEmp ? achBadge(amStats.ach) : '<span class="badge badge-grey">No Target</span>'}
              </div>
              <div style="margin-top:8px;display:flex;gap:16px;flex-wrap:wrap">
                <span style="font-size:13px">${statRow('Disb', amStats.amt, amStats.tgt, amStats.ach)}</span>
                <span style="font-size:12px;color:#555">UC: <b>${fmtCr(amStats.ucAmt)}</b></span>
                <span style="font-size:12px;color:#555">CV: <b>${fmtCr(amStats.cvAmt)}</b></span>
                <span style="font-size:12px;color:#555">Cases: <b>${amStats.cases}</b> | BMs: <b>${bmRows.length}</b></span>
              </div>
            </div>
            <div style="font-size:20px;color:#9e9e9e;margin-left:12px" id="arr_${amId}">▼</div>
          </div>
          <div id="${amId}" style="display:none;padding:0 20px 16px;overflow-x:auto">
            ${buildBMTable(bmRows)}
          </div>
        </div>
      `;
    });
  }

  el.innerHTML = html;
}

// ── Helper: build a TH card with nested AM → BM ──────
function buildTHCard(thName, thEmp, thStats, thId, amEntries) {
  return `
    <div style="background:#fff;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08);margin-bottom:20px;overflow:hidden;border-left:5px solid #1a237e">
      <div onclick="toggleSection('${thId}')" style="padding:18px 22px;cursor:pointer;background:linear-gradient(135deg,#f5f7ff,#fff);display:flex;align-items:center;justify-content:space-between;user-select:none">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <span style="font-size:16px;font-weight:800;color:#1a237e">${thName}</span>
            <span class="badge badge-blue">TH</span>
            ${thEmp ? achBadge(thStats.ach) : '<span class="badge badge-grey">No Target</span>'}
          </div>
          <div style="margin-top:8px;display:flex;gap:20px;flex-wrap:wrap">
            <span style="font-size:13px">${statRow('Disb', thStats.amt, thStats.tgt, thStats.ach)}</span>
            <span style="font-size:12px;color:#555">UC: <b>${fmtCr(thStats.ucAmt)}</b></span>
            <span style="font-size:12px;color:#555">CV: <b>${fmtCr(thStats.cvAmt)}</b></span>
            <span style="font-size:12px;color:#555">Cases: <b>${thStats.cases}</b></span>
            <span style="font-size:12px;color:#555">AMs: <b>${amEntries.length}</b></span>
          </div>
        </div>
        <div style="font-size:22px;color:#9e9e9e;margin-left:12px" id="arr_${thId}">▼</div>
      </div>
      <div id="${thId}" style="display:none;padding:12px 16px 16px">
        ${amEntries.map(([amName, amTxns]) => {
          const displayAM = amName === '__direct__' ? 'Direct BMs (No AM)' : amName;
          const amEmp   = amName !== '__direct__' ? EMP_DATA.find(e => e.name.toLowerCase() === amName.toLowerCase()) : null;
          const amStats = computeStats(amTxns, amEmp);
          const amId    = 'am_' + thId + '_' + amName.replace(/[^a-zA-Z0-9]/g,'_');
          const bmMap   = {};
          amTxns.forEach(t => { if (!bmMap[t.bm]) bmMap[t.bm]=[]; bmMap[t.bm].push(t); });
          const bmRows  = Object.entries(bmMap).sort((a,b)=>b[1].reduce((s,t)=>s+t.amt,0)-a[1].reduce((s,t)=>s+t.amt,0));

          return `
            <div style="background:#f8f9ff;border-radius:10px;margin-bottom:12px;overflow:hidden;border-left:4px solid #283593">
              <div onclick="toggleSection('${amId}')" style="padding:14px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none">
                <div style="flex:1">
                  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                    <span style="font-size:14px;font-weight:700;color:#283593">${displayAM}</span>
                    ${amName !== '__direct__' ? '<span class="badge badge-blue" style="font-size:10px">AM</span>' : ''}
                    ${amEmp ? achBadge(amStats.ach) : ''}
                  </div>
                  <div style="margin-top:6px;display:flex;gap:14px;flex-wrap:wrap">
                    <span style="font-size:12px">${statRow('Disb', amStats.amt, amStats.tgt, amStats.ach)}</span>
                    <span style="font-size:11px;color:#666">UC: <b>${fmtCr(amStats.ucAmt)}</b></span>
                    <span style="font-size:11px;color:#666">CV: <b>${fmtCr(amStats.cvAmt)}</b></span>
                    <span style="font-size:11px;color:#666">Cases: <b>${amStats.cases}</b> | BMs: <b>${bmRows.length}</b></span>
                  </div>
                </div>
                <div style="font-size:18px;color:#9e9e9e;margin-left:10px" id="arr_${amId}">▼</div>
              </div>
              <div id="${amId}" style="display:none;padding:0 16px 14px;overflow-x:auto">
                ${buildBMTable(bmRows)}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

// ── Helper: BM rows table ─────────────────────────────
function buildBMTable(bmRows) {
  if (!bmRows.length) return '<div class="empty">No BMs found.</div>';
  return `
    <table>
      <thead><tr>
        <th>BM Name</th><th>Tier</th>
        <th>Disbursement</th><th>UC Tgt</th><th>CV Tgt</th><th>% Ach</th>
        <th>UC</th><th>CV</th><th>Cases</th><th>Ch</th>
      </tr></thead>
      <tbody>
        ${bmRows.map(([bmName, bmTxns]) => {
          const bmEmp   = resolveEmpName(bmName);
          const bmStats = computeStats(bmTxns, bmEmp);
          const tier    = bmEmp ? bmEmp.tier || '—' : '—';
          const ucTgt   = bmEmp ? fmtCr((bmEmp.uc_tgt||0)*1e5) : '—';
          const cvTgt   = bmEmp ? fmtCr((bmEmp.cv_tgt||0)*1e5) : '—';
          const bmCh    = Math.max(...bmTxns.map(t=>t.ch_check||0), 0);
          return `<tr>
            <td><b style="font-size:12px">${bmName}</b></td>
            <td><span class="badge badge-grey" style="font-size:10px">${tier}</span></td>
            <td><b>${fmtCr(bmStats.amt)}</b></td>
            <td style="font-size:11px;color:#666">${ucTgt}</td>
            <td style="font-size:11px;color:#666">${cvTgt}</td>
            <td>${bmStats.tgt>0 ? achBadge(bmStats.ach) : '<span class="badge badge-grey">—</span>'}</td>
            <td style="font-size:11px">${fmtCr(bmStats.ucAmt)}</td>
            <td style="font-size:11px">${fmtCr(bmStats.cvAmt)}</td>
            <td>${bmStats.cases}</td>
            <td>${bmCh}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

// Toggle expand/collapse
function toggleSection(id) {
  const el = document.getElementById(id);
  const arr = document.getElementById('arr_' + id);
  if (!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  if (arr) arr.textContent = isOpen ? '▼' : '▲';
}
</script>
