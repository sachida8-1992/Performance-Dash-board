// ── Build trend line chart ─────────────────────────────────
function buildTrendChart() {
  const product   = window._trendProduct || 'UC';
  const personSel = document.getElementById('trendPersonFilter');
  const personVal = personSel ? personSel.value : 'all';
  const role      = currentUser.designation;
  const isBM      = role === 'BM';

  // ── Filter transactions ──────────────────────────────────
  function filterProd(arr) {
    if (product === 'UC')  return arr.filter(t => t.product === 'Used Car');
    if (product === 'CV')  return arr.filter(t => t.product !== 'Used Car');
    return arr;
  }
  function filterPerson(arr) {
    if (!personVal || personVal === 'all') return arr;
    if (personVal.startsWith('th_')) {
      const thId = personVal.slice(3);
      const thBmIds = new Set(getEmpData().filter(e=>e.designation==='BM'&&(e.th_id===thId||e.am_id===thId)).map(e=>e.id));
      return arr.filter(t => t.th_id===thId || thBmIds.has(t.bm_id));
    }
    if (personVal.startsWith('am_')) {
      const amId = personVal.slice(3);
      return arr.filter(t => t.am_id===amId);
    }
    return arr;
  }

  const curTxns = filterProd(filterPerson(myTxns.filter(t=>t.date&&t.date.slice(0,7)===getCurMonth())));

  // ── Build date range (working days, current month) ───────
  const todayStr = new Date().toISOString().slice(0,10);
  const monthStr = getCurMonth(); // e.g. '2026-07'
  const allDates = [];
  const monthStart = new Date(monthStr + '-01');
  const rangeEnd   = new Date();
  for (let d = new Date(monthStart); d <= rangeEnd; d.setDate(d.getDate()+1)) {
    if (d.getDay() !== 0) allDates.push(d.toISOString().slice(0,10)); // Mon-Sat
  }

  // ── Daily achievement (cumulative daily totals) ──────────
  const byDate = {};
  curTxns.forEach(t => {
    const d = t.date.slice(0,10);
    byDate[d] = (byDate[d]||0) + t.amt;
  });
  const achData = allDates.map(d => byDate[d] || null); // null = no data yet

  // ── Commitment data from live data ───────────────────────
  const commitData = window._LIVE_DATA && window._LIVE_DATA.commitments ? window._LIVE_DATA.commitments : [];
  function getCommit(date) {
    const rows = commitData.filter(c => c.date === date);
    if (!rows.length) return null;
    let val = 0;
    if (!personVal || personVal === 'all') {
      rows.forEach(c => {
        val += product==='UC' ? (c.uc_commit||0) : product==='CV' ? (c.cv_commit||0) : (c.uc_commit||0)+(c.cv_commit||0);
      });
    } else {
      const pid = personVal.startsWith('th_') ? personVal.slice(3) : personVal.slice(3);
      const row = rows.find(c => c.id===pid);
      if (row) val = product==='UC' ? (row.uc_commit||0) : product==='CV' ? (row.cv_commit||0) : (row.uc_commit||0)+(row.cv_commit||0);
    }
    return val > 0 ? val * 1e5 : null; // stored in L, convert to rupees
  }
  const commitLine = allDates.map(d => getCommit(d));

  // ── Dynamic DRR per day ──────────────────────────────────
  // DRR(day) = shortfall at start of that day / remaining working days after that day
  function getTarget() {
    if (!personVal || personVal === 'all') {
      const emps = getEmpData().filter(e=>e.rh_id===currentUser.id);
      return emps.reduce((s,e)=> s + (product==='UC'?(e.uc_tgt||0):product==='CV'?(e.cv_tgt||0):(e.uc_tgt||0)+(e.cv_tgt||0)), 0)*1e5;
    }
    if (personVal.startsWith('th_')) {
      const thId = personVal.slice(3);
      const emp = getEmpData().find(e=>e.id===thId);
      return emp ? (product==='UC'?(emp.uc_tgt||0):product==='CV'?(emp.cv_tgt||0):(emp.uc_tgt||0)+(emp.cv_tgt||0))*1e5 : 0;
    }
    if (personVal.startsWith('am_')) {
      const amId = personVal.slice(3);
      const emp = getEmpData().find(e=>e.id===amId);
      return emp ? (product==='UC'?(emp.uc_tgt||0):product==='CV'?(emp.cv_tgt||0):(emp.uc_tgt||0)+(emp.cv_tgt||0))*1e5 : 0;
    }
    return 0;
  }
  const totalTgt = getTarget();
  // Build cumulative achievement by day
  let cumAch = 0;
  const drrLine = allDates.map((d, i) => {
    // remaining working days AFTER this day
    const remDays = allDates.slice(i+1).length;
    const shortfall = Math.max(totalTgt - cumAch, 0);
    const drr = remDays > 0 ? shortfall / remDays : null;
    // now add today's ach so next day reflects it
    cumAch += (byDate[d]||0);
    return drr;
  });

  // ── Build chart ──────────────────────────────────────────
  const ctx2 = document.getElementById('chartTrend');
  if (!ctx2) return;
  if (charts.trend) { try { charts.trend.destroy(); } catch(e){} delete charts.trend; }

  const fL = v => v != null ? (v/1e5).toFixed(1)+'L' : '';

  charts.trend = new Chart(ctx2, {
    type: 'line',
    data: {
      labels: allDates.map(d => {
        const dt = new Date(d+'T00:00:00');
        return dt.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
      }),
      datasets: [
        {
          label: 'Achievement',
          data: achData,
          borderColor: '#1565c0',
          backgroundColor: 'rgba(21,101,192,0.08)',
          borderWidth: 2.5,
          pointRadius: 4,
          pointBackgroundColor: achData.map(v => v === 0 ? '#ef5350' : '#1565c0'),
          pointBorderColor: '#fff',
          pointBorderWidth: 1.5,
          tension: 0.3,
          fill: true,
          spanGaps: false,
        },
        {
          label: 'Commitment',
          data: commitLine,
          borderColor: '#2e7d32',
          backgroundColor: 'transparent',
          borderWidth: 2,
          borderDash: [6,4],
          pointRadius: 4,
          pointBackgroundColor: '#2e7d32',
          pointBorderColor: '#fff',
          pointBorderWidth: 1.5,
          tension: 0.3,
          spanGaps: false,
        },
        {
          label: 'DRR (Required)',
          data: drrLine,
          borderColor: '#e65100',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          borderDash: [3,3],
          pointRadius: 2,
          pointBackgroundColor: '#e65100',
          tension: 0.2,
          spanGaps: true,
        }
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: true,
          position: 'top',
          labels: {
            boxWidth: 24,
            font: { size: 11 },
            usePointStyle: true,
            pointStyleWidth: 18,
          }
        },
        tooltip: {
          callbacks: {
            label: ctx => {
              if (ctx.raw == null) return null;
              const lbl = ctx.dataset.label;
              const val = fL(ctx.raw);
              if (lbl === 'Achievement' && ctx.raw === 0) return ' Achievement: 0 — Zero day';
              return ' '+lbl+': '+val;
            }
          }
        }
      },
      scales: {
        y: {
          ticks: { callback: v => fL(v), font: { size: 10 } },
          grid: { color: '#f0f0f0' }
        },
        x: {
          grid: { display: false },
          ticks: { font: { size: 10 }, maxRotation: 45 }
        }
      }
    }
  });

  // ── Zero-days summary (BM only) ──────────────────────────
  if (isBM) {
    const zeroPast = allDates.filter(d => (byDate[d]||0) === 0 && d < todayStr);
    const badgeEl  = document.getElementById('zeroDaysBadge');
    if (badgeEl) {
      badgeEl.innerHTML = zeroPast.length === 0
        ? '<span style="background:#e8f5e9;color:#2e7d32;font-size:12px;font-weight:700;padding:4px 10px;border-radius:12px"> No zero days</span>'
        : '<span style="background:#ffebee;color:#c62828;font-size:12px;font-weight:700;padding:4px 10px;border-radius:12px"> '+zeroPast.length+' zero day'+(zeroPast.length>1?'s':'')+'</span>';
    }
    const detailEl = document.getElementById('zeroDaysDetail');
    if (detailEl && zeroPast.length > 0) {
      detailEl.innerHTML = '<div style="background:#fff5f5;border:1px solid #ffcdd2;border-radius:8px;padding:10px 14px;font-size:12px">'
        +'<span style="color:#c62828;font-weight:700">No activity on: </span>'
        +'<span style="color:#555">'+zeroPast.map(d=>{const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-IN',{day:'numeric',month:'short',weekday:'short'});}).join(' &nbsp;&middot;&nbsp; ')+'</span>'
        +'</div>';
    }
  }
}

// ========== MONTH COMPARISON ==========
let mcFilter = 'UC';

function setMCFilter(f) {
  mcFilter = f;
  ['UC','CV','ALL'].forEach(x => {
    const btn = document.getElementById('mcFilter'+x);
    if (btn) btn.classList.toggle('active', x===f);
  });
  renderMonthCompare();
}

function filterHistorical(dataset, dayLimit) {
  const d  = currentUser.designation;
  const id = currentUser.id;

  // Check hierarchy filter dropdown
  const sel = document.getElementById('mcHierFilter');
  const filterVal = sel ? sel.value : 'all';

  // Update label
  const lbl = document.getElementById('mcFilterLabel');
  if (lbl) lbl.textContent = filterVal === 'all' ? '' : 'Filtered view';

  return dataset.filter(t => {
    if (t.day <= 0 || t.day > dayLimit) return false;

    // First apply user's own hierarchy scope
    let inScope = false;
    if (d === 'BM')      inScope = t.bm_id === id;
    else if (d === 'AM') inScope = t.am_id === id;
    else if (d === 'TH') inScope = t.th_id === id;
    else if (d === 'RH') inScope = t.rh_id === id;
    if (!inScope) return false;

    // Then apply dropdown filter
    if (filterVal === 'all') return true;
    if (filterVal.startsWith('th_')) return t.th_id === filterVal.slice(3);
    if (filterVal.startsWith('am_')) return t.am_id === filterVal.slice(3);
    if (filterVal.startsWith('bm_')) return t.bm_id === filterVal.slice(3);
    return true;
  });
}

function mcProductFilter(txns, filter) {
  if (filter === 'UC')  return txns.filter(t => t.product === 'Used Car');
  if (filter === 'CV')  return txns.filter(t => t.product !== 'Used Car');
  return txns;
}

function renderMonthCompare() {
  const el = document.getElementById('monthCompareBody');
  if (!el) return;

  const dayVal = parseInt(document.getElementById('mcDay')?.value || new Date().getDate());
  const day = Math.max(1, Math.min(31, dayVal));

  const junTxns = mcProductFilter(filterHistorical(getTxnData(), day), mcFilter);
  const mayTxns = mcProductFilter(filterHistorical(getMayData(), day), mcFilter);

  function stats(txns) {
    const amt     = txns.reduce((s,t)=>s+t.amt, 0);
    const cases   = txns.length;
    const isCV    = (currentUser.product||'UC') === 'CV';
    const chSet   = isCV
      ? new Set(txns.filter(t=>t.product!=='Used Car' && t.dcid).map(t=>t.dcid))
      : new Set(txns.filter(t=>t.ch_check>0 && t.dcid).map(t=>t.dcid));
    return { amt, cases, channels: chSet.size };
  }

  const jun = stats(junTxns);
  const may = stats(mayTxns);
  const maxAmt = Math.max(jun.amt, may.amt, 1); // always at least 1 to avoid empty bars

  const label = mcFilter === 'UC' ? 'Used Car' : mcFilter === 'CV' ? 'CV (UCV+NCV)' : 'All Products';
  const months = [
    { label:getCurMonthLabel(), s:jun, color:'#1a237e' },
    { label:getPrevMonthLabel()+' (LMTD day '+getTodayDay()+')', s:may, color:'#283593' },
  ];

  el.innerHTML = `
    <div style="font-size:11px;color:#9e9e9e;margin-bottom:12px">
      ${label} disbursement till day <b>${day}</b> of each month
    </div>
    <div style="display:flex;flex-direction:column;gap:14px">
      ${months.map(m => {
        const barW = Math.round((m.s.amt/maxAmt)*100);
        return `
          <div>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px">
              <div style="width:72px;font-size:11px;font-weight:700;color:#555;flex-shrink:0">${m.label}</div>
              <div style="flex:1">
                <div style="background:#f0f0f0;border-radius:6px;height:28px;overflow:hidden">
                  <div style="background:${m.color};height:100%;width:${barW}%;border-radius:6px;display:flex;align-items:center;padding-left:8px;min-width:${m.s.amt>0?'40px':'0'};transition:width .4s">
                    ${barW > 20 ? `<span style="color:#fff;font-size:11px;font-weight:700">${fmtCr(m.s.amt)}</span>` : ''}
                  </div>
                </div>
              </div>
              ${barW <= 20 ? `<span style="font-size:12px;font-weight:700;color:${m.color};min-width:60px">${fmtCr(m.s.amt)}</span>` : ''}
            </div>
            <div style="padding-left:84px;display:flex;gap:16px">
              <span style="font-size:11px;color:#9e9e9e"> <b style="color:#555">${m.s.cases}</b> cases</span>
              <span style="font-size:11px;color:#9e9e9e"> <b style="color:#555">${m.s.channels}</b> channels</span>
              <span style="font-size:11px;color:#9e9e9e"> <b style="color:#555">${fmtCr(m.s.amt)}</b></span>
            </div>
          </div>`;
      }).join('')}
    </div>
    ${jun.amt > 0 && may.amt > 0 ? `
    <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
      <div style="background:#f5f7ff;border-radius:8px;padding:10px 14px;flex:1;min-width:110px">
        <div style="font-size:11px;color:#9e9e9e;margin-bottom:2px">vs May day ${day}</div>
        <div style="font-size:20px;font-weight:800;color:${jun.amt>=may.amt?'#2e7d32':'#e53935'}">
          ${jun.amt>=may.amt?'▲':'▼'} ${Math.abs(Math.round(((jun.amt-may.amt)/may.amt)*100))}%
        </div>
        <div style="font-size:11px;color:#555">${jun.amt>=may.amt?'+':''}${fmtCr(jun.amt-may.amt)}</div>
      </div>
    </div>` : ''}
  `;
}

function getActiveChannels() {
  const d    = currentUser.designation;
  const isCV = (currentUser.product || 'UC') === 'CV';
  if (d === 'BM') {
    if (isCV) {
      // CV BM: count unique DCIDs across all CV product transactions
      return new Set(myTxns.filter(t => t.product !== 'Used Car' && t.dcid).map(t => t.dcid)).size;
    }
    // UC BM: unique DCIDs with ch_check > 0
    return new Set(myTxns.filter(t => t.ch_check > 0 && t.dcid).map(t => t.dcid)).size;
  } else {
    // AM/TH/RH: sum of active channels per BM
    const bmMap = {};
    myTxns.forEach(t => {
      if (!bmMap[t.bm_id]) bmMap[t.bm_id] = new Set();
      if (t.ch_check > 0 && t.dcid) bmMap[t.bm_id].add(t.dcid);
    });
    return Object.values(bmMap).reduce((s, set) => s + set.size, 0);
  }
}

// ========== RH PERFORMANCE TABLE ==========
function buildRHPerfTable() {
  const el = document.getElementById('rhPerfTableBody');
  if (!el) return;

  const today      = new Date();
  const todayStr   = today.toISOString().slice(0,10);
  const yest       = new Date(today); yest.setDate(yest.getDate() - 1);
  const yesterdayStr = yest.toISOString().slice(0,10);
  const mtdDay     = today.getDate();
  const remaining  = getRemainingWorkingDays();
  const allEmps    = getEmpData();
  const juneTxns   = getTxnData().filter(t => t.date && t.date.startsWith(getCurMonth()));
  const mayTxns    = toLMTD(getMayData());

  // Build row data for each person — separate UC and CV
  function buildRows(product) {
    const isUC = product === 'UC';
    function pf(arr) { return isUC ? arr.filter(t => t.product === 'Used Car') : arr.filter(t => t.product !== 'Used Car'); }
    function getTgt(empId) {
      const emp = allEmps.find(e => e.id === empId);
      if (!emp) return 0;
      return isUC ? (emp.uc_tgt||0)*1e5 : (emp.cv_tgt||0)*1e5;
    }

    const RH_ID = currentUser.id;
    const rows  = [];
    const seenTH = new Set();

    allEmps.filter(e => e.designation === 'AM' && e.rh_id === RH_ID).forEach(amEmp => {
      const thId  = amEmp.th_id;
      const thEmp = allEmps.find(e => e.id === thId && e.designation === 'TH');

      if (thEmp && thId !== RH_ID) {
        if (seenTH.has(thId)) return;
        seenTH.add(thId);
        const jTxns  = pf(juneTxns.filter(t => t.th_id === thId));
        const mTxns  = pf(mayTxns.filter(t => t.th_id === thId && (t.day||0) <= mtdDay));
        const ftTxns = pf(juneTxns.filter(t => t.th_id === thId && t.date === todayStr));
        const ypTxns = pf(juneTxns.filter(t => t.th_id === thId && t.date === yesterdayStr));
        const mtd   = jTxns.reduce((s,t) => s+t.amt, 0);
        const lmtd  = mTxns.reduce((s,t) => s+t.amt, 0);
        const ftd   = ftTxns.reduce((s,t) => s+t.amt, 0);
        const yp    = ypTxns.reduce((s,t) => s+t.amt, 0);
        const tgt   = getTgt(thId);
        const short = Math.max(tgt - mtd, 0);
        const drr   = remaining > 0 && short > 0 ? short / remaining : 0;
        const vLMTD = mtd - lmtd;
        const states = [...new Set(jTxns.map(t => t.state||'').filter(Boolean))].join(', ') || '—';
        rows.push({ id: thId, label: thEmp.name, subLabel: '(TH)', states, tgt, mtd, lmtd, ftd, yp, short, vLMTD, drr, cases: jTxns.length, isTH: true });
      } else {
        const jTxns  = pf(juneTxns.filter(t => t.am_id === amEmp.id));
        const mTxns  = pf(mayTxns.filter(t => t.am_id === amEmp.id && (t.day||0) <= mtdDay));
        const ftTxns = pf(juneTxns.filter(t => t.am_id === amEmp.id && t.date === todayStr));
        const ypTxns = pf(juneTxns.filter(t => t.am_id === amEmp.id && t.date === yesterdayStr));
        const mtd   = jTxns.reduce((s,t) => s+t.amt, 0);
        const lmtd  = mTxns.reduce((s,t) => s+t.amt, 0);
        const ftd   = ftTxns.reduce((s,t) => s+t.amt, 0);
        const yp    = ypTxns.reduce((s,t) => s+t.amt, 0);
        const tgt   = getTgt(amEmp.id);
        const short = Math.max(tgt - mtd, 0);
        const drr   = remaining > 0 && short > 0 ? short / remaining : 0;
        const vLMTD = mtd - lmtd;
        const states = [...new Set(jTxns.map(t => t.state||'').filter(Boolean))].join(', ') || '—';
        rows.push({ id: amEmp.id, label: amEmp.name, subLabel: '(AM)', states, tgt, mtd, lmtd, ftd, yp, short, vLMTD, drr, cases: jTxns.length, isTH: false });
      }
    });

    allEmps.filter(e => e.designation === 'TH' && e.rh_id === RH_ID && !seenTH.has(e.id)).forEach(thEmp => {
      seenTH.add(thEmp.id);
      const jTxns  = pf(juneTxns.filter(t => t.th_id === thEmp.id));
      const mTxns  = pf(mayTxns.filter(t => t.th_id === thEmp.id && (t.day||0) <= mtdDay));
      const ftTxns = pf(juneTxns.filter(t => t.th_id === thEmp.id && t.date === todayStr));
      const ypTxns = pf(juneTxns.filter(t => t.th_id === thEmp.id && t.date === yesterdayStr));
      const mtd   = jTxns.reduce((s,t) => s+t.amt, 0);
      const lmtd  = mTxns.reduce((s,t) => s+t.amt, 0);
      const ftd   = ftTxns.reduce((s,t) => s+t.amt, 0);
      const yp    = ypTxns.reduce((s,t) => s+t.amt, 0);
      const tgt   = getTgt(thEmp.id);
      const short = Math.max(tgt - mtd, 0);
      const drr   = remaining > 0 && short > 0 ? short / remaining : 0;
      const vLMTD = mtd - lmtd;
      const states = [...new Set(jTxns.map(t => t.state||'').filter(Boolean))].join(', ') || '—';
      rows.push({ id: thEmp.id, label: thEmp.name, subLabel: '(TH)', states, tgt, mtd, lmtd, ftd, yp, short, vLMTD, drr, cases: jTxns.length, isTH: true });
    });

    rows.sort((a,b) => b.mtd - a.mtd);
    return rows;
  }

  function fmtL(v) { return (v/1e5).toFixed(2)+'L'; }
  function shortCell(v) {
    return v <= 0
      ? '<span style="color:#2e7d32;font-weight:700">On Track</span>'
      : '<span style="color:#c62828;font-weight:700">'+fmtL(v)+'</span>';
  }
  function diffCell(v) {
    const c = v >= 0 ? '#2e7d32' : '#c62828';
    return '<span style="color:'+c+';font-weight:700">'+(v>=0?'+':'')+fmtL(v)+'</span>';
  }

  function renderTable(rows, product, color) {
    if (!rows.length) return '<div style="color:#9e9e9e;padding:8px;font-size:12px">No '+product+' data</div>';
    const totMTD  = rows.reduce((s,r) => s+r.mtd, 0);
    const totLMTD = rows.reduce((s,r) => s+r.lmtd, 0);
    const totFTD  = rows.reduce((s,r) => s+r.ftd, 0);
    const totYP   = rows.reduce((s,r) => s+(r.yp||0), 0);
    const totTGT  = rows.reduce((s,r) => s+r.tgt, 0);
    const totShort= rows.reduce((s,r) => s+r.short, 0);
    const totCases= rows.reduce((s,r) => s+r.cases, 0);
    const prefix  = product.toLowerCase();

    let h = '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;min-width:900px">';
    h += '<thead><tr style="background:'+color+'">';
    h += '<th style="padding:8px 10px;text-align:left;color:#fff;white-space:nowrap">State</th>';
    h += '<th style="padding:8px 10px;text-align:left;color:#fff;white-space:nowrap">Name</th>';
    h += '<th style="padding:8px 10px;text-align:left;color:#fff;white-space:nowrap">Role</th>';
    h += '<th style="padding:8px 10px;text-align:right;color:#fff;white-space:nowrap">TGT</th>';
    h += '<th style="padding:8px 10px;text-align:right;color:#fff;white-space:nowrap">MTD ACH</th>';
    h += '<th style="padding:8px 10px;text-align:right;color:#fff;white-space:nowrap">Short</th>';
    h += '<th style="padding:8px 10px;text-align:right;color:#fff;white-space:nowrap">LMTD ACH</th>';
    h += '<th style="padding:8px 10px;text-align:right;color:#fff;white-space:nowrap">MTD vs LMTD</th>';
    h += '<th style="padding:8px 10px;text-align:right;color:#fff;white-space:nowrap">DRR</th>';
    h += '<th style="padding:8px 10px;text-align:right;color:#fff;white-space:nowrap">YP</th>';
    h += '<th style="padding:8px 10px;text-align:center;color:#fff;white-space:nowrap">Commitment</th>';
    h += '<th style="padding:8px 10px;text-align:right;color:#fff;white-space:nowrap">FTD Ach</th>';
    h += '</tr></thead><tbody>';

    rows.forEach((r, i) => {
      const bg = i%2===0 ? '#f8f9ff' : '#fff';
      const roleBadge = r.isTH
        ? '<span style="background:#e8eaf6;color:#3949ab;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700">TH</span>'
        : '<span style="background:#e8f5e9;color:#2e7d32;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700">AM</span>';
      // Load commitment from live data (sheet-based, loaded via data.json)
      const _today = new Date().toISOString().slice(0,10);
      if (!window._rhCommit) window._rhCommit = {};
      // Pre-populate from live data on first render
      if (!window._rhCommitLoaded) {
        window._rhCommitLoaded = true;
        const commits = window._LIVE_DATA && window._LIVE_DATA.commitments ? window._LIVE_DATA.commitments : [];
        commits.filter(c=>c.date===_today).forEach(c=>{
          const ucKey = 'uc_'+c.id; const cvKey = 'cv_'+c.id;
          if (c.uc_commit) window._rhCommit[ucKey] = c.uc_commit+'L';
          if (c.cv_commit) window._rhCommit[cvKey] = c.cv_commit+'L';
        });
      }
      const savedCommit = window._rhCommit[prefix+'_'+r.id] || '';
      h += '<tr style="background:'+bg+';border-bottom:1px solid #e8eaf6">';
      h += '<td style="padding:7px 10px;color:#455a64;font-size:11px">'+r.states+'</td>';
      h += '<td style="padding:7px 10px;font-weight:700;color:'+(r.isTH?'#3949ab':'#1a237e')+'">'+r.label+'</td>';
      h += '<td style="padding:7px 10px">'+roleBadge+'</td>';
      h += '<td style="padding:7px 10px;text-align:right;color:#546e7a">'+(r.tgt>0?fmtL(r.tgt):'—')+'</td>';
      h += '<td style="padding:7px 10px;text-align:right;font-weight:700;color:#1565c0">'+fmtL(r.mtd)+'</td>';
      h += '<td style="padding:7px 10px;text-align:right">'+shortCell(r.short)+'</td>';
      h += '<td style="padding:7px 10px;text-align:right;color:#546e7a">'+fmtL(r.lmtd)+'</td>';
      h += '<td style="padding:7px 10px;text-align:right">'+diffCell(r.vLMTD)+'</td>';
      h += '<td style="padding:7px 10px;text-align:right;color:#e65100;font-weight:600">'+(r.drr>0?fmtL(r.drr)+'/day':'—')+'</td>';
      h += '<td style="padding:7px 10px;text-align:right;font-weight:700;color:'+((r.yp||0)>0?'#6a1b9a':'#9e9e9e')+'">'+(r.yp>0?fmtL(r.yp):'—')+'</td>';
      const commitKey = prefix + '_' + r.id;
      h += '<td style="padding:5px 8px;text-align:center"><input type="text" placeholder="e.g. 50L" value="'+savedCommit+'"'
          +' data-key="'+commitKey+'" data-pid="'+r.id+'" data-pname="'+r.label+'" data-prole="'+(r.isTH?'TH':'AM')+'" data-product="'+prefix+'"'
          +' oninput="saveCommitmentToSheet(this)"'
          +' style="width:80px;padding:4px 6px;border:1.5px solid #c5cae9;border-radius:6px;font-size:11px;text-align:center;color:#1a237e;font-weight:600"></td>';
      h += '<td style="padding:7px 10px;text-align:right;font-weight:700;color:'+(r.ftd>0?'#2e7d32':'#9e9e9e')+'">'+(r.ftd>0?fmtL(r.ftd):'—')+'</td>';
      h += '</tr>';
    });

    h += '<tr style="background:#e8eaf6;font-weight:700;border-top:2px solid '+color+'">';
    h += '<td style="padding:8px 10px;color:'+color+'" colspan="3">TOTAL ('+totCases+' cases)</td>';
    h += '<td style="padding:8px 10px;text-align:right;color:'+color+'">'+(totTGT>0?fmtL(totTGT):'—')+'</td>';
    h += '<td style="padding:8px 10px;text-align:right;color:#1565c0">'+fmtL(totMTD)+'</td>';
    h += '<td style="padding:8px 10px;text-align:right">'+shortCell(totShort)+'</td>';
    h += '<td style="padding:8px 10px;text-align:right;color:#546e7a">'+fmtL(totLMTD)+'</td>';
    h += '<td style="padding:8px 10px;text-align:right">'+diffCell(totMTD-totLMTD)+'</td>';
    h += '<td></td>';
    h += '<td style="padding:8px 10px;text-align:right;color:#6a1b9a;font-weight:700">'+(totYP>0?fmtL(totYP):'—')+'</td>';
    h += '<td></td>';
    h += '<td style="padding:8px 10px;text-align:right;color:#2e7d32">'+(totFTD>0?fmtL(totFTD):'—')+'</td>';
    h += '</tr></tbody></table></div>';
    return h;
  }

  const ucRows = buildRows('UC');
  const cvRows = buildRows('CV');

  el.innerHTML =
    // UC Table
    '<div style="margin-bottom:20px">'
    +'<div style="font-size:12px;font-weight:800;color:#1565c0;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;padding:6px 12px;background:#e3f2fd;border-radius:6px;display:inline-block">Used Car (UC)</div>'
    +renderTable(ucRows,'UC','#1565c0')
    +'</div>'
    // CV Table
    +'<div>'
    +'<div style="font-size:12px;font-weight:800;color:#6a1b9a;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;padding:6px 12px;background:#f3e5f5;border-radius:6px;display:inline-block">Commercial Vehicle (CV)</div>'
    +renderTable(cvRows,'CV','#6a1b9a')
    +'</div>'
    +'<div style="font-size:10px;color:#9e9e9e;margin-top:10px;padding-left:4px">'
    +'MTD = Month till date &nbsp;|&nbsp; LMTD = Last month same days (till '+mtdDay+') &nbsp;|&nbsp; FTD = Today &nbsp;|&nbsp; YP = Yesterday &nbsp;|&nbsp; DRR = Daily Required Rate &nbsp;|&nbsp; Commitment = Enter expected achievement for today'
    +'</div>';
}

// ========== CHANNELS ==========
function buildChannels(el) {
  const d = currentUser.designation;

  if (d === 'BM') {
    const isCV = (currentUser.product || 'UC') === 'CV';
    const chActive  = new Set(myTxns.filter(t=>t.ch_check>0).map(t=>t.dcid)).size;
    const chTgt     = currentUser.ch_tgt || 0;
    const ucDealers = new Set(bmTxns.filter(t=>t.product==='Used Car' && t.dcid).map(t=>t.dcid)).size;
    const ucvDealers= new Set(myTxns.filter(t=>t.product==='Used Commercial Vehicle' && t.dcid).map(t=>t.dcid)).size;
    const allDealers= new Set(myTxns.filter(t=>t.dcid).map(t=>t.dcid)).size;

    if (isCV) {
      // CV BM — show UCV & NCV dealer breakdown, no dealer bonus section
      const ncvDealers = new Set(myTxns.filter(t=>t.product==='New Commercial Vehicle' && t.dcid).map(t=>t.dcid)).size;
      el.innerHTML = `
        <div class="kpi-grid">
          <div class="kpi">
            <div class="kpi-label">Total Active Dealers</div>
            <div class="kpi-value">${allDealers}</div>
            <div class="kpi-sub">Unique DCIDs this month</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">UCV Dealers</div>
            <div class="kpi-value">${ucvDealers}</div>
            <div class="kpi-sub">Used Commercial Vehicle</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">NCV Dealers</div>
            <div class="kpi-value">${ncvDealers}</div>
            <div class="kpi-sub">New Commercial Vehicle</div>
          </div>
          ${ucDealers > 0 ? `<div class="kpi">
            <div class="kpi-label">UC Dealers</div>
            <div class="kpi-value">${ucDealers}</div>
            <div class="kpi-sub">Used Car</div>
          </div>` : ''}
        </div>
        <div class="card">
          <div class="card-title">Dealer-wise Disbursement</div>
          ${(() => {
            const dm = {};
            myTxns.forEach(t => {
              if (!dm[t.dcid]) dm[t.dcid] = {dealer:t.dealer, dcid:t.dcid, amt:0, cases:0, product:t.product};
              dm[t.dcid].amt += t.amt; dm[t.dcid].cases++;
            });
            const list = Object.values(dm).sort((a,b)=>b.amt-a.amt);
            if (!list.length) return '<div class="empty">No dealer data.</div>';
            return `<table><thead><tr><th>#</th><th>Dealer</th><th>DCID</th><th>Product</th><th>Cases</th><th>Disbursement</th></tr></thead><tbody>
              ${list.map((d,i)=>`<tr>
                <td style="color:#9e9e9e">${i+1}</td>
                <td><b>${d.dealer}</b></td>
                <td style="font-size:11px;color:#9e9e9e">${d.dcid}</td>
                <td><span class="chip ${d.product==='Used Car'?'chip-uc':d.product==='Used Commercial Vehicle'?'chip-cv':'chip-ncv'}">${d.product==='Used Car'?'UC':d.product==='Used Commercial Vehicle'?'UCV':'NCV'}</span></td>
                <td>${d.cases}</td>
                <td><b>${fmtCr(d.amt)}</b></td>
              </tr>`).join('')}
            </tbody></table>`;
          })()}
        </div>
      `;
    } else {
      // UC BM — channel stats + dealer bonus + dealer table
      el.innerHTML = `
        <div class="kpi-grid">
          <div class="kpi">
            <div class="kpi-label">Active Channels</div>
            <div class="kpi-value">${chActive}</div>
            <div class="kpi-sub">Target: ${chTgt}</div>
            <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(chTgt>0?Math.round(chActive/chTgt*100):0,100)}%"></div></div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Unique UC Dealers</div>
            <div class="kpi-value">${ucDealers}</div>
            <div class="kpi-sub">Used for dealer bonus</div>
          </div>
        </div>
        <div class="card">
          <div class="card-title">Dealer Bonus Eligibility</div>
          <div style="padding:8px 0">${getDealerBonusInfo(ucDealers)}</div>
        </div>
        <div class="card" style="padding:0;overflow:hidden">
          <div style="padding:14px 20px;background:#f5f7ff;font-size:13px;font-weight:700;color:#1a237e">
            Dealer-wise Performance
          </div>
          ${(() => {
            const dm = {};
            myTxns.forEach(t => {
              const key = t.dcid || t.dealer;
              if (!dm[key]) dm[key] = {dealer:t.dealer, dcid:t.dcid, amt:0, cases:0, products:new Set()};
              dm[key].amt += t.amt;
              dm[key].cases++;
              dm[key].products.add(t.product);
            });
            const list = Object.values(dm).sort((a,b) => b.amt - a.amt);
            const maxAmt = list[0]?.amt || 1;
            if (!list.length) return '<div class="empty">No dealer data.</div>';
            return `<div style="overflow-x:auto"><table>
              <thead><tr>
                <th>#</th><th>Dealer Name</th><th>Products</th><th>Cases</th><th>Disbursement</th><th>Share</th>
              </tr></thead>
              <tbody>
                ${list.map((d,i) => `<tr>
                  <td style="color:#9e9e9e">${i+1}</td>
                  <td><b>${d.dealer}</b><div style="font-size:10px;color:#bbb">${d.dcid||''}</div></td>
                  <td>${[...d.products].map(p =>
                    p==='Used Car'?'<span class="chip chip-uc">UC</span>':
                    p==='Used Commercial Vehicle'?'<span class="chip chip-cv">UCV</span>':
                    '<span class="chip chip-ncv">NCV</span>'
                  ).join('')}</td>
                  <td>${d.cases}</td>
                  <td><b>${fmtCr(d.amt)}</b></td>
                  <td style="min-width:90px"><div class="progress-wrap"><div class="progress-bar bar-green" style="width:${pct(d.amt,maxAmt)}%"></div></div></td>
                </tr>`).join('')}
              </tbody>
            </table></div>`;
          })()}
        </div>
      `;
    }
  } else {
    // Show BM-level channel summary with May comparison
    const mayData = getMayData();
    const bmMap = {};

    // June data
    myTxns.forEach(t => {
      const key = t.bm_id || t.bm;
      if (!bmMap[key]) bmMap[key] = {bm_id:t.bm_id, bm:t.bm, ucChJune:new Set(), cvChJune:new Set(), amt:0};
      // UC active channels (ch_check > 0, UC product)
      if (t.product==='Used Car' && t.ch_check > 0 && t.dcid) bmMap[key].ucChJune.add(t.dcid);
      // CV unique channels (any CV/NCV dcid)
      if (t.product!=='Used Car' && t.dcid) bmMap[key].cvChJune.add(t.dcid);
      bmMap[key].amt += t.amt;
    });

    // Also add zero-txn BMs in scope
    getEmpData().forEach(e => {
      if (e.designation !== 'BM') return;
      const d2 = currentUser.designation;
      const inScope = d2==='RH' ? e.rh_id===currentUser.id
                    : d2==='TH' ? e.th_id===currentUser.id
                    : d2==='AM' ? e.am_id===currentUser.id : false;
      if (inScope && !bmMap[e.id]) bmMap[e.id] = {bm_id:e.id, bm:e.name.toLowerCase(), ucChJune:new Set(), cvChJune:new Set(), amt:0};
    });

    const rows = Object.values(bmMap);
    rows.forEach(r => {
      const emp = resolveEmpById(r.bm_id);
      r.chTgt    = emp ? (emp.ch_tgt || 0) : 0;
      r.dispName = emp ? emp.name : r.bm;
      // May UC active channels
      const mayBM = mayData.filter(m => m.bm_id === r.bm_id);
      r.ucChMay = new Set(mayBM.filter(m => m.product==='Used Car' && m.ch_check > 0 && m.dcid).map(m => m.dcid));
    });

    // Sort by June UC channels desc
    rows.sort((a,b) => b.ucChJune.size - a.ucChJune.size);

    el.innerHTML = `
      <div class="card" style="padding:0;overflow:hidden">
        <div style="padding:14px 20px;background:#f5f7ff;font-size:13px;font-weight:700;color:#1a237e">
          BM Channel Performance — ${getCurMonthLabel()}
        </div>
        <div style="overflow-x:auto">
        <table>
          <thead>
            <tr style="background:#e8eaf6">
              <th style="text-align:left">BM Name</th>
              <th style="text-align:center">CH Target</th>
              <th style="text-align:center">${getCurMonthLabel().split(' ')[0]} UC Ch</th>
              <th style="text-align:center">Ach%</th>
              <th style="text-align:center">${getPrevMonthLabel().split(' ')[0]} UC Ch</th>
              <th style="text-align:center">Growth</th>
              <th style="text-align:center">${getCurMonthLabel().split(' ')[0]} CV Ch</th>
              <th style="text-align:right">Disbursement</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => {
              const juneUC = r.ucChJune.size;
              const mayUC  = r.ucChMay.size;
              const juneCVch = r.cvChJune.size;
              const p = r.chTgt > 0 ? Math.round((juneUC / r.chTgt) * 100) : 0;
              const growth = juneUC - mayUC;
              const growthColor = growth > 0 ? '#2e7d32' : growth < 0 ? '#c62828' : '#757575';
              const growthStr  = growth > 0 ? '+'+growth : growth === 0 ? '=' : ''+growth;
              const badgeCls = p>=100?'badge-green':p>=70?'badge-blue':p>=50?'badge-orange':'badge-red';
              return `<tr style="border-bottom:1px solid #f0f0f0">
                <td style="padding:8px 12px"><b style="font-size:12px">${r.dispName}</b></td>
                <td style="text-align:center;padding:8px 12px;color:#546e7a;font-weight:600">${r.chTgt||'—'}</td>
                <td style="text-align:center;padding:8px 12px;font-weight:700;color:#1a237e;font-size:15px">${juneUC}</td>
                <td style="text-align:center;padding:8px 12px">
                  ${r.chTgt>0 ? `<span class="badge ${badgeCls}">${p}%</span>` : '—'}
                </td>
                <td style="text-align:center;padding:8px 12px;color:#546e7a">${mayUC}</td>
                <td style="text-align:center;padding:8px 12px;font-weight:700;color:${growthColor};font-size:14px">${growthStr}</td>
                <td style="text-align:center;padding:8px 12px;color:#6a1b9a;font-weight:600">${juneCVch > 0 ? juneCVch : '—'}</td>
                <td style="text-align:right;padding:8px 12px"><b>${fmtCr(r.amt)}</b></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        </div>
      </div>
    `;
  }
}

function getDealerBonusInfo(ucDealers) {
  let bonus = 0, label = 'No bonus (< 9 dealers)';
  if (ucDealers >= 13) { bonus = 15; label = ' +15% bonus (13+ dealers)'; }
  else if (ucDealers >= 11) { bonus = 12; label = ' +12% bonus (11-12 dealers)'; }
  else if (ucDealers >= 9) { bonus = 10; label = ' +10% bonus (9-10 dealers)'; }
  else { label = ` No bonus — need ${9-ucDealers} more dealer(s) to unlock 10% bonus`; }
  return `<div style="font-size:16px;font-weight:600;color:${bonus>0?'#2e7d32':'#e53935'}">${label}</div>
          <div style="margin-top:8px;font-size:13px;color:#757575">You have <b>${ucDealers}</b> unique Used Car dealers active this month.</div>`;
}

// ========== DEALERS ==========
function buildDealers(el) {
  if (currentUser.designation === 'RH') {
    buildDealersRH(el);
    return;
  }

  const dealerMap = {};
  myTxns.forEach(t => {
    if (!dealerMap[t.dealer]) dealerMap[t.dealer] = {name:t.dealer, amt:0, cases:0, products:new Set()};
    dealerMap[t.dealer].amt += t.amt;
    dealerMap[t.dealer].cases++;
    dealerMap[t.dealer].products.add(t.product);
  });
  const dealers = Object.values(dealerMap).sort((a,b)=>b.amt-a.amt).slice(0,15);
  const maxAmt = dealers[0]?.amt || 1;

  el.innerHTML = `
    <div class="card">
      <div class="card-title">Top Channels by Disbursement</div>
      <table>
        <thead><tr><th>#</th><th>Dealer Name</th><th>Products</th><th>Cases</th><th>Disbursement</th><th>Share</th></tr></thead>
        <tbody>
          ${dealers.map((d,i) => `<tr>
            <td style="color:#9e9e9e">${i+1}</td>
            <td><b>${d.name}</b></td>
            <td>${[...d.products].map(p => {
              if(p==='Used Car') return '<span class="chip chip-uc">UC</span>';
              if(p==='Used Commercial Vehicle') return '<span class="chip chip-cv">UCV</span>';
              return '<span class="chip chip-ncv">NCV</span>';
            }).join('')}</td>
            <td>${d.cases}</td>
            <td><b>${fmtCr(d.amt)}</b></td>
            <td style="min-width:100px">
              <div class="progress-wrap"><div class="progress-bar bar-green" style="width:${pct(d.amt,maxAmt)}%"></div></div>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function buildDealersRH(el) {
  // Build May GMV map keyed by DCID (may_data has no dealer name, use dcid)
  const mayDcidMap = {};
  getMayData().filter(t => t.rh_id === currentUser.id).forEach(t => {
    if (t.dcid) mayDcidMap[t.dcid] = (mayDcidMap[t.dcid] || 0) + (t.amt || 0);
  });
  // Build June DCID→dealer map so we can look up May GMV per dealer
  const dcidToDealerJune = {};
  myTxns.forEach(t => { if (t.dcid && t.dealer) dcidToDealerJune[t.dcid] = t.dealer.toLowerCase().trim(); });
  // Roll up May GMV by dealer name (via DCID bridge)
  const mayDealerMap = {};
  Object.entries(mayDcidMap).forEach(([dcid, amt]) => {
    const dealer = dcidToDealerJune[dcid];
    if (dealer) mayDealerMap[dealer] = (mayDealerMap[dealer] || 0) + amt;
  });

  const cityTotals = {};
  myTxns.forEach(t => {
    const c = t.state || t.city || 'Unknown';
    cityTotals[c] = (cityTotals[c] || 0) + t.amt;
  });
  const cities = Object.keys(cityTotals).filter(c => c && c !== 'nan').sort((a,b) => cityTotals[b]-cityTotals[a]);

  function dealerChips(products) {
    return [...products].map(p => {
      if(p==='Used Car') return '<span class="chip chip-uc">UC</span>';
      if(p==='Used Commercial Vehicle') return '<span class="chip chip-cv">UCV</span>';
      return '<span class="chip chip-ncv">NCV</span>';
    }).join('');
  }

  function dealerTable(txnList, top=10) {
    const dm = {};
    txnList.forEach(t => {
      if (!dm[t.dealer]) dm[t.dealer] = {name:t.dealer, amt:0, cases:0, products:new Set()};
      dm[t.dealer].amt += t.amt;
      dm[t.dealer].cases++;
      dm[t.dealer].products.add(t.product);
    });
    const list = Object.values(dm).sort((a,b)=>b.amt-a.amt).slice(0, top);
    const maxA = list[0]?.amt || 1;
    if (!list.length) return '<div class="empty">No data for this city.</div>';
    return `<table>
      <thead>
        <tr style="background:#e8eaf6">
          <th style="padding:8px 10px">#</th>
          <th style="padding:8px 10px;text-align:left">Dealer Name</th>
          <th style="padding:8px 10px">Products</th>
          <th style="padding:8px 10px">Cases</th>
          <th style="padding:8px 10px;text-align:right">${getCurMonthLabel()} GMV</th>
          <th style="padding:8px 10px;text-align:right">${getPrevMonthLabel()} GMV</th>
          <th style="padding:8px 10px;text-align:center">Growth</th>
          <th style="padding:8px 10px;min-width:80px">Share</th>
        </tr>
      </thead>
      <tbody>
        ${list.map((d,i) => {
          const mayAmt    = mayDealerMap[d.name.toLowerCase().trim()] || 0;
          const growth    = d.amt - mayAmt;
          const growthPct = mayAmt > 0 ? Math.round((growth/mayAmt)*100) : null;
          const gColor    = growth > 0 ? '#2e7d32' : growth < 0 ? '#c62828' : '#757575';
          const gCell     = mayAmt === 0
            ? '<span style="color:#9e9e9e;font-size:11px">New</span>'
            : `<span style="color:${gColor};font-weight:700">${growth>=0?'+':''}${fmtCr(growth)}</span>`
              + (growthPct!==null ? `<div style="font-size:10px;color:${gColor}">${growthPct>=0?'+':''}${growthPct}%</div>` : '');
          return `<tr style="border-bottom:1px solid #f0f0f0">
            <td style="color:#9e9e9e;padding:8px 10px">${i+1}</td>
            <td style="padding:8px 10px"><b>${d.name}</b></td>
            <td style="padding:8px 10px">${dealerChips(d.products)}</td>
            <td style="text-align:center;padding:8px 10px">${d.cases}</td>
            <td style="text-align:right;padding:8px 10px;font-weight:700"><b>${fmtCr(d.amt)}</b></td>
            <td style="text-align:right;padding:8px 10px;color:#546e7a">${mayAmt>0?fmtCr(mayAmt):'<span style="color:#9e9e9e">—</span>'}</td>
            <td style="text-align:center;padding:8px 10px">${gCell}</td>
            <td style="padding:8px 10px;min-width:80px"><div class="progress-wrap"><div class="progress-bar bar-green" style="width:${pct(d.amt,maxA)}%"></div></div></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
  }

  window.switchCityTab = function(btn, panelId) {
    btn.parentElement.querySelectorAll('.city-tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.city-tab-panel').forEach(p => p.style.display = 'none');
    const panel = document.getElementById(panelId);
    if (panel) panel.style.display = 'block';
  };

  const tabBtns = [' All', ...cities].map((c, i) =>
    `<button class="city-tab-btn ${i===0?'active':''}" onclick="switchCityTab(this,'city_tab_${i}')">${c === ' All' ? c : ' '+c}</button>`
  ).join('');

  const tabPanels = [' All'].concat(cities).map((c, i) => {
    const txns = c === ' All' ? myTxns : myTxns.filter(t => (t.state||t.city||'Unknown') === c);
    const top   = c === ' All' ? 15 : 10;
    const title = c === ' All' ? 'Top 15 Channels — All States' : `Top 10 Channels — ${c} (${fmtCr(cityTotals[c])} | ${txns.length} cases)`;
    return `<div id="city_tab_${i}" class="city-tab-panel" style="display:${i===0?'block':'none'}">
      <div class="card-title" style="margin-bottom:12px">${title}</div>
      ${dealerTable(txns, top)}
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="card">
      <div class="card-title">State-wise Top Channels</div>
      <div style="overflow-x:auto;white-space:nowrap;margin-bottom:16px;padding-bottom:4px">
        ${tabBtns}
      </div>
      ${tabPanels}
    </div>
  `;
}

function buildBanks(el) {
  // Build state options from myTxns sorted by volume
  const stateSet = {};
  myTxns.forEach(t => { if (t.state && t.state !== 'nan') stateSet[t.state] = (stateSet[t.state]||0) + t.amt; });
  const stateOptions = Object.keys(stateSet).sort((a,b) => stateSet[b]-stateSet[a])
    .map(s => `<option value="${s}">${s}</option>`).join('');

  // Three dropdowns: Product + Loan Type + State
  el.innerHTML = `
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:12px;font-weight:600;color:#555">Product:</label>
        <select id="bankProdFilter" onchange="renderBanksFilter()" style="padding:6px 10px;border:1.5px solid #c5cae9;border-radius:8px;font-size:13px;background:#fff;cursor:pointer">
          <option value="all">All</option>
          <option value="uc">UC (Used Car)</option>
          <option value="cv">CV (Commercial Vehicle)</option>
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:12px;font-weight:600;color:#555">Loan Type:</label>
        <select id="bankLoanFilter" onchange="renderBanksFilter()" style="padding:6px 10px;border:1.5px solid #c5cae9;border-radius:8px;font-size:13px;background:#fff;cursor:pointer">
          <option value="all">All</option>
          <option value="purchase">Purchase</option>
          <option value="others">Others</option>
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:12px;font-weight:600;color:#555">State:</label>
        <select id="bankStateFilter" onchange="renderBanksFilter()" style="padding:6px 10px;border:1.5px solid #c5cae9;border-radius:8px;font-size:13px;background:#fff;cursor:pointer">
          <option value="all">All States</option>
          ${stateOptions}
        </select>
      </div>
    </div>
    <div id="bankTotal" style="font-size:12px;color:#9e9e9e;margin-bottom:12px"></div>
    <div class="grid-2">
      <div class="card">
        <div class="card-title">Bank-wise Disbursement</div>
        <canvas id="chartBanks" height="300"></canvas>
      </div>
      <div class="card">
        <div class="card-title">Lender Breakdown</div>
        <table>
          <thead><tr>
            <th>Bank / NBFC</th>
            <th style="text-align:center">Cases</th>
            <th style="text-align:right">July MTD</th>
            <th style="text-align:right">June LMTD</th>
            <th style="text-align:center">Growth</th>
            <th style="text-align:right">June Final</th>
            <th style="text-align:center">July Share%</th>
            <th style="text-align:center">June Share%</th>
          </tr></thead>
          <tbody id="bankTableBody"></tbody>
        </table>
      </div>
    </div>
  `;

  window.renderBanksFilter = function() {
    const prod  = (document.getElementById('bankProdFilter')  || {value:'all'}).value;
    const loan  = (document.getElementById('bankLoanFilter')  || {value:'all'}).value;
    const state = (document.getElementById('bankStateFilter') || {value:'all'}).value;

    // Filter July txns
    let filtered = myTxns;
    if (prod  === 'uc')       filtered = filtered.filter(t => t.product === 'Used Car');
    if (prod  === 'cv')       filtered = filtered.filter(t => t.product !== 'Used Car');
    if (state !== 'all')      filtered = filtered.filter(t => t.state === state);
    if (loan  === 'purchase') filtered = filtered.filter(t => (t.loan_type||'').toLowerCase().includes('purchase') && !(t.loan_type||'').toLowerCase().startsWith('ucv') && !(t.loan_type||'').toLowerCase().startsWith('ncv'));
    if (loan  === 'others')   filtered = filtered.filter(t => !((t.loan_type||'').toLowerCase().includes('purchase') && !(t.loan_type||'').toLowerCase().startsWith('ucv') && !(t.loan_type||'').toLowerCase().startsWith('ncv')));

    // July bank map
    const bankMap = {};
    filtered.forEach(t => {
      const bk = t.bank || 'Unknown';
      if (!bankMap[bk]) bankMap[bk] = {name:bk, amt:0, cases:0};
      bankMap[bk].amt += t.amt;
      bankMap[bk].cases++;
    });
    const banks = Object.values(bankMap).sort((a,b)=>b.amt-a.amt);
    const total = banks.reduce((s,b)=>s+b.amt,0)||1;

    // Scope May data
    const mayScope = getMayData().filter(t => {
      const d2=currentUser.designation, id2=currentUser.id;
      if(d2==='BM') return t.bm_id===id2;
      if(d2==='AM') return t.am_id===id2;
      if(d2==='TH') return t.th_id===id2||t.am_id===id2;
      return t.rh_id===id2;
    });

    // Apply same state/product/loan filters to May data
    let mayScopeFiltered = mayScope;
    if (prod  === 'uc')       mayScopeFiltered = mayScopeFiltered.filter(t => t.product === 'Used Car');
    if (prod  === 'cv')       mayScopeFiltered = mayScopeFiltered.filter(t => t.product !== 'Used Car');
    if (state !== 'all')      mayScopeFiltered = mayScopeFiltered.filter(t => t.state === state);
    if (loan  === 'purchase') mayScopeFiltered = mayScopeFiltered.filter(t => (t.loan_type||'').toLowerCase().includes('purchase') && !(t.loan_type||'').toLowerCase().startsWith('ucv') && !(t.loan_type||'').toLowerCase().startsWith('ncv'));
    if (loan  === 'others')   mayScopeFiltered = mayScopeFiltered.filter(t => !((t.loan_type||'').toLowerCase().includes('purchase') && !(t.loan_type||'').toLowerCase().startsWith('ucv') && !(t.loan_type||'').toLowerCase().startsWith('ncv')));

    // June LMTD (same days as July)
    const mayLMTD = toLMTD(mayScopeFiltered);
    const mayBankMap = {};
    mayLMTD.forEach(t => {
      const bk = t.bank || 'Unknown';
      if (!mayBankMap[bk]) mayBankMap[bk] = 0;
      mayBankMap[bk] += t.amt;
    });

    // June Full month (for June Final GMV)
    const juneFinalMap = {};
    mayScopeFiltered.forEach(t => {
      const bk = t.bank || 'Unknown';
      if (!juneFinalMap[bk]) juneFinalMap[bk] = 0;
      juneFinalMap[bk] += t.amt;
    });
    const juneTotal = Object.values(juneFinalMap).reduce((s,v)=>s+v,0)||1;

    // Bank tiers
    const bankTiers = window._LIVE_BANK_TIERS || {};

    function tierBadge(bankName) {
      const t = bankTiers[(bankName||'').toLowerCase()] || '';
      if (!t) return '';
      if (t.toLowerCase().includes('platinum')) return '<span style="display:inline-block;background:linear-gradient(135deg,#7b1fa2,#9c27b0);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;margin-left:4px">&#9733; PLATINUM</span>';
      if (t.toLowerCase().includes('gold'))     return '<span style="display:inline-block;background:linear-gradient(135deg,#f57f17,#ffa000);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;margin-left:4px">&#9733; GOLD</span>';
      return '';
    }

    // Classify banks into tiers
    function getTier(bankName) {
      const t = bankTiers[(bankName||'').toLowerCase()] || '';
      if (t.toLowerCase().includes('platinum')) return 'Platinum';
      if (t.toLowerCase().includes('gold')) return 'Gold';
      return 'Other';
    }

    function shortName(n) {
      return (n||'Unknown')
        .replace('HDB Financial Services Limited','HDB Fin.')
        .replace('Cholamandalam Investment and Finance Company','Chola')
        .replace('Cholamandalam Investment And Finance Company','Chola')
        .replace('Mahindra & Mahindra Financial Services','Mahindra Fin.')
        .replace('Sundaram Finance Limited','Sundaram Fin.')
        .replace('Indostar Capital Finance Limited','Indostar Cap.')
        .replace('Poonawalla Fincorp','Poonawalla');
    }

    function buildRow(b, rowBg) {
      const mayAmt    = mayBankMap[b.name] || 0;
      const juneFinal = juneFinalMap[b.name] || 0;
      const isZero    = b.amt === 0 && b.cases === 0;
      const growth    = b.amt - mayAmt;
      const gPct      = mayAmt > 0 ? Math.round((growth/mayAmt)*100) : null;
      const gColor    = growth > 0 ? '#2e7d32' : growth < 0 ? '#c62828' : '#757575';
      const julShare  = total>0 ? Math.round((b.amt/total)*100) : 0;
      const junShare  = juneTotal>0 ? Math.round((juneFinal/juneTotal)*100) : 0;
      const gCell     = isZero
        ? '<span style="color:#bbb;font-size:11px">—</span>'
        : mayAmt === 0
          ? '<span style="color:#9e9e9e;font-size:11px">New</span>'
          : '<span style="color:'+gColor+';font-weight:700">'+(growth>=0?'+':'')+fmtCr(growth)+'</span>'
            +(gPct!==null?'<div style="font-size:10px;color:'+gColor+'">'+(gPct>=0?'+':'')+gPct+'%</div>':'');
      const dimStyle  = isZero ? 'opacity:0.5;' : '';
      return '<tr style="background:'+rowBg+';'+dimStyle+'">'
        +'<td style="padding:7px 10px;font-size:12px">'+shortName(b.name)+tierBadge(b.name)+'</td>'
        +'<td style="padding:7px 8px;text-align:center">'+(isZero?'<span style="color:#bbb">0</span>':b.cases)+'</td>'
        +'<td style="padding:7px 8px;text-align:right;font-weight:700;color:'+(isZero?'#bbb':'inherit')+'">'+(isZero?'₹0':fmtCr(b.amt))+'</td>'
        +'<td style="padding:7px 8px;text-align:right;color:#546e7a;font-size:11px">'+(mayAmt>0?fmtCr(mayAmt):'<span style="color:#ccc">—</span>')+'</td>'
        +'<td style="padding:7px 8px;text-align:center">'+gCell+'</td>'
        +'<td style="padding:7px 8px;text-align:right;color:#546e7a;font-size:11px">'+(juneFinal>0?fmtCr(juneFinal):'<span style="color:#ccc">—</span>')+'</td>'
        +'<td style="padding:7px 8px;text-align:center">'+(isZero?'<span style="color:#bbb">0%</span>':'<span style="background:#e3f2fd;color:#1565c0;padding:2px 7px;border-radius:8px;font-size:11px;font-weight:700">'+julShare+'%</span>')+'</td>'
        +'<td style="padding:7px 8px;text-align:center">'+(junShare>0?'<span style="background:#f3e5f5;color:#7b1fa2;padding:2px 7px;border-radius:8px;font-size:11px;font-weight:700">'+junShare+'%</span>':'<span style="color:#bbb">—</span>')+'</td>'
        +'</tr>';
    }

    function subtotalRow(label, grpBanks, bgCol, textCol) {
      const grpAmt  = grpBanks.reduce((s,b)=>s+b.amt,0);
      const grpMay  = grpBanks.reduce((s,b)=>s+(mayBankMap[b.name]||0),0);
      const grpJFin = grpBanks.reduce((s,b)=>s+(juneFinalMap[b.name]||0),0);
      const grpCases= grpBanks.reduce((s,b)=>s+b.cases,0);
      const grpG    = grpAmt - grpMay;
      const grpGpct = grpMay>0?Math.round((grpG/grpMay)*100):null;
      const grpGcol = grpG>=0?'#2e7d32':'#c62828';
      const julShr  = total>0?Math.round((grpAmt/total)*100):0;
      const junShr  = juneTotal>0?Math.round((grpJFin/juneTotal)*100):0;
      return '<tr style="background:'+bgCol+';border-top:2px solid rgba(0,0,0,.08)">'
        +'<td style="padding:8px 10px;font-weight:800;color:'+textCol+';font-size:12px">'+label+' Total</td>'
        +'<td style="padding:8px 8px;text-align:center;font-weight:700;color:'+textCol+'">'+grpCases+'</td>'
        +'<td style="padding:8px 8px;text-align:right;font-weight:800;color:'+textCol+'">'+fmtCr(grpAmt)+'</td>'
        +'<td style="padding:8px 8px;text-align:right;font-size:11px">'+(grpMay>0?fmtCr(grpMay):'—')+'</td>'
        +'<td style="padding:8px 8px;text-align:center">'+(grpGpct!==null?'<span style="color:'+grpGcol+';font-weight:700">'+(grpG>=0?'+':'')+fmtCr(grpG)+'<br><small>'+(grpG>=0?'+':'')+grpGpct+'%</small></span>':'—')+'</td>'
        +'<td style="padding:8px 8px;text-align:right;font-size:11px">'+(grpJFin>0?fmtCr(grpJFin):'—')+'</td>'
        +'<td style="padding:8px 8px;text-align:center"><span style="background:#e3f2fd;color:#1565c0;padding:2px 7px;border-radius:8px;font-size:11px;font-weight:700">'+julShr+'%</span></td>'
        +'<td style="padding:8px 8px;text-align:center"><span style="background:#f3e5f5;color:#7b1fa2;padding:2px 7px;border-radius:8px;font-size:11px;font-weight:700">'+(junShr>0?junShr+'%':'—')+'</span></td>'
        +'</tr>';
    }

    function groupHeader(label, bgCol, textCol) {
      return '<tr style="background:'+bgCol+'">'
        +'<td colspan="8" style="padding:7px 12px;font-weight:800;font-size:12px;color:'+textCol+';letter-spacing:.3px">'+label+'</td>'
        +'</tr>';
    }

    // Ensure all Platinum & Gold banks always appear (even with zero disbursement)
    const allKnownBanks = Object.keys(bankTiers);
    allKnownBanks.forEach(bkLower => {
      const tier = bankTiers[bkLower] || '';
      if (!tier.toLowerCase().includes('platinum') && !tier.toLowerCase().includes('gold')) return;
      // Find canonical name from actual txns or use title-cased version
      const existingBank = banks.find(b => b.name.toLowerCase() === bkLower);
      if (!existingBank) {
        // Add zero-disbursement entry with proper display name
        const displayName = bkLower.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
        banks.push({name: displayName, amt: 0, cases: 0, _zeroBank: true});
      }
    });

    // Split into groups
    const platinum = banks.filter(b=>getTier(b.name)==='Platinum').sort((a,b)=>b.amt-a.amt);
    const gold     = banks.filter(b=>getTier(b.name)==='Gold').sort((a,b)=>b.amt-a.amt);

      html += subtotalRow('&#9733; Platinum', platinum, '#ede0f5', '#6a1b9a');

    if (gold.length) {
      html += groupHeader('&#9733; GOLD BANKS', 'linear-gradient(90deg,#e65100,#f57f17)', '#fff');
      gold.forEach((b,i) => { html += buildRow(b, i%2===0?'#fff8f0':'#fff3e0'); });
      html += subtotalRow('&#9733; Gold', gold, '#ffe0b2', '#e65100');
    }
    if (other.length) {
      html += groupHeader('OTHER BANKS / NBFC', '#546e7a', '#fff');
      other.forEach((b,i) => { html += buildRow(b, i%2===0?'#f8f9ff':'#fff'); });
      html += subtotalRow('Other', other, '#eceff1', '#546e7a');
    }
    // Grand total row
    html += '<tr style="background:#1a237e;border-top:2px solid #fff">'
      +'<td style="padding:8px 10px;font-weight:800;color:#fff;font-size:12px">GRAND TOTAL'+(state!=='all'?' — '+state:'')+'</td>'
      +'<td style="padding:8px 8px;text-align:center;font-weight:800;color:#fff">'+filtered.length+'</td>'
      +'<td style="padding:8px 8px;text-align:right;font-weight:800;color:#fff">'+fmtCr(total)+'</td>'
      +'<td colspan="2"></td>'
      +'<td style="padding:8px 8px;text-align:right;font-size:11px;color:#c5cae9">'+fmtCr(juneTotal)+'</td>'
      +'<td style="padding:8px 8px;text-align:center"><span style="color:#fff;font-weight:700">100%</span></td>'
      +'<td style="padding:8px 8px;text-align:center"><span style="color:#fff;font-weight:700">100%</span></td>'
      +'</tr>';

    const tbody = document.getElementById('bankTableBody');
    if (tbody) tbody.innerHTML = html;

    const totalEl = document.getElementById('bankTotal');
    if (totalEl) totalEl.textContent = filtered.length + ' cases · ' + fmtCr(total) + (state !== 'all' ? ' · ' + state : '');

    if (charts.banks) { try { charts.banks.destroy(); } catch(e){} delete charts.banks; }
    setTimeout(() => {
      const ctx = document.getElementById('chartBanks');
      if (ctx && !charts.banks) {

        const palette = ['#1565c0','#283593','#0277bd','#00838f','#2e7d32','#558b2f','#f57f17','#e65100'];
        charts.banks = new Chart(ctx, {

          options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>fmtCr(v)}},y:{grid:{display:false}}}}

function buildTeamIncentive(el) {
  const d  = currentUser.designation;
  const id = currentUser.id;

  // ── Collect BM txns for a given pool ──
  function getBmMap(pool) {
    const bmMap = {};
    pool.forEach(t => {
      const key = t.bm_id || t.bm;
      if (!bmMap[key]) bmMap[key] = [];
      bmMap[key].push(t);
    });
    // Inject zero-txn BMs in scope
    getEmpData().forEach(e => {
      if (e.designation !== 'BM') return;
      const inScope = d==='RH' ? e.rh_id===id : d==='TH' ? e.th_id===id : d==='AM' ? e.am_id===id : false;
      if (inScope && !bmMap[e.id]) bmMap[e.id] = [];
    });
    return bmMap;
  }

  // ── Filter by role ──
  function scopeFilter(pool) {
    if (d==='RH')      return pool.filter(t => t.rh_id===id);
    if (d==='TH')      return pool.filter(t => t.th_id===id);
    if (d==='AM')      return pool.filter(t => t.am_id===id);
    return pool.filter(t => t.bm_id===id || t.bm===currentUser.name?.toLowerCase());
  }

  const juneTxns = scopeFilter(getTxnData().filter(t => t.date && t.date.startsWith(getCurMonth())));
  const mayTxns  = scopeFilter(getMayData()); // Full previous month for incentive calc

  const juneMap = getBmMap(juneTxns);
  const mayMap  = getBmMap(mayTxns);

  // ── All BM keys (union of both months) ──
  const allKeys = new Set([...Object.keys(juneMap), ...Object.keys(mayMap)]);

  // ── Compute incentive per BM per month ──
  const rows = [];
  allKeys.forEach(key => {
    const emp     = resolveEmpById(key) || (juneMap[key]?.length ? resolveEmpById(juneMap[key][0].bm_id) || resolveEmpName(juneMap[key][0].bm) : null)
                 || (mayMap[key]?.length  ? resolveEmpById(mayMap[key][0].bm_id)  || resolveEmpName(mayMap[key][0].bm)  : null);
    const jTxns   = juneMap[key] || [];
    const mTxns   = mayMap[key]  || [];
    const jInc    = computeBMIncentive(jTxns, emp);
    // Pass May-specific CV target if available
    const mayOpts = (emp && emp.product === 'CV' && MAY_CV_TGT[emp.id]) ? { cvTgt: MAY_CV_TGT[emp.id] } : undefined;
    const mInc    = computeBMIncentive(mTxns, emp, mayOpts);
    rows.push({ emp, key, jTxns, mTxns, jInc, mInc });
  });

  rows.sort((a,b) => ((b.jInc?.totalIncentive||0)+(b.mInc?.totalIncentive||0)) - ((a.jInc?.totalIncentive||0)+(a.mInc?.totalIncentive||0)));

  const totJune = Math.round(rows.reduce((s,r) => s+(r.jInc?.totalIncentive||0), 0));
  const totMay  = Math.round(rows.reduce((s,r) => s+(r.mInc?.totalIncentive||0), 0));

  function incCell(inc, txns) {
    if (!inc) return '<span style="color:#9e9e9e;font-size:11px">No data</span>';
    if (inc.isCV) {
      if (!inc.eligible && inc.cvTgt > 0) {
        return `<div style="color:#c62828;font-weight:700;font-size:11px"> Not eligible</div>`
             + `<div style="font-size:10px;color:#9e9e9e">${inc.tgtAchPct}% of ${fmtCr(inc.cvTgt)} tgt (need 80%)</div>`;
      }
      return `<div style="font-weight:700;color:#e65100">₹${inc.totalIncentive.toLocaleString()}</div>`
           + `<div style="font-size:10px;color:#9e9e9e">CV · ${fmtCr(inc.totalAmt)} GMV</div>`;
    }
    if (inc.totalIncentive === 0) {
      return `<div style="color:#9e9e9e;font-size:11px">Below threshold</div>`
           + `<div style="font-size:10px;color:#9e9e9e">${fmtCr(inc.effGMV)} effGMV</div>`;
    }
    return `<div style="font-weight:700;color:#1a237e;font-size:14px">₹${inc.totalIncentive.toLocaleString()}</div>`
         + `<div style="font-size:10px;color:#546e7a">${inc.activeSlab?.label||''} · ${inc.appliedRate}%`
         + (inc.dealerBonusPct>0 ? ` <span style="color:#2e7d32">+${inc.dealerBonusPct}%</span>` : '')
         + `</div>`;
  }

  function gmvCell(inc) {
    if (!inc || inc.totalIncentive === 0 && !inc.isCV) return `<span style="color:#9e9e9e">—</span>`;
    const gmv = inc.effGMV || inc.totalAmt || 0;
    return `<span style="font-size:12px">${fmtCr(gmv)}</span>`;

  el.innerHTML = `

      <div class="card" style="background:linear-gradient(135deg,#283593,#3949ab);color:#fff;padding:18px 20px">

        <div style="font-size:30px;font-weight:800;margin:4px 0">${fmtCr(totMay)}</div>
        <div style="font-size:12px;opacity:.7">${rows.filter(r=>r.mInc?.totalIncentive>0).length} BMs earned · ${rows.length} total</div>
      </div>
      <div class="card" style="background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:18px 20px">
        <div style="font-size:11px;opacity:.7;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Team Incentive · ${getCurMonthLabel()} (ongoing)</div>
        <div style="font-size:30px;font-weight:800;margin:4px 0">${fmtCr(totJune)}</div>
        <div style="font-size:12px;opacity:.7">${rows.filter(r=>r.jInc?.totalIncentive>0).length} BMs earned · ${rows.length} total</div>
      </div>
    </div>

    <!-- BM-wise table -->
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:14px 20px;background:#f5f7ff;font-size:13px;font-weight:700;color:#1a237e;display:flex;justify-content:space-between;align-items:center">
        <span>BM-wise Incentive — ${getPrevMonthLabel()} vs ${getCurMonthLabel()}</span>
        <span style="font-size:11px;color:#9e9e9e;font-weight:400">UC: slab on effGMV + dealer bonus · CV: base×cases + UCV/NCV bonus</span>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr style="background:#e8eaf6">
              <th rowspan="2" style="vertical-align:middle">#</th>
              <th rowspan="2" style="vertical-align:middle">BM Name</th>

// ========== INCENTIVE CALCULATION HELPER ==========
// May-26 CV targets (different from June targets — add 'May CV TGT' column to sheet for permanent fix)
const MAY_CV_TGT = {
  '10074186': 1.5e7,   // Binay Kumar Sharma  — 1.5Cr
  '10074393': 1.5e7,   // Kunal Kumar          — 1.5Cr
  '10074441': 1.5e7,   // Josef Dey            — 1.5Cr
  '10075211': 1.0e7,   // Nishikant Kumar Singh — 1Cr (same as June, update if different)
};

function computeBMIncentive(bmTxns, bmEmp, opts) {
  const isCV = bmEmp?.product === 'CV';

  if (isCV) {
    const totalAmt   = bmTxns.reduce((s,t)=>s+t.amt,0);
    const ucCases    = bmTxns.filter(t=>t.product==='Used Car').length;
    const ucvCases   = bmTxns.filter(t=>t.product==='Used Commercial Vehicle').length;
    const ucvAmt     = bmTxns.filter(t=>t.product==='Used Commercial Vehicle').reduce((s,t)=>s+t.amt,0);
    const ncvTxns    = bmTxns.filter(t=>t.product==='New Commercial Vehicle');
    const ucvucCases = ucCases + ucvCases;
    const amt_cr     = totalAmt / 1e7;

    // ── 80% target eligibility check ──
    // opts.mayTgt overrides the sheet target (for May where targets differ)
    const cvTgt      = (opts && opts.cvTgt != null) ? opts.cvTgt : (bmEmp.cv_tgt || 0) * 1e5;
    const tgtAchPct  = cvTgt > 0 ? (totalAmt / cvTgt) * 100 : 0;
    const eligible   = cvTgt === 0 || tgtAchPct >= 80; // if no target set, don't block

    const mult       = eligible ? (amt_cr >= 1.5 ? 300 : amt_cr >= 1.0 ? 200 : 0) : 0;
    const base       = mult * ucvucCases;

    // UCV bonus — only if eligible
    const tenMo  = tenureMonths(bmEmp.joining);
    const ucvLac = ucvAmt / 1e5;
    let ucvBonus = 0;
    if (eligible) {
      if (tenMo < 3) {
        if (ucvLac >= 60) ucvBonus = 7500;
      } else {
        if (ucvLac >= 150) ucvBonus = 25000;
        else if (ucvLac >= 100) ucvBonus = 15000;
        else if (ucvLac >= 80)  ucvBonus = 10000;
      }
    }

    // NCV bonus per individual case — only if eligible
    function ncvCaseBonus(loanAmt) {
      const l = loanAmt / 1e5;
      if (l > 50) return 5000;
      if (l > 40) return 4000;
      if (l > 30) return 3000;
      if (l > 20) return 2000;
      if (l > 10) return 1000;
      return 500;
    }
    const ncvBonus       = eligible ? ncvTxns.reduce((s,t) => s + ncvCaseBonus(t.amt), 0) : 0;
    const totalIncentive = eligible ? Math.min(base + ucvBonus + ncvBonus, 50000) : 0;

    return {
      isCV: true,
      totalIncentive,
      base,
      ucvBonus,
      ncvBonus,
      ucCases,
      ucvCases,
      ncvCases: ncvTxns.length,
      ucvucCases,
      mult,
      totalAmt,
      ucvAmt,
      effGMV: totalAmt,
      eligible,
      cvTgt,
      tgtAchPct: Math.round(tgtAchPct),
      activeSlab: mult > 0 ? { label: amt_cr >= 1.5 ? '1.5Cr+' : '1Cr+' } : null,
      appliedRate: null,
      ucDealers: 0,
      dealerBonusPct: 0,
      dealerBonus: 0,
      tier: bmEmp?.tier || '—',
      ucAmt: bmTxns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0),
    };
  }

  // UC BM incentive
  if (!bmEmp) return null;

  const tier   = bmEmp.tier || 'T3';
  const tenMo  = tenureMonths(bmEmp.joining);
  const gt1yr  = tenMo > 12;

  const ucAmt  = bmTxns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
  const ucvAmt = bmTxns.filter(t=>t.product==='Used Commercial Vehicle').reduce((s,t)=>s+t.amt,0);
  const ncvAmt = bmTxns.filter(t=>t.product==='New Commercial Vehicle').reduce((s,t)=>s+t.amt,0);

  // Scheme: UC=100%, UCV=100%, NCV=50%
  const effGMV    = ucAmt + ucvAmt + ncvAmt * 0.5;
  const effGMV_Cr = effGMV / 1e7;

  // Slab rates as per scheme
  // Tenure rule (>1 year in company):
  //   T3: skip 80L-1Cr slab → starts from 1Cr-1.25Cr
  //   T2/T1: skip 80L-1Cr AND 1Cr-1.25Cr → starts from 1.25Cr-1.5Cr
  const slabs = [
    {min:0.8, max:1.0,  rates:{T3:0.03, T2:null, T1:null}, label:'80L-1Cr'},
    {min:1.0, max:1.25, rates:{T3:0.04, T2:0.04, T1:0.04}, label:'1Cr-1.25Cr'},
    {min:1.25,max:1.5,  rates:{T3:0.06, T2:0.06, T1:0.06}, label:'1.25-1.5Cr'},
    {min:1.5, max:1.75, rates:{T3:0.09, T2:0.09, T1:0.09}, label:'1.5-1.75Cr'},
    {min:1.75,max:2.0,  rates:{T3:0.11, T2:0.11, T1:0.11}, label:'1.75-2Cr'},
    {min:2.0, max:2.5,  rates:{T3:0.12, T2:0.12, T1:0.12}, label:'2-2.5Cr'},
    {min:2.5, max:3.0,  rates:{T3:0.14, T2:0.14, T1:0.14}, label:'2.5-3Cr'},
    {min:3.0, max:999,  rates:{T3:0.15, T2:0.15, T1:0.15}, label:'3Cr+'},
  ];

  let activeSlab = null, appliedRate = 0;
  for (const s of slabs) {
    const tierRate = s.rates[tier];
    if (tierRate === null) continue;                              // T2/T1 never eligible for 80L-1Cr
    if (gt1yr && tier === 'T3' && s.label === '80L-1Cr') continue;             // T3 >1yr: skip 80L-1Cr
    if (gt1yr && (tier === 'T2' || tier === 'T1') && (s.label === '80L-1Cr' || s.label === '1Cr-1.25Cr')) continue; // T2/T1 >1yr: skip both
    if (effGMV_Cr >= s.min && (effGMV_Cr < s.max || s.label === '3Cr+')) {
      activeSlab = s;
      appliedRate = tierRate;
    }
  }

  const baseIncentive = activeSlab ? Math.round(effGMV * (appliedRate / 100)) : 0;

  // Dealer bonus: unique UC channel activations (ch_check > 0 for UC txns)
  const ucDealers = new Set(
    bmTxns.filter(t => t.product === 'Used Car' && t.ch_check > 0 && t.dcid).map(t => t.dcid)
  ).size;
  let dealerBonusPct = 0;
  if      (ucDealers >= 13) dealerBonusPct = 15;
  else if (ucDealers >= 11) dealerBonusPct = 12;
  else if (ucDealers >= 9)  dealerBonusPct = 10;

  // Dealer bonus is % of TOTAL incentive (base + dealer bonus)
  // totalIncentive = baseIncentive / (1 - dealerBonusPct/100)
  // Or equivalently: dealerBonus = baseIncentive * pct / (1 - pct)
  // But scheme says "Extra Bonus on Total Incentive" = dealerBonus = totalIncentive * pct
  // So: totalIncentive = baseIncentive + totalIncentive * pct
  // => totalIncentive * (1 - pct) = baseIncentive
  // => totalIncentive = baseIncentive / (1 - pct)
  const dealerBonus    = dealerBonusPct > 0 ? Math.round(baseIncentive / (1 - dealerBonusPct/100) * (dealerBonusPct/100)) : 0;
  const totalIncentive = baseIncentive + dealerBonus;

  return { isCV: false, totalIncentive, baseIncentive, dealerBonus, dealerBonusPct, effGMV, appliedRate, activeSlab, ucDealers, tier, ucAmt, ucvAmt, ncvAmt };
}
