        <thead><tr><th>Metric</th><th style="text-align:right;color:#1565c0">${getPrevMonthLabel()}</th><th style="text-align:right;color:#1a237e">${getCurMonthLabel()}</th></tr></thead>
        <tbody>
          <tr><td>UC GMV</td><td style="text-align:right">${fmtCr(mCalc.ucA)}</td><td style="text-align:right">${fmtCr(ucAmt)}</td></tr>
          <tr><td>UCV GMV</td><td style="text-align:right">${fmtCr(mCalc.ucvA)}</td><td style="text-align:right">${fmtCr(ucvAmt)}</td></tr>
          <tr><td>NCV GMV</td><td style="text-align:right">${fmtCr(mCalc.ncvA)}</td><td style="text-align:right">${fmtCr(ncvAmt)}</td></tr>
          <tr style="font-weight:700"><td>Eff. GMV (UC+UCV+NCV×50%)</td><td style="text-align:right">${fmtCr(mCalc.gmv)}</td><td style="text-align:right">${fmtCr(effGMV)}</td></tr>
          <tr><td>Slab</td><td style="text-align:right">${mCalc.slab?.label||'—'}</td><td style="text-align:right">${activeSlab?.label||'—'}</td></tr>
          <tr><td>Rate</td><td style="text-align:right">${mCalc.rate?mCalc.rate+'%':'—'}</td><td style="text-align:right">${appliedRate?appliedRate+'%':'—'}</td></tr>
          <tr><td>Base Incentive</td><td style="text-align:right">${fmtCr(mCalc.base)}</td><td style="text-align:right">${fmtCr(baseIncentive)}</td></tr>
          <tr><td>UC Active Channels</td><td style="text-align:right">${mCalc.ch}</td><td style="text-align:right">${ucDealers}</td></tr>
          <tr><td>Dealer Bonus</td><td style="text-align:right;color:#2e7d32">${mCalc.db>0?'+'+fmtCr(mCalc.db):'—'}</td><td style="text-align:right;color:#2e7d32">${dealerBonus>0?'+'+fmtCr(dealerBonus):'—'}</td></tr>
          <tr style="font-weight:800;background:#f5f7ff"><td>Total Incentive</td>
            <td style="text-align:right;color:#1565c0;font-size:15px">${fmtCr(mCalc.total)}</td>
            <td style="text-align:right;color:#1a237e;font-size:15px">${fmtCr(totalIncentive)}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">GMV Components</div>
        <table>
          <thead><tr><th>Product</th><th>Actual</th><th>Weight</th><th>Effective</th></tr></thead>
          <tbody>
            <tr><td>Used Car</td><td>${fmtCr(ucAmt)}</td><td>100%</td><td>${fmtCr(ucAmt)}</td></tr>
            <tr><td>Used CV</td><td>${fmtCr(ucvAmt)}</td><td>100%</td><td>${fmtCr(ucvAmt)}</td></tr>
            <tr><td>New CV</td><td>${fmtCr(ncvAmt)}</td><td>50%</td><td>${fmtCr(ncvAmt*0.5)}</td></tr>
            <tr style="font-weight:700"><td>Total Effective GMV</td><td colspan="2"></td><td>${fmtCr(effGMV)}</td></tr>
          </tbody>
        </table>
        <div style="margin-top:16px;font-size:12px;color:#757575">
          Tier: <b>${tier}</b> &nbsp;|&nbsp; Tenure: <b>${tenMo} months</b> &nbsp;|&nbsp;
          ${gt1yr ? ' >1yr tenure rules apply' : ' Full slab range eligible'}
        </div>
      </div>

      <div>
        <div class="slab-table">
          <div class="slab-row slab-header">
            <div>GMV Slab</div><div>T3</div><div>T2</div><div>T1</div>
          </div>
          ${slabs.map(s => {
            const isActive = activeSlab && activeSlab.label === s.label;
            const isPast = effGMV_Cr >= s.max;
            const cls = isActive ? 'slab-active' : isPast ? '' : 'slab-future';
            return `<div class="slab-row ${cls}">
              <div>${s.label} ${isActive ? '← You are here' : ''}</div>
              <div>${s.rates.T3 !== null ? s.rates.T3+'%' : '—'}</div>
              <div>${s.rates.T2 !== null ? s.rates.T2+'%' : '—'}</div>
              <div>${s.rates.T1 !== null ? s.rates.T1+'%' : '—'}</div>
            </div>`;
          }).join('')}
        </div>
        <div style="margin-top:12px;font-size:12px;color:#757575;padding:0 4px">
           Dealer bonus (UC only): 9-10 dealers=+10%, 11-12=+12%, 13+=+15%
        </div>
      </div>
    </div>
  `;
}

// ========== TEAM ==========
function buildTeam(el) {
  // Build BM map from live transactions, grouped by bm_id
  const bmMap = {};
  myTxns.forEach(t => {
    const key = t.bm_id || t.bm || 'unknown';
    if (!bmMap[key]) bmMap[key] = [];
    bmMap[key].push(t);
  });

  // Add zero-txn BMs from employee sheet who report to this AM
  getEmpData().forEach(e => {
    if (e.designation === 'BM' && e.am_id === currentUser.id && !bmMap[e.id]) {
      bmMap[e.id] = [];
    }
  });

  const todayStr = new Date().toISOString().slice(0,10);

  const bmRows = Object.entries(bmMap).map(([key, txns]) => {
    const emp    = resolveEmpById(key) || (txns.length ? resolveEmpById(txns[0].bm_id) || resolveEmpName(txns[0].bm) : null);
    const name   = emp ? emp.name : (txns[0]?.bm || key);
    const tier   = emp ? (emp.tier || '—') : '—';
    const ucTgt  = emp ? (emp.uc_tgt || 0) * 1e5 : 0;
    const cvTgt  = emp ? (emp.cv_tgt || 0) * 1e5 : 0;
    const chTgt  = emp ? (emp.ch_tgt || 0) : 0;
    const totTgt = ucTgt + cvTgt;

    const ucAmt  = txns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
    const cvAmt  = txns.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);
    const totAmt = ucAmt + cvAmt;
    const cases  = txns.length;
    const bmEmpT = resolveEmpById(key);
    const activeCh = countChannels(txns, bmEmpT);
    const ach    = totTgt > 0 ? Math.round((totAmt/totTgt)*100) : null;
    const chAch  = chTgt > 0 ? Math.round((activeCh/chTgt)*100) : null;

    const ftdTxns = txns.filter(t => t.date && t.date.slice(0,10) === todayStr);
    const ftdUC   = ftdTxns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
    const ftdCV   = ftdTxns.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);

    return {name, tier, ucTgt, cvTgt, chTgt, totTgt, ucAmt, cvAmt, totAmt, cases, activeCh, ach, chAch, ftdUC, ftdCV};
  }).sort((a,b) => b.totAmt - a.totAmt);

  const teamTot  = bmRows.reduce((s,r)=>s+r.totAmt,0);
  const teamUC   = bmRows.reduce((s,r)=>s+r.ucAmt,0);
  const teamCV   = bmRows.reduce((s,r)=>s+r.cvAmt,0);
  const teamTgt  = bmRows.reduce((s,r)=>s+r.totTgt,0);
  const teamAch  = teamTgt > 0 ? Math.round((teamTot/teamTgt)*100) : 0;
  const onTrack  = bmRows.filter(r=>r.ach!==null&&r.ach>=70).length;
  const behind   = bmRows.filter(r=>r.ach!==null&&r.ach<70).length;

  el.innerHTML = `
    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="kpi"><div class="kpi-label">Active BMs</div><div class="kpi-value">${bmRows.length}</div></div>
      <div class="kpi"><div class="kpi-label">Team Disbursement</div><div class="kpi-value">${fmtCr(teamTot)}</div></div>
      <div class="kpi"><div class="kpi-label">Team Achievement</div>
        <div class="kpi-value" style="color:${teamAch>=100?'#2e7d32':teamAch>=70?'#1565c0':'#c62828'}">${teamTgt>0?teamAch+'%':'—'}</div>
      </div>
      <div class="kpi"><div class="kpi-label">On Track / Behind</div>
        <div class="kpi-value" style="font-size:18px"><span style="color:#2e7d32">${onTrack}</span> / <span style="color:#c62828">${behind}</span></div>
      </div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:14px 20px;background:#e8eaf6;font-size:13px;font-weight:700;color:#1a237e">
         BM Performance — ${getCurMonthLabel()}
        <span style="font-weight:400;font-size:11px;margin-left:10px;color:#3949ab">UC: ${fmtCr(teamUC)} | CV: ${fmtCr(teamCV)}</span>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>BM Name</th><th>Tier</th>
            <th>Disbursement</th><th>UC Tgt</th><th>CV Tgt</th><th>% Ach</th>
            <th>UC</th><th>CV</th><th>Cases</th>
            <th>Active Ch</th><th>Ch Tgt</th><th>Ch Ach%</th>
            <th style="color:#1565c0">FTD UC</th><th style="color:#880e4f">FTD CV</th>
          </tr></thead>
          <tbody>
            ${bmRows.map(r => `<tr>
              <td><b style="font-size:12px">${r.name}</b></td>
              <td><span class="badge badge-grey">${r.tier}</span></td>
              <td><b>${fmtCr(r.totAmt)}</b></td>
              <td style="font-size:12px;color:#666">${r.ucTgt>0?fmtCr(r.ucTgt):'—'}</td>
              <td style="font-size:12px;color:#666">${r.cvTgt>0?fmtCr(r.cvTgt):'—'}</td>
              <td>${r.ach!==null ? achBadge(r.ach) : '<span class="badge badge-grey">—</span>'}</td>
              <td style="font-size:12px">${fmtCr(r.ucAmt)}</td>
              <td style="font-size:12px">${fmtCr(r.cvAmt)}</td>
              <td>${r.cases}</td>
              <td><b>${r.activeCh}</b></td>
              <td style="font-size:12px;color:#666">${r.chTgt||'—'}</td>
              <td>${r.chAch!==null ? achBadge(r.chAch) : '<span class="badge badge-grey">—</span>'}</td>
              <td style="font-size:11px;color:#1565c0;font-weight:700">${r.ftdUC>0?fmtCr(r.ftdUC):'<span style="color:#9e9e9e">—</span>'}</td>
              <td style="font-size:11px;color:#880e4f;font-weight:700">${r.ftdCV>0?fmtCr(r.ftdCV):'<span style="color:#9e9e9e">—</span>'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ========== INSIGHTS ==========
function buildInsights(el) {
  const role = currentUser.designation;
  const myEmp = getEmpData().find(e => e.id === currentUser.id);
  const totalAmt = myTxns.reduce((s,t)=>s+t.amt,0);
  const insights = [];

  // ── Common helpers ──────────────────────────────────────
  const ucAmt  = myTxns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
  const cvAmt  = myTxns.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);
  const ucPct  = totalAmt>0 ? pct(ucAmt, totalAmt) : 0;

  const bankMap = {};
  myTxns.forEach(t => { bankMap[t.bank]=(bankMap[t.bank]||0)+t.amt; });
  const topBank = Object.entries(bankMap).sort((a,b)=>b[1]-a[1])[0];

  // ── BM insights (personal performance) ─────────────────
  if (role === 'BM') {
    const ucTgt   = (myEmp?.uc_tgt||0)*1e5;
    const cvTgt   = (myEmp?.cv_tgt||0)*1e5;
    const totalTgt = ucTgt + cvTgt;
    const chTgt   = myEmp?.ch_tgt || 0;
    const chActive = countChannels(myTxns, resolveEmpById(currentUser.id));
    const achPct  = totalTgt>0 ? pct(totalAmt,totalTgt) : 0;

    // Achievement status
    if (totalTgt > 0) {
      if (achPct >= 100) {
        insights.push({type:'good', title:` Target Achieved! ${achPct}%`, body:`You have disbursed ${fmtCr(totalAmt)} against a target of ${fmtCr(totalTgt)}. Outstanding performance this month!`});
      } else if (achPct >= 70) {
        const shortfall = totalTgt - totalAmt;
        insights.push({type:'warn', title:` ${achPct}% Achieved — Keep Pushing`, body:`You need ${fmtCr(shortfall)} more to hit your target. You're on track — focus on closing pending cases.`});
      } else {
        const shortfall = totalTgt - totalAmt;
        insights.push({type:'action', title:` Only ${achPct}% Achieved`, body:`Shortfall of ${fmtCr(shortfall)} remaining. Urgently increase disbursement pace to avoid missing target.`});
      }
    }

    // UC vs CV split
    if (ucTgt > 0) {
      const ucAch = pct(ucAmt, ucTgt);
      if (ucAch < 70) {
        insights.push({type:'action', title:` UC Achievement Low: ${ucAch}%`, body:`Used Car disbursement is ${fmtCr(ucAmt)} vs target ${fmtCr(ucTgt)}. Focus on UC deals to improve product mix.`});
      } else {
        insights.push({type:'good', title:` UC Achievement: ${ucAch}%`, body:`Used Car disbursement at ${fmtCr(ucAmt)} — ${ucAch >= 100 ? 'target crossed!' : 'progressing well.'}`});
      }
    }

    // Channel activation
    if (chTgt > 0) {
      const chPct = pct(chActive, chTgt);
      if (chPct < 70) {
        insights.push({type:'action', title:` Channel Activation: ${chActive}/${chTgt} (${chPct}%)`, body:`You have activated ${chActive} out of ${chTgt} target channels. Onboard more dealers to increase pipeline.`});
      } else {
        insights.push({type:'good', title:` Channel Activation: ${chActive}/${chTgt} (${chPct}%)`, body:`Good channel coverage! ${chActive} active channels contributing to healthy disbursement pipeline.`});
      }
    }

    // Top dealer
    const dealerMap = {};
    myTxns.forEach(t => { dealerMap[t.dealer]=(dealerMap[t.dealer]||0)+t.amt; });
    const topDealer = Object.entries(dealerMap).sort((a,b)=>b[1]-a[1])[0];
    if (topDealer) {
      const dep = pct(topDealer[1], totalAmt);
      if (dep > 40) {
        insights.push({type:'warn', title:` High Dealer Dependency: ${dep}%`, body:`${topDealer[0]} contributes ${dep}% of your disbursement. Diversify across more channels to reduce risk.`});
      } else {
        insights.push({type:'good', title:` Top Dealer: ${topDealer[0]}`, body:`${topDealer[0]} contributes ${fmtCr(topDealer[1])} (${dep}%) — healthy dealer spread overall.`});
      }
    }

    // Bank concentration
    if (topBank && pct(topBank[1],totalAmt) > 50) {
      insights.push({type:'warn', title:` High Bank Concentration`, body:`${topBank[0].slice(0,40)} accounts for ${pct(topBank[1],totalAmt)}% of your disbursements. Try diversifying lender mix.`});
    }

    // Zero days (if any)
    const byDate = {};
    myTxns.forEach(t => { byDate[t.date]=(byDate[t.date]||0)+1; });
    const todayStr = new Date().toISOString().slice(0,10);
    if (Object.keys(byDate).length > 0) {
      const firstDate = Object.keys(byDate).sort()[0];
      let zeroDays = 0;
      for (let d=new Date(firstDate); d<new Date(todayStr); d.setDate(d.getDate()+1)) {
        if (d.getDay()!==0 && !byDate[d.toISOString().slice(0,10)]) zeroDays++;
      }
      if (zeroDays > 0) {
        insights.push({type:'action', title:` ${zeroDays} Zero Productivity Day${zeroDays>1?'s':''}`, body:`You had ${zeroDays} working day${zeroDays>1?'s':''} with no disbursement this month. Consistent daily activity drives better results.`});
      } else {
        insights.push({type:'good', title:` No Zero Productivity Days`, body:`Great consistency! You have maintained disbursement activity on every working day this month.`});
      }
    }
  }

  // ── AM / TH / RH insights (team performance) ───────────
  else {
    // Build BM stats grouped by bm_id
    const bmStats = {};
    myTxns.forEach(t => {
      const key = t.bm_id || t.bm;
      if (!bmStats[key]) bmStats[key] = {bm_id:t.bm_id, bm:t.bm, amt:0, uc:0, cv:0, cases:0, ch:0};
      bmStats[key].amt += t.amt;
      if (t.product==='Used Car') bmStats[key].uc += t.amt;
      else bmStats[key].cv += t.amt;
      bmStats[key].cases++;
      if (t.ch_check > bmStats[key].ch) bmStats[key].ch = t.ch_check;
    });

    const bms = Object.values(bmStats);
    bms.forEach(b => {
      const emp    = resolveEmpById(b.bm_id) || resolveEmpName(b.bm);
      b.empName  = emp ? emp.name : b.bm;
      b.ucTgt    = emp ? (emp.uc_tgt||0)*1e5 : 0;
      b.cvTgt    = emp ? (emp.cv_tgt||0)*1e5 : 0;
      b.chTgt    = emp ? (emp.ch_tgt||0) : 0;
      b.totalTgt = b.ucTgt + b.cvTgt;
      b.achPct   = b.totalTgt>0 ? pct(b.amt, b.totalTgt) : null;
    });

    // Team total vs target
    const teamTgt = myEmp ? ((myEmp.uc_tgt||0)+(myEmp.cv_tgt||0))*1e5 : 0;
    if (teamTgt > 0) {
      const teamAch = pct(totalAmt, teamTgt);
      if (teamAch >= 100) {
        insights.push({type:'good', title:` Team Target Achieved! ${teamAch}%`, body:`Team disbursed ${fmtCr(totalAmt)} against target of ${fmtCr(teamTgt)}. Excellent team performance!`});
      } else {
        insights.push({type: teamAch>=70?'warn':'action', title:` Team Achievement: ${teamAch}%`, body:`Team has disbursed ${fmtCr(totalAmt)} vs target ${fmtCr(teamTgt)}. Shortfall: ${fmtCr(teamTgt-totalAmt)}.`});
      }
    }

    // Top performer
    const topBM = [...bms].sort((a,b)=>b.amt-a.amt)[0];
    if (topBM) {
      insights.push({type:'good', title:` Top Performer: ${topBM.empName}`, body:`Disbursed ${fmtCr(topBM.amt)} with ${topBM.cases} cases this month. Excellent contribution to the team.`});
    }

    // BMs below 70%
    const laggards = bms.filter(b => b.achPct !== null && b.achPct < 70);
    if (laggards.length > 0) {
      insights.push({type:'action', title:` ${laggards.length} BM(s) Below 70% Achievement`, body:`${laggards.map(b=>b.empName+' ('+b.achPct+'%)').join(', ')} need immediate attention and support.`});
    }

    // BMs at 100%+
    const achievers = bms.filter(b => b.achPct !== null && b.achPct >= 100);
    if (achievers.length > 0) {
      insights.push({type:'good', title:` ${achievers.length} BM(s) at 100%+ Achievement`, body:`${achievers.map(b=>b.empName).join(', ')} have crossed their targets. Consider stretch goals.`});
    }

    // Channel gaps
    const chGap = bms.filter(b => b.chTgt > 0 && b.ch < b.chTgt * 0.7);
    if (chGap.length > 0) {
      insights.push({type:'warn', title:` ${chGap.length} BM(s) Have Channel Activation Gaps`, body:`${chGap.map(b=>b.empName+' ('+b.ch+'/'+b.chTgt+')').join(', ')}. Focus on dealer onboarding.`});
    }

    // UC mix
    if (ucPct < 60) {
      insights.push({type:'warn', title:` Low Used Car Mix: ${ucPct}%`, body:`Used Car is only ${ucPct}% of total disbursement. Push BMs to focus on UC pipeline.`});
    } else {
      insights.push({type:'good', title:` Healthy Used Car Mix: ${ucPct}%`, body:`Used Car contributes ${ucPct}% of total disbursement — good product balance.`});
    }

    // Bank concentration
    if (topBank && pct(topBank[1],totalAmt) > 40) {
      insights.push({type:'warn', title:` High Bank Concentration`, body:`${topBank[0].slice(0,40)} accounts for ${pct(topBank[1],totalAmt)}% of disbursements. Consider diversifying lender mix.`});
    }

    // BM Productivity vs ₹1.75 Cr benchmark
    const allBMsInScope = getEmpData().filter(e => {
      if (e.designation !== 'BM') return false;
      const id = currentUser.id, des = currentUser.designation;
      if (des === 'AM') return e.am_id === id;
      if (des === 'TH') return e.th_id === id;
      if (des === 'RH') return e.rh_id === id;
      return false;
    });
    const activeBMIds  = new Set(bms.map(b => b.bm_id).filter(Boolean));
    const totalBMCount = Math.max(allBMsInScope.length, activeBMIds.size) || 1;
    const PROD_BENCH   = 1.75e7;
    const bmProdAvg    = totalAmt / totalBMCount;
    const bmProdPct    = Math.round((bmProdAvg / PROD_BENCH) * 100);
    const belowBench   = allBMsInScope.filter(e => (bms.find(b => b.bm_id === e.id)?.amt || 0) < PROD_BENCH);
    if (bmProdAvg >= PROD_BENCH) {
      insights.push({type:'good',
        title:` BM Productivity: ${fmtCr(bmProdAvg)}/BM (${bmProdPct}% of ₹1.75 Cr)`,
        body:`Avg disbursement per BM is ${fmtCr(bmProdAvg)} across ${totalBMCount} BMs — above the ₹1.75 Cr benchmark. Excellent team efficiency!`
      });
    } else {
      insights.push({type: bmProdPct >= 70 ? 'warn' : 'action',
        title:` BM Productivity: ${fmtCr(bmProdAvg)}/BM (${bmProdPct}% of ₹1.75 Cr benchmark)`,
        body:`Avg per BM is ${fmtCr(bmProdAvg)} vs ₹1.75 Cr target across ${totalBMCount} BMs. Gap: ${fmtCr(PROD_BENCH - bmProdAvg)}/BM.`
          + (belowBench.length > 0 ? ` BMs below benchmark: ${belowBench.map(e => { const n=resolveEmpById(e.id)?.name||e.name; const a=bms.find(b=>b.bm_id===e.id)?.amt||0; return n+' ('+fmtCr(a)+')'; }).join(', ')}.` : '')
      });
    }
  }

  el.innerHTML = `
    <div class="section-title">Business Insights — ${getCurMonthLabel()}</div>
    ${insights.length === 0 ? '<div class="empty">No transactions found to generate insights.</div>' : `
    <div class="insight-list">
      ${insights.map(i => `
        <div class="insight-item ${i.type}">
          <div class="insight-title">${i.title}</div>
          <div class="insight-body">${i.body}</div>
        </div>
      `).join('')}
    </div>`}
  `;
}



</script>
<script>

// ========== HISTORICAL DATA HELPER ==========
// ── Indian FY: April → March ──────────────────────────────────
// Returns FY start year (e.g. 2026 for FY2026-27, i.e. Apr 2026 - Mar 2027)
function getFYStartYear() {
  const now = new Date();
  return now.getMonth() >= 3 ? now.getFullYear() : now.getFullYear() - 1; // month 3 = April
}

// All months from April of current FY up to current month (oldest first)
function getFYMonths() {
  const fyStart = getFYStartYear(); // e.g. 2026
  const now     = new Date();
  const months  = [];

  // April of FY start year up to current month
  for (let m = 3; m <= 11; m++) { // April(3)..December(11)
    const d = new Date(fyStart, m, 1);
    if (d > now) break;
    months.push(makeMonthEntry(d));
  }
  for (let m = 0; m <= 2; m++) { // Jan(0)..Mar(2) of next year
    const d = new Date(fyStart + 1, m, 1);
    if (d > now) break;
    months.push(makeMonthEntry(d));
  }

  return months; // oldest (April) first
}

// All months for last 6 months (for channel 6M tab)
function getLast6Months() {
  const now    = new Date();
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push(makeMonthEntry(d));
  }
  return months;
}

// Build a month entry object
function makeMonthEntry(d) {
  const pfx   = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  const label = d.toLocaleString('en-IN', {month:'long', year:'numeric'});
  const curPfx  = getCurMonthPrefix();
  const prevPfx = getPrevMonthPrefix();

  let dataFn;
  if (pfx === curPfx) {
    dataFn = () => window._LIVE_TXN || [];
  } else if (pfx === prevPfx) {
    dataFn = () => window._LIVE_MAY || [];
  } else {
    const key = 'hist_' + pfx.replace('-','_');
    dataFn = () => window._rawHistData?.[key] || [];
  }

  return { pfx, label, data: dataFn };
}

// Backward compat alias
function getHistoricalMonths() { return getFYMonths(); }

function loadHistoricalData(data) {
  // Called from data fetch — store hist_ arrays
  window._rawHistData = {};
  Object.keys(data).forEach(k => {
    if (k.startsWith('hist_')) {
      window._rawHistData[k] = data[k]; // already slim-parsed
    }
  });
}

// ========== TAB 1: MONTHLY SUMMARY ==========
function buildMonthlySummary(el) {
  const role   = currentUser.designation;
  const emps   = getEmpData();
  const months = getHistoricalMonths();

  // Get all employees in scope
  function getScoped(filterRole) {
    return emps.filter(e => {
      if (filterRole && e.designation !== filterRole) return false;
      if (role === 'BM')  return e.id === currentUser.id;
      if (role === 'AM')  return e.am_id === currentUser.id || e.id === currentUser.id;
      if (role === 'TH')  return e.th_id === currentUser.id || e.am_id === currentUser.id || e.id === currentUser.id;
      if (role === 'RH') {
        if (window._activeBMFilter) return e.id === window._activeBMFilter;
        if (_activeAMFilter) return e.am_id === _activeAMFilter;
        return e.rh_id === currentUser.id;
      }
      return false;
    });
  }

  const roleOptions = role === 'RH' ? ['BM','AM','TH'] :
                      role === 'TH' ? ['BM','AM'] :
                      role === 'AM' ? ['BM'] : ['BM'];

  // Build stats per employee per month
  function empMonthStats(emp, monthData) {
    // Filter by correct ID field
    // Note: in slim data (hist_), th_id is always empty — TH employees appear as am_id
    const txns  = monthData.filter(t => {
      if (emp.designation==='BM') return t.bm_id === emp.id;
      if (emp.designation==='AM') return t.am_id === emp.id;
      if (emp.designation==='TH') return t.am_id === emp.id || t.th_id === emp.id;
      if (emp.designation==='RH') return t.rh_id === emp.id;
      return false;
    });
    const uc    = txns.filter(t=>t.product==='Used Car');
    const cv    = txns.filter(t=>t.product!=='Used Car');
    const ucAmt = uc.reduce((s,t)=>s+t.amt,0);
    const cvAmt = cv.reduce((s,t)=>s+t.amt,0);
    const tot   = ucAmt+cvAmt;
    const ch    = countChannels(txns, emp);
    const ucTgt = (emp.uc_tgt||0)*1e5;
    const cvTgt = (emp.cv_tgt||0)*1e5;
    const tgt   = ucTgt+cvTgt;
    const ach   = tgt>0?Math.round((tot/tgt)*100):null;
    return { tot, ucAmt, cvAmt, cases:txns.length, ch, ucCases:uc.length, cvCases:cv.length, ach, tgt };
  }

  let selectedRole = roleOptions[0];

  function renderTable(showRole) {
    const scopedEmps = getScoped(showRole);
    const rows = scopedEmps.map(emp => {
      const monthStats = months.map(m => empMonthStats(emp, m.data()));
      const ytdTot  = monthStats.reduce((s,m)=>s+m.tot,0);
      const ytdCases= monthStats.reduce((s,m)=>s+m.cases,0);
      return { emp, monthStats, ytdTot, ytdCases };
    }).sort((a,b)=>b.ytdTot-a.ytdTot);

    return `
      <div style="overflow-x:auto">
        <table style="min-width:900px">
          <thead>
            <tr style="background:#1a237e;color:#fff">
              <th style="padding:10px 12px;text-align:left;position:sticky;left:0;background:#1a237e;z-index:2">#</th>
              <th style="padding:10px 12px;text-align:left;position:sticky;left:30px;background:#1a237e;z-index:2;min-width:140px">Name</th>
              <th style="padding:10px 8px;text-align:center">Tier</th>
              ${months.map(m=>`<th style="padding:10px 8px;text-align:center;min-width:110px;border-left:2px solid rgba(255,255,255,.2)">${m.label.split(' ')[0]}<br><small style="opacity:.7;font-size:10px">${m.label.split(' ')[1]}</small></th>`).join('')}
              <th style="padding:10px 8px;text-align:right;border-left:3px solid #ffd54f;background:#283593">FY ${getFYStartYear()}-${String(getFYStartYear()+1).slice(2)} Total</th>
              <th style="padding:10px 8px;text-align:center;background:#283593">YTD Cases</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((r,i) => `
              <tr style="${i%2===0?'':'background:#f8f9ff'}">
                <td style="padding:8px 12px;color:#9e9e9e;font-size:11px;position:sticky;left:0;background:${i%2===0?'#fff':'#f8f9ff'}">${i+1}</td>
                <td style="padding:8px 12px;position:sticky;left:30px;background:${i%2===0?'#fff':'#f8f9ff'}">
                  <b style="font-size:12px">${r.emp.name}</b>
                </td>
                <td style="padding:8px;text-align:center"><span class="badge badge-grey" style="font-size:10px">${r.emp.tier||'—'}</span></td>
                ${r.monthStats.map(s => `
                  <td style="padding:6px 8px;text-align:center;border-left:2px solid #f0f0f0;vertical-align:middle">
                    ${s.cases===0
                      ? '<span style="color:#e0e0e0;font-size:11px">—</span>'
                      : `<div style="font-size:12px;font-weight:700;color:#1a237e">${fmtCr(s.tot)}</div>
                         <div style="font-size:10px;color:#555;margin-top:2px">${s.cases} cases | ${s.ch} ch</div>
                         <div style="font-size:10px;color:#1565c0">UC:${fmtL(s.ucAmt)}</div>
                         <div style="font-size:10px;color:#6a1b9a">CV:${fmtL(s.cvAmt)}</div>
                         ${s.ach!==null?`<div style="margin-top:3px">${achBadge(s.ach)}</div>`:''}`
                    }
                  </td>`).join('')}
                <td style="padding:8px;text-align:right;border-left:3px solid #ffd54f"><b>${fmtCr(r.ytdTot)}</b></td>
                <td style="padding:8px;text-align:center">${r.ytdCases}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  el.innerHTML = getAMFilterBar('buildMonthlySummary') + getBMFilterBar('buildMonthlySummary') + `
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;padding:14px 16px;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.07)">
      <span style="font-size:13px;font-weight:700;color:#1a237e"> View:</span>
      ${roleOptions.map(r=>`<button onclick="window._mthRole='${r}';document.getElementById('mthBody').innerHTML=window._mthRender('${r}')"
        style="padding:6px 16px;border-radius:20px;border:1px solid #c5cae9;font-size:12px;cursor:pointer;font-weight:600;background:${r===selectedRole?'#1a237e':'#fff'};color:${r===selectedRole?'#fff':'#333'}">${r}</button>`).join('')}
      <span style="font-size:11px;color:#9e9e9e;margin-left:8px">Each cell: Amount | Cases | Channels | UC | CV | Ach%</span>
    </div>
    <div id="mthBody">${renderTable(selectedRole)}</div>
  `;

  window._mthRender = function(showRole) {
    // If BM filter active, always show BM view for that specific BM
    if (window._activeBMFilter) {
      return renderTable('BM');
    }
    const base = renderTable(showRole);
    // If AM filter active and not already BM view, append BM span below
    if (_activeAMFilter && showRole !== 'BM') {
      const am = getSelectedAM();
      const amLabel = am ? am.name : 'AM';
      return base + '<div style="margin-top:20px;padding-top:16px;border-top:2px solid #e8eaf6"><div style="font-size:13px;font-weight:700;color:#1a237e;margin-bottom:10px">BM Span — ' + amLabel + '</div>' + renderTable('BM') + '</div>';

    return base;
  };
}

// ========== TAB 2: CHANNEL 6-MONTH PERFORMANCE ==========
function buildChannel6M(el) {
  const months  = getLast6Months(); // last 6 calendar months
  const role    = currentUser.designation;

  // Collect all transactions across 6 months scoped to current user
  function scopeFilter(txns) {
    let out;
    if (role==='BM') out = txns.filter(t=>t.bm_id===currentUser.id);
    else if (role==='AM') out = txns.filter(t=>t.am_id===currentUser.id);
    else if (role==='TH') out = txns.filter(t=>t.th_id===currentUser.id||t.am_id===currentUser.id);
    else if (_activeAMFilter) out = txns.filter(t=>t.am_id===_activeAMFilter);
    else out = txns.filter(t=>t.rh_id===currentUser.id);
    return window._activeBMFilter ? out.filter(t=>t.bm_id===window._activeBMFilter) : out;
  }

  // Build dealer map across all months
  const dealerMap = {}; // dcid → { dealer, bm_id, bm, months: {pfx: {uc,cv,cases}} }

  months.forEach(m => {
    const txns = scopeFilter(m.data());
    txns.forEach(t => {
      if (!t.dcid) return;
      if (!dealerMap[t.dcid]) dealerMap[t.dcid] = {
        dcid: t.dcid, dealer: t.dealer||t.dcid,
        bm_id: t.bm_id, bm: t.bm, months: {}
      };
      const d = dealerMap[t.dcid];
      if (!d.months[m.pfx]) d.months[m.pfx] = {uc:0,cv:0,cases:0,ucAmt:0,cvAmt:0};
      const s = d.months[m.pfx];
      if (t.product==='Used Car') { s.uc++; s.ucAmt+=t.amt; }
      else { s.cv++; s.cvAmt+=t.amt; }
      s.cases++;
    });
  });

  const dealers = Object.values(dealerMap);
  dealers.forEach(d => {
    d.totalAmt   = months.reduce((s,m)=>{const ms=d.months[m.pfx];return s+(ms?ms.ucAmt+ms.cvAmt:0);},0);
    d.activeMonths = months.filter(m=>d.months[m.pfx]&&d.months[m.pfx].cases>0).length;
    d.gapMonths    = months.filter(m=>!d.months[m.pfx]||d.months[m.pfx].cases===0).length;
    // Resolve BM name
    const bmEmp = resolveEmpById(d.bm_id);
    d.bmName = bmEmp ? bmEmp.name : (d.bm || '—');
  });
  dealers.sort((a,b)=>b.totalAmt-a.totalAmt);

  const curPfx  = getCurMonthPrefix();
  const prevPfx = getPrevMonthPrefix();

  el.innerHTML = getAMFilterBar('buildChannel6M') + getBMFilterBar('buildChannel6M') + `
    <div style="margin-bottom:12px;padding:12px 16px;background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.07);font-size:12px;color:#555">
       <b>${dealers.length} channels</b> tracked across last 6 months &nbsp;|&nbsp;
       Active = had txns that month &nbsp;|&nbsp;  Gap = no txns
    </div>
    <div style="overflow-x:auto">
      <table style="min-width:800px">
        <thead>
          <tr style="background:#1a237e;color:#fff">
            <th style="padding:10px 12px;text-align:left">#</th>
            <th style="padding:10px 12px;text-align:left;min-width:160px">Dealer / Channel</th>
            <th style="padding:10px 8px;text-align:left;min-width:100px">BM</th>
            ${months.map(m=>`<th style="padding:10px 8px;text-align:center;min-width:90px;border-left:2px solid rgba(255,255,255,.2)">${m.label.split(' ')[0]}<br><small style="opacity:.7;font-size:10px">${m.label.split(' ')[1]}</small></th>`).join('')}
            <th style="padding:10px 8px;text-align:center">Act. Months</th>
            <th style="padding:10px 8px;text-align:right">6M Total</th>
          </tr>
        </thead>
        <tbody>
          ${dealers.map((d,i) => `
            <tr style="${i%2===0?'':'background:#f8f9ff'}">
              <td style="padding:8px 12px;color:#9e9e9e;font-size:11px">${i+1}</td>
              <td style="padding:8px 12px">
                <b style="font-size:12px">${d.dealer}</b>
                <div style="font-size:10px;color:#9e9e9e">${d.dcid}</div>
              </td>
              <td style="padding:8px;font-size:11px;color:#555">${d.bmName}</td>
              ${months.map(m => {
                const s = d.months[m.pfx];
                const isGap = !s || s.cases === 0;
                const isCur = m.pfx === curPfx;
                return `<td style="padding:6px 8px;text-align:center;border-left:2px solid #f0f0f0;${isGap?'background:#fff8f8;':''}${isCur?'border-left:3px solid #1a237e;':''}" >
                  ${isGap
                    ? `<span style="color:#ffcdd2;font-size:16px" title="No activity">●</span>`
                    : `<div style="font-size:11px;font-weight:700;color:#1a237e">${fmtL(s.ucAmt+s.cvAmt)}</div>
                       <div style="font-size:9px;color:#555">${s.cases}c</div>
                       ${s.ucAmt>0?`<div style="font-size:9px;color:#1565c0">UC:${fmtL(s.ucAmt)}</div>`:''}
                       ${s.cvAmt>0?`<div style="font-size:9px;color:#6a1b9a">CV:${fmtL(s.cvAmt)}</div>`:''}`
                  }
                </td>`;
              }).join('')}
              <td style="padding:8px;text-align:center">
                <span style="background:${d.activeMonths>=4?'#e8f5e9':d.activeMonths>=2?'#fff8e1':'#ffebee'};color:${d.activeMonths>=4?'#2e7d32':d.activeMonths>=2?'#f57f17':'#c62828'};padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700">
                  ${d.activeMonths}/6
                </span>
              </td>
              <td style="padding:8px;text-align:right"><b>${fmtCr(d.totalAmt)}</b></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

// ========== TAB 3: SCORECARD (YTD + Channel Intelligence) ==========
function buildScorecard(el) {
  const role    = currentUser.designation;
  const months  = getFYMonths();
  const selAM   = getSelectedAM();
  const emps    = getEmpData();
  const curPfx  = getCurMonthPrefix();
  const prevPfx = getPrevMonthPrefix();

  // Get all months data in scope
  function scopeTxns(txns) {
    let out;
    if (role==='BM') out = txns.filter(t=>t.bm_id===currentUser.id);
    else if (role==='AM') out = txns.filter(t=>t.am_id===currentUser.id);
    else if (role==='TH') out = txns.filter(t=>t.th_id===currentUser.id);
    else out = _activeAMFilter ? txns.filter(t=>t.am_id===_activeAMFilter) : txns.filter(t=>t.rh_id===currentUser.id);
    return window._activeBMFilter ? out.filter(t=>t.bm_id===window._activeBMFilter) : out;
  }

  const curTxns  = scopeTxns(window._LIVE_TXN||[]);
  const prevTxns = scopeTxns(window._LIVE_MAY||[]);
  const allTxns  = months.flatMap(m=>scopeTxns(m.data()));

  // YTD stats
  const ytdAmt   = allTxns.reduce((s,t)=>s+t.amt,0);
  const ytdUC    = allTxns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
  const ytdCV    = allTxns.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);
  const ytdCases = allTxns.length;

  const curEmp   = resolveEmpById(currentUser.id);
  const ucTgt    = (curEmp?.uc_tgt||0)*1e5;
  const cvTgt    = (curEmp?.cv_tgt||0)*1e5;
  const totTgt   = ucTgt+cvTgt;

  // Channel analysis
  const curCh    = new Set(curTxns.filter(t=>t.ch_check>0&&t.dcid).map(t=>t.dcid));
  const _rhEmp   = resolveEmpById(currentUser.id);
  const prevCh   = new Set(prevTxns.filter(t=>isCVBM(_rhEmp)?t.product!=='Used Car'&&t.dcid:t.ch_check>0&&t.dcid).map(t=>t.dcid));

  // Last 3 months channels
  const last3    = months.slice(-3);
  const l3Txns   = last3.flatMap(m=>scopeTxns(m.data()));
  const l3Ch     = new Set(l3Txns.filter(t=>t.ch_check>0&&t.dcid).map(t=>t.dcid));

  // Lost channels: active in prev, not in cur
  const lostCh   = [...prevCh].filter(d=>!curCh.has(d));
  // New channels: active in cur, not in prev
  const newCh    = [...curCh].filter(d=>!prevCh.has(d));
  // Inactive channels: in last 3 months but not current
  const inactiveCh = [...l3Ch].filter(d=>!curCh.has(d));

  // Estimate potential GMV from inactive channels (avg GMV per channel from last 3 months)
  function avgChGMV(dcid) {
    const t = l3Txns.filter(t=>t.dcid===dcid);
    return t.length > 0 ? t.reduce((s,t)=>s+t.amt,0)/last3.length : 0;
  }

  const lostChData = lostCh.map(dcid => {
    const txns = prevTxns.filter(t=>t.dcid===dcid);
    const gmv  = txns.reduce((s,t)=>s+t.amt,0);
    const ucGmv= txns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
    const cvGmv= txns.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);
    const dealer = txns[0]?.dealer || dcid;
    const bmEmp  = resolveEmpById(txns[0]?.bm_id);
    return { dcid, dealer, gmv, ucGmv, cvGmv, bm: bmEmp?.name||txns[0]?.bm||'—' };
  }).sort((a,b)=>b.gmv-a.gmv);

  const inactiveChData = inactiveCh.filter(d=>!lostCh.includes(d)).map(dcid => {
    const txns  = l3Txns.filter(t=>t.dcid===dcid);
    const avg   = avgChGMV(dcid);
    const ucAvg = txns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0) / 3;
    const cvAvg = txns.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0) / 3;
    const dealer= txns[0]?.dealer || dcid;
    const bmEmp = resolveEmpById(txns[0]?.bm_id);
    return { dcid, dealer, avg, ucAvg, cvAvg, bm: bmEmp?.name||txns[0]?.bm||'—', lastActive: txns.sort((a,b)=>b.date.localeCompare(a.date))[0]?.date?.slice(0,7)||'—' };
  }).sort((a,b)=>b.avg-a.avg);

  const potentialGMV = lostChData.reduce((s,c)=>s+c.gmv,0) + inactiveChData.reduce((s,c)=>s+c.avg,0);

  el.innerHTML = getAMFilterBar('buildScorecard') + getBMFilterBar('buildScorecard') + `
    <!-- Channel Activation Trend (moved to top) -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Channel Activation Trend — Last 3 Months</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:12px">
        ${last3.map(m=>{
          const txns = scopeTxns(m.data());
          const ch   = countChannels(txns, resolveEmpById(currentUser.id));
          const amt  = txns.reduce((s,t)=>s+t.amt,0);
          return '<div style="flex:1;min-width:130px;background:#f5f7ff;border-radius:10px;padding:14px;text-align:center">'
            +'<div style="font-size:12px;font-weight:700;color:#1a237e">'+m.label+'</div>'
            +'<div style="font-size:28px;font-weight:800;color:#283593;margin:6px 0">'+ch+'</div>'
            +'<div style="font-size:11px;color:#555">unique channels</div>'
            +'<div style="font-size:13px;color:#1565c0;margin-top:4px">'+fmtCr(amt)+'</div>'
            +'</div>';
        }).join('')}
        <div style="flex:1;min-width:130px;background:#e8f5e9;border-radius:10px;padding:14px;text-align:center">
          <div style="font-size:12px;font-weight:700;color:#2e7d32">Gap (L3M to Now)</div>
          <div style="font-size:28px;font-weight:800;color:#c62828;margin:6px 0">${inactiveCh.length}</div>
          <div style="font-size:11px;color:#555">channels dropped</div>
          <div style="font-size:13px;color:#e65100;margin-top:4px">~${fmtCr(potentialGMV)} potential</div>
        </div>
      </div>
    </div>

    <!-- YTD KPIs -->
    <div class="kpi-grid" style="grid-template-columns:repeat(5,1fr);margin-bottom:20px">
      <div class="kpi"><div class="kpi-label">FY ${getFYStartYear()}-${String(getFYStartYear()+1).slice(2)} Disbursement</div><div class="kpi-value">${fmtCr(ytdAmt)}</div></div>
      <div class="kpi"><div class="kpi-label">YTD UC</div><div class="kpi-value" style="font-size:20px;color:#1565c0">${fmtCr(ytdUC)}</div></div>
      <div class="kpi"><div class="kpi-label">YTD CV</div><div class="kpi-value" style="font-size:20px;color:#6a1b9a">${fmtCr(ytdCV)}</div></div>
      <div class="kpi"><div class="kpi-label">YTD Cases</div><div class="kpi-value">${ytdCases}</div></div>
      <div class="kpi"><div class="kpi-label">MTD Ach% vs Target</div>
        <div class="kpi-value" style="color:${totTgt>0&&Math.round((curTxns.reduce((s,t)=>s+t.amt,0)/totTgt)*100)>=70?'#2e7d32':'#c62828'}">
          ${totTgt>0?Math.round((curTxns.reduce((s,t)=>s+t.amt,0)/totTgt)*100)+'%':'—'}
        </div>
      </div>
    </div>

    <!-- Channel Activation Summary -->
    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
      <div class="kpi"><div class="kpi-label">Current Month Channels</div><div class="kpi-value">${curCh.size}</div>
        <div class="kpi-sub">${curCh.size>=prevCh.size?'▲':'▼'} vs ${prevCh.size} last month</div></div>
      <div class="kpi"><div class="kpi-label">New Channels (vs LMTD)</div><div class="kpi-value" style="color:#2e7d32">+${newCh.length}</div></div>
      <div class="kpi"><div class="kpi-label">Lost Channels (vs LMTD)</div><div class="kpi-value" style="color:#c62828">-${lostCh.length}</div></div>
      <div class="kpi"><div class="kpi-label">Potential GMV (Reactivation)</div><div class="kpi-value" style="color:#e65100">${fmtCr(potentialGMV)}</div></div>
    </div>

    <!-- Lost Channels (active prev month, gone now) -->
    ${lostChData.length > 0 ? `
    <div class="card" style="padding:0;overflow:hidden;margin-bottom:16px">
      <div style="padding:12px 20px;background:#ffebee;font-size:13px;font-weight:700;color:#c62828">
         Lost Channels — Active in ${getPrevMonthLabel()}, Missing in ${getCurMonthLabel()} (${lostChData.length})
        <span style="font-size:11px;font-weight:400;margin-left:8px">Total GMV at risk: ${fmtCr(lostChData.reduce((s,c)=>s+c.gmv,0))}</span>
      </div>
      <div style="overflow-x:auto"><table>
        <thead><tr style="background:#f5f5f5">
          <th>#</th><th>Dealer / Channel</th><th>BM</th>
          <th style="text-align:right">${getPrevMonthLabel()} GMV</th>
          <th style="text-align:right;color:#1565c0">UC GMV</th>
          <th style="text-align:right;color:#6a1b9a">CV GMV</th>
          <th>Action</th>
        </tr></thead>
        <tbody>${lostChData.map((c,i)=>`<tr>
          <td style="color:#9e9e9e;font-size:11px">${i+1}</td>
          <td><b style="font-size:12px">${c.dealer}</b><div style="font-size:10px;color:#9e9e9e">${c.dcid}</div></td>
          <td style="font-size:11px">${c.bm}</td>
          <td style="text-align:right;color:#c62828;font-weight:700">${fmtCr(c.gmv)}</td>
          <td style="text-align:right;color:#1565c0;font-size:11px">${c.ucGmv>0?fmtCr(c.ucGmv):'<span style="color:#ccc">—</span>'}</td>
          <td style="text-align:right;color:#6a1b9a;font-size:11px">${c.cvGmv>0?fmtCr(c.cvGmv):'<span style="color:#ccc">—</span>'}</td>
          <td><span style="background:#ffebee;color:#c62828;padding:2px 8px;border-radius:10px;font-size:10px">Re-engage</span></td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>` : ''}

    <!-- Inactive Channels (last 3 months but not current) -->
    ${inactiveChData.length > 0 ? `
    <div class="card" style="padding:0;overflow:hidden;margin-bottom:16px">
      <div style="padding:12px 20px;background:#fff8e1;font-size:13px;font-weight:700;color:#f57f17">
         Inactive Channels — Last 3 Months but Not This Month (${inactiveChData.length})
        <span style="font-size:11px;font-weight:400;margin-left:8px">Est. potential: ${fmtCr(inactiveChData.reduce((s,c)=>s+c.avg,0))}/month</span>
      </div>
      <div style="overflow-x:auto"><table>
        <thead><tr style="background:#f5f5f5">
          <th>#</th><th>Dealer / Channel</th><th>BM</th>
          <th style="text-align:center">Last Active</th>
          <th style="text-align:right">Avg GMV/mo</th>
          <th style="text-align:right;color:#1565c0">UC Avg</th>
          <th style="text-align:right;color:#6a1b9a">CV Avg</th>
          <th>Action</th>
        </tr></thead>
        <tbody>${inactiveChData.slice(0,20).map((c,i)=>`<tr>
          <td style="color:#9e9e9e;font-size:11px">${i+1}</td>
          <td><b style="font-size:12px">${c.dealer}</b><div style="font-size:10px;color:#9e9e9e">${c.dcid}</div></td>
          <td style="font-size:11px">${c.bm}</td>
          <td style="text-align:center;font-size:11px;color:#f57f17">${c.lastActive}</td>
          <td style="text-align:right;color:#e65100;font-weight:700">${fmtCr(c.avg)}</td>
          <td style="text-align:right;color:#1565c0;font-size:11px">${c.ucAvg>0?fmtCr(c.ucAvg):'<span style="color:#ccc">—</span>'}</td>
          <td style="text-align:right;color:#6a1b9a;font-size:11px">${c.cvAvg>0?fmtCr(c.cvAvg):'<span style="color:#ccc">—</span>'}</td>
          <td><span style="background:#fff8e1;color:#f57f17;padding:2px 8px;border-radius:10px;font-size:10px">Reactivate</span></td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>` : ''}

    <!-- Last 3 months unique channel trend -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title"> Channel Activation Trend — Last 3 Months</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:12px">
        ${last3.map(m=>{
          const txns = scopeTxns(m.data());
          const ch   = countChannels(txns, resolveEmpById(currentUser.id));
          const amt  = txns.reduce((s,t)=>s+t.amt,0);
          return `<div style="flex:1;min-width:140px;background:#f5f7ff;border-radius:10px;padding:14px;text-align:center">
            <div style="font-size:12px;font-weight:700;color:#1a237e">${m.label}</div>
            <div style="font-size:24px;font-weight:800;color:#283593;margin:6px 0">${ch}</div>
            <div style="font-size:11px;color:#555">unique channels</div>
            <div style="font-size:12px;color:#1565c0;margin-top:4px">${fmtCr(amt)}</div>
          </div>`;
        }).join('')}
        <div style="flex:1;min-width:140px;background:#e8f5e9;border-radius:10px;padding:14px;text-align:center">
          <div style="font-size:12px;font-weight:700;color:#2e7d32">Gap (L3M → Now)</div>
          <div style="font-size:24px;font-weight:800;color:#c62828;margin:6px 0">${inactiveCh.length}</div>
          <div style="font-size:11px;color:#555">channels dropped</div>
          <div style="font-size:12px;color:#e65100;margin-top:4px">~${fmtCr(potentialGMV)} potential</div>
        </div>
      </div>
    </div>
  `;
}



</script>
<script>

// ========== Q1 QUARTERLY SCORECARD (Apr-Jun) ==========
function buildQuarterly(el) {
  const role  = currentUser.designation;
  const emps  = getEmpData();

  // Q1 = April, May, June
  const q1Months = [
    makeMonthEntry(new Date(getFYStartYear(), 3, 1)),  // April
    makeMonthEntry(new Date(getFYStartYear(), 4, 1)),  // May
    makeMonthEntry(new Date(getFYStartYear(), 5, 1)),  // June
  ].filter(m => {
    const d = new Date(m.pfx + '-01');
    return d <= new Date();
  });

  function getScoped(filterRole) {
    return emps.filter(e => {
      if (filterRole && e.designation !== filterRole) return false;
      if (role==='BM')  return e.id === currentUser.id;
      if (role==='AM')  return e.am_id === currentUser.id || e.id === currentUser.id;
      if (role==='TH')  return e.th_id === currentUser.id || e.id === currentUser.id;
      if (role==='RH')  {
        if (_activeAMFilter) return e.am_id === _activeAMFilter;
        return e.rh_id === currentUser.id;
      }
      return false;
    });
  }

  function empQStats(emp) {
    const txns = q1Months.flatMap(m => m.data().filter(t => {
      if (emp.designation==='BM') return t.bm_id===emp.id;
      if (emp.designation==='AM') return t.am_id===emp.id;
      if (emp.designation==='TH') return t.am_id===emp.id; // TH stored as am_id in slim data
      if (emp.designation==='RH') return t.rh_id===emp.id;
      return t.bm_id===emp.id||t.am_id===emp.id||t.rh_id===emp.id;
    }));
    const ucAmt  = txns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
    const cvAmt  = txns.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);
    const tot    = ucAmt+cvAmt;
    const ch     = countChannels(txns, emp);
    const ucTgt  = (emp.uc_tgt||0)*1e5*3; // 3 months
    const cvTgt  = (emp.cv_tgt||0)*1e5*3;
    const tgt    = ucTgt+cvTgt;
    const ach    = tgt>0?Math.round((tot/tgt)*100):null;
    return { tot, ucAmt, cvAmt, cases:txns.length, ch, tgt, ach };
  }

  function empMonthStats(emp, m) {
    const txns  = m.data().filter(t => {
      if (emp.designation==='BM') return t.bm_id===emp.id;
      if (emp.designation==='AM') return t.am_id===emp.id;
      if (emp.designation==='TH') return t.am_id===emp.id; // TH stored as am_id in slim data
      if (emp.designation==='RH') return t.rh_id===emp.id;
      return t.bm_id===emp.id||t.am_id===emp.id||t.rh_id===emp.id;
    });
    const ucAmt = txns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
    const cvAmt = txns.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);
    const ch    = countChannels(txns, emp);
    return { tot:ucAmt+cvAmt, ucAmt, cvAmt, cases:txns.length, ch };
  }

  const roleOptions = role==='RH'?['BM','AM','TH']:role==='TH'?['BM','AM']:['BM'];

  function renderQ(showRole) {
    const scopedEmps = getScoped(showRole);
    const rows = scopedEmps.map(emp => ({
      emp,
      q: empQStats(emp),
      months: q1Months.map(m => empMonthStats(emp, m))
    })).sort((a,b)=>b.q.tot-a.q.tot);

    const totQ1  = rows.reduce((s,r)=>s+r.q.tot,0);
    const totUC  = rows.reduce((s,r)=>s+r.q.ucAmt,0);
    const totCV  = rows.reduce((s,r)=>s+r.q.cvAmt,0);
    const onTrack= rows.filter(r=>r.q.ach!==null&&r.q.ach>=70).length;

    return `
      <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px">
        <div class="kpi"><div class="kpi-label">Q1 Team Total</div><div class="kpi-value">${fmtCr(totQ1)}</div></div>
        <div class="kpi"><div class="kpi-label">Q1 UC</div><div class="kpi-value" style="color:#1565c0;font-size:20px">${fmtCr(totUC)}</div></div>
        <div class="kpi"><div class="kpi-label">Q1 CV</div><div class="kpi-value" style="color:#6a1b9a;font-size:20px">${fmtCr(totCV)}</div></div>
        <div class="kpi"><div class="kpi-label">On Track (≥70%)</div><div class="kpi-value" style="color:#2e7d32">${onTrack}/${rows.length}</div></div>
      </div>
      <div style="overflow-x:auto">
        <table style="min-width:800px">
          <thead>
            <tr style="background:#1a237e;color:#fff">
              <th style="padding:10px 12px;text-align:left">#</th>
              <th style="padding:10px 12px;text-align:left;min-width:140px">Name</th>
              <th style="padding:10px 8px">Tier</th>
              ${q1Months.map(m=>`
                <th style="padding:10px 8px;text-align:center;border-left:2px solid rgba(255,255,255,.2);min-width:110px">
                  ${m.label.split(' ')[0]}
                </th>`).join('')}
              <th style="padding:10px 8px;text-align:right;border-left:3px solid #ffd54f;background:#283593">Q1 Total</th>
              <th style="padding:10px 8px;text-align:center;background:#283593">Q1 Ach%</th>
              <th style="padding:10px 8px;text-align:center;background:#283593">Ch</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((r,i)=>`
              <tr style="${i%2===0?'':'background:#f8f9ff'}">
                <td style="padding:8px 12px;color:#9e9e9e;font-size:11px">${i+1}</td>
                <td style="padding:8px 12px"><b style="font-size:12px">${r.emp.name}</b></td>
                <td style="padding:8px;text-align:center"><span class="badge badge-grey" style="font-size:10px">${r.emp.tier||'—'}</span></td>
                ${r.months.map(s=>`
                  <td style="padding:6px 8px;text-align:center;border-left:2px solid #f0f0f0">
                    ${s.cases===0
                      ? '<span style="color:#e0e0e0">—</span>'
                      : `<div style="font-size:12px;font-weight:700;color:#1a237e">${fmtCr(s.tot)}</div>
                         <div style="font-size:10px;color:#555">${s.cases}c | ${s.ch}ch</div>
                         <div style="font-size:10px;color:#1565c0">UC:${fmtL(s.ucAmt)}</div>
                         <div style="font-size:10px;color:#6a1b9a">CV:${fmtL(s.cvAmt)}</div>`
                    }
                  </td>`).join('')}
                <td style="padding:8px 12px;text-align:right;border-left:3px solid #ffd54f"><b>${fmtCr(r.q.tot)}</b></td>
                <td style="padding:8px;text-align:center">${r.q.ach!==null?achBadge(r.q.ach):'<span class="badge badge-grey">—</span>'}</td>
                <td style="padding:8px;text-align:center">${r.q.ch}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  el.innerHTML = getAMFilterBar('buildQuarterly') + `
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;padding:14px 16px;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.07)">
      <span style="font-size:13px;font-weight:700;color:#1a237e">Q1 ${getFYStartYear()}-${String(getFYStartYear()+1).slice(2)} (Apr-Jun) &nbsp;|&nbsp; View:</span>
      ${roleOptions.map((r,i)=>`
        <button id="qBtn_${r}" onclick="document.querySelectorAll('[id^=qBtn_]').forEach(b=>b.style.background='#fff',b.style.color='#333');this.style.background='#1a237e';this.style.color='#fff';document.getElementById('qBody').innerHTML=window._qRender('${r}')"
          style="padding:6px 16px;border-radius:20px;border:1px solid #c5cae9;font-size:12px;cursor:pointer;font-weight:600;background:${i===0?'#1a237e':'#fff'};color:${i===0?'#fff':'#333'}">${r}</button>`).join('')}
    </div>
    <div id="qBody">${renderQ(roleOptions[0])}</div>
  `;
  window._qRender = renderQ;
}

// ========== CHANNEL DRIVE (Role-wise) ==========
function buildChannelDrive(el) {
  const role    = currentUser.designation;
  const emps    = getEmpData();
  const curTxns = _activeAMFilter ? myTxns.filter(t=>t.am_id===_activeAMFilter) : myTxns;
  const prevData= window._LIVE_MAY || [];
  const l3Data  = getLast6Months().slice(-3).flatMap(m => {
    const t = m.data();
    if (role==='BM') return t.filter(x=>x.bm_id===currentUser.id);
    if (role==='AM') return t.filter(x=>x.am_id===currentUser.id);
    if (role==='TH') return t.filter(x=>x.th_id===currentUser.id);
    return t.filter(x=>x.rh_id===currentUser.id);
  });

  function scopePrev(txns) {
    if (role==='BM') return txns.filter(t=>t.bm_id===currentUser.id);
    if (role==='AM') return txns.filter(t=>t.am_id===currentUser.id);
    if (role==='TH') return txns.filter(t=>t.th_id===currentUser.id);
    return txns.filter(t=>t.rh_id===currentUser.id);
  }

  const prevTxns = scopePrev(prevData);
  const curCh  = new Set(curTxns.filter(t=>t.ch_check>0&&t.dcid).map(t=>t.dcid));
  const prevCh = new Set(prevTxns.filter(t=>t.ch_check>0&&t.dcid).map(t=>t.dcid));
  const l3Ch   = new Set(l3Data.filter(t=>t.ch_check>0&&t.dcid).map(t=>t.dcid));

  // Lost = was in prev, not in cur
  const lostDcids = [...prevCh].filter(d=>!curCh.has(d));
  // Inactive = in L3 but not cur (excluding lost)
  const inactiveDcids = [...l3Ch].filter(d=>!curCh.has(d)&&!lostDcids.includes(d));

  function dealerInfo(dcid, txnPool) {
    const t = txnPool.filter(x=>x.dcid===dcid);
    return {
      dealer: t[0]?.dealer || dcid,
      bm_id:  t[0]?.bm_id || '',
      gmv:    t.reduce((s,x)=>s+x.amt,0),
      cases:  t.length,
      bm:     resolveEmpById(t[0]?.bm_id)?.name || t[0]?.bm || '—'
    };
  }

  // ── BM VIEW ──────────────────────────────────
  if (role === 'BM') {
    const lost     = lostDcids.map(d=>({...dealerInfo(d,prevTxns), dcid:d})).sort((a,b)=>b.gmv-a.gmv);
    const inactive = inactiveDcids.map(d=>({...dealerInfo(d,l3Data), dcid:d})).sort((a,b)=>b.gmv-a.gmv);
    el.innerHTML = `
      <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px">
        <div class="kpi"><div class="kpi-label">Active This Month</div><div class="kpi-value" style="color:#2e7d32">${curCh.size}</div></div>
        <div class="kpi"><div class="kpi-label">Lost (vs ${getPrevMonthLabel().split(' ')[0]})</div><div class="kpi-value" style="color:#c62828">${lost.length}</div></div>
        <div class="kpi"><div class="kpi-label">Inactive (L3M)</div><div class="kpi-value" style="color:#f57f17">${inactive.length}</div></div>
      </div>
      ${lost.length?`
      <div class="card" style="padding:0;overflow:hidden;margin-bottom:16px">
        <div style="padding:12px 20px;background:#ffebee;font-weight:700;font-size:13px;color:#c62828">
           Re-engage These Channels — Were Active Last Month (${lost.length})
        </div>
        <table><thead><tr><th>#</th><th>Dealer</th><th style="text-align:right">${getPrevMonthLabel().split(' ')[0]} GMV</th><th>Cases</th><th>Priority</th></tr></thead>
        <tbody>${lost.map((d,i)=>`<tr>
          <td style="color:#9e9e9e">${i+1}</td>
          <td><b>${d.dealer}</b><div style="font-size:10px;color:#9e9e9e">${d.dcid}</div></td>
          <td style="text-align:right;color:#c62828;font-weight:700">${fmtCr(d.gmv)}</td>
          <td>${d.cases}</td>
          <td><span style="background:#ffebee;color:#c62828;padding:2px 8px;border-radius:10px;font-size:10px"> High</span></td>
        </tr>`).join('')}</tbody></table>
      </div>`:''}
      ${inactive.length?`
      <div class="card" style="padding:0;overflow:hidden">
        <div style="padding:12px 20px;background:#fff8e1;font-weight:700;font-size:13px;color:#f57f17">
           Reactivate These Channels — Active in Last 3 Months (${inactive.length})
        </div>
        <table><thead><tr><th>#</th><th>Dealer</th><th style="text-align:right">L3M GMV</th><th>Cases</th></tr></thead>
        <tbody>${inactive.map((d,i)=>`<tr>
          <td style="color:#9e9e9e">${i+1}</td>
          <td><b>${d.dealer}</b><div style="font-size:10px;color:#9e9e9e">${d.dcid}</div></td>
          <td style="text-align:right;color:#f57f17;font-weight:700">${fmtCr(d.gmv)}</td>
          <td>${d.cases}</td>
        </tr>`).join('')}</tbody></table>
      </div>`:''}
    `;
    return;
  }

  // ── AM / TH / RH VIEW ────────────────────────
  const bmList = emps.filter(e => {
    if (e.designation !== 'BM') return false;
    if (role==='AM') return e.am_id === currentUser.id;
    if (role==='TH') return e.th_id === currentUser.id || e.am_id === currentUser.id;
    if (_activeAMFilter) return e.am_id === _activeAMFilter;
    return e.rh_id === currentUser.id;
  });

  const bmRows = bmList.map(bm => {
    const bmCur  = curTxns.filter(t=>t.bm_id===bm.id);
    const bmPrev = prevTxns.filter(t=>t.bm_id===bm.id);
    const bmL3   = l3Data.filter(t=>t.bm_id===bm.id);
    const _bmEmp = resolveEmpById(bm.id);
    const _isCVBM = _bmEmp && (!_bmEmp.uc_tgt||_bmEmp.uc_tgt===0||_bmEmp.uc_tgt==='') && _bmEmp.cv_tgt>0;
    const _chFilt = t => _isCVBM ? !!t.dcid : (t.ch_check>0&&!!t.dcid);
    const bmCurCh  = new Set(bmCur.filter(_chFilt).map(t=>t.dcid));
    const bmPrevCh = new Set(bmPrev.filter(_chFilt).map(t=>t.dcid));
    const bmL3Ch   = new Set(bmL3.filter(_chFilt).map(t=>t.dcid));
    const bmLost   = [...bmPrevCh].filter(d=>!bmCurCh.has(d));
    const bmInact  = [...bmL3Ch].filter(d=>!bmCurCh.has(d)&&!bmLost.includes(d));
    const bmAmt    = bmCur.reduce((s,t)=>s+t.amt,0);
    const chTgt    = bm.ch_tgt || 0;
    const chGap    = Math.max(0, chTgt - bmCurCh.size);
    return { bm, bmCurCh:bmCurCh.size, bmPrevCh:bmPrevCh.size, bmLost:bmLost.length, bmInact:bmInact.length, chTgt, chGap, bmAmt, cases:bmCur.length };
  }).sort((a,b)=>b.bmLost-a.bmLost||b.bmInact-a.bmInact);

  const totLost  = bmRows.reduce((s,r)=>s+r.bmLost,0);
  const totInact = bmRows.reduce((s,r)=>s+r.bmInact,0);
  const totGap   = bmRows.reduce((s,r)=>s+r.chGap,0);
  const needFocus= bmRows.filter(r=>r.bmLost>0||r.bmInact>2).length;

  el.innerHTML = getAMFilterBar('buildChannelDrive') + `
    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
      <div class="kpi"><div class="kpi-label">BMs Needing Focus</div><div class="kpi-value" style="color:#c62828">${needFocus}</div></div>
      <div class="kpi"><div class="kpi-label">Total Lost Channels</div><div class="kpi-value" style="color:#c62828">${totLost}</div></div>
      <div class="kpi"><div class="kpi-label">Total Inactive (L3M)</div><div class="kpi-value" style="color:#f57f17">${totInact}</div></div>
      <div class="kpi"><div class="kpi-label">Total Channel Gap</div><div class="kpi-value" style="color:#e65100">${totGap}</div></div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:12px 20px;background:#e8eaf6;font-weight:700;font-size:13px;color:#1a237e">
         BM-wise Channel Health — Focus Areas
      </div>
      <div style="overflow-x:auto"><table>

// ========== MAILROOM — Send HTML Scorecard Email ==========
// ── Apps Script URL management ─────────────────────────────
function getASUrl() { return localStorage.getItem('rupyy_as_email_url') || ''; }
function setASUrl(url) { localStorage.setItem('rupyy_as_email_url', url); }

function promptASUrl() {
  const existing = getASUrl();
  const url = prompt(
    'Paste your Apps Script Web App URL:\n\n' +
    '(Apps Script → Deploy → Manage Deployments → copy Web App URL)',
    existing || ''
  );
  if (url && url.startsWith('http')) {
    setASUrl(url);
    alert(' Saved! You can now send emails.');
    return url;
  }
  return existing;
}

// ── Core email sender via Apps Script ──────────────────────
async function sendEmail({ to, cc, subject, htmlBody, statusEl }) {
  let url = getASUrl();
  if (!url) { url = promptASUrl(); }
  if (!url) {
    statusEl.innerHTML = '<span style="color:#c62828"> No Apps Script URL set</span>';
    return;
  }

  statusEl.innerHTML = '<span style="color:#1565c0;font-weight:600">⏳ Sending...</span>';

  try {
    await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to, cc: cc||[], subject, htmlBody }),
      mode: 'no-cors'
    });
    statusEl.innerHTML = `<span style="color:#2e7d32;font-weight:700"> Sent to ${to.length} recipient${to.length>1?'s':''}!</span>`;
  } catch(e) {
    statusEl.innerHTML = `<span style="color:#c62828"> ${e.message}</span>`;
  }
}

// ── Channel Drive Email HTML ────────────────────────────────
function buildChannelEmailHTML(type, note) {
  const prevData = window._LIVE_MAY || [];
  const l3Data   = getLast6Months().slice(-3).flatMap(m => m.data().filter(t => t.rh_id === currentUser.id));
  const dateStr  = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  const month    = getCurMonthLabel();
  const prevMonth= getPrevMonthLabel();

  const curTxns  = myTxns;
  const prevTxns = prevData.filter(t => t.rh_id === currentUser.id);
  const curCh    = new Set(curTxns.filter(t=>t.ch_check>0&&t.dcid).map(t=>t.dcid));
  const _rhEmp   = resolveEmpById(currentUser.id);
  const prevCh   = new Set(prevTxns.filter(t=>isCVBM(_rhEmp)?t.product!=='Used Car'&&t.dcid:t.ch_check>0&&t.dcid).map(t=>t.dcid));
  const l3Ch     = new Set(l3Data.filter(t=>t.ch_check>0&&t.dcid).map(t=>t.dcid));

  const lostDcids     = [...prevCh].filter(d=>!curCh.has(d));
  const inactiveDcids = [...l3Ch].filter(d=>!curCh.has(d)&&!lostDcids.includes(d));

  function dealerRow(dcid, pool, idx) {
    const t      = pool.filter(x=>x.dcid===dcid);
    const dealer = t[0]?.dealer || dcid;
    const gmv    = t.reduce((s,x)=>s+x.amt,0);
    const bm     = resolveEmpById(t[0]?.bm_id)?.name || t[0]?.bm || '—';
    return '<tr style="background:' + (idx%2===0?'#fff':'#fff8f8') + '">'
      + '<td style="padding:7px 10px;color:#9e9e9e">' + (idx+1) + '</td>'
      + '<td style="padding:7px 10px;font-weight:700">' + dealer + '<div style="font-size:10px;color:#9e9e9e">' + dcid + '</div></td>'
      + '<td style="padding:7px 10px">' + bm + '</td>'
      + '<td style="padding:7px 10px;text-align:right;font-weight:700;color:#c62828">' + fmtCr(gmv) + '</td>'
      + '</tr>';
  }

  const showLost     = type==='lost'||type==='full';
  const showInactive = type==='inactive'||type==='full';

  return '<!DOCTYPE html><html><body style="margin:0;padding:0;background:#f5f5f5;font-family:Arial,sans-serif">'
    + '<div style="max-width:680px;margin:0 auto;padding:16px">'
    + '<div style="background:linear-gradient(135deg,#b71c1c,#c62828);border-radius:12px 12px 0 0;padding:24px 28px">'
    + '<div style="color:#fff;font-size:20px;font-weight:800">Channel Drive Alert</div>'
    + '<div style="color:rgba(255,255,255,.75);font-size:12px;margin-top:4px">' + dateStr + ' | Action Required | From: ' + currentUser.name + '</div>'
    + '</div>'
    + '<div style="background:#fff;padding:16px 28px;display:flex;gap:0;border-bottom:2px solid #ffcdd2">'
    + '<div style="flex:1;text-align:center;padding:8px;border-right:1px solid #ffebee"><div style="font-size:10px;color:#9e9e9e;font-weight:600">ACTIVE NOW</div><div style="font-size:20px;font-weight:800;color:#2e7d32">' + curCh.size + '</div></div>'
    + '<div style="flex:1;text-align:center;padding:8px;border-right:1px solid #ffebee"><div style="font-size:10px;color:#9e9e9e;font-weight:600">LAST MONTH</div><div style="font-size:20px;font-weight:800;color:#1565c0">' + prevCh.size + '</div></div>'
    + '<div style="flex:1;text-align:center;padding:8px;border-right:1px solid #ffebee"><div style="font-size:10px;color:#9e9e9e;font-weight:600">LOST</div><div style="font-size:20px;font-weight:800;color:#c62828">' + lostDcids.length + '</div></div>'
    + '<div style="flex:1;text-align:center;padding:8px"><div style="font-size:10px;color:#9e9e9e;font-weight:600">INACTIVE (L3M)</div><div style="font-size:20px;font-weight:800;color:#f57f17">' + inactiveDcids.length + '</div></div>'
    + '</div>'
    + (note ? '<div style="background:#fff3e0;padding:12px 28px;border-left:4px solid #f57f17"><b>Action Required:</b> <span style="color:#333">' + note + '</span></div>' : '')
    + (showLost && lostDcids.length ? '<div style="background:#fff;padding:16px 28px"><div style="font-weight:700;color:#c62828;font-size:14px;margin-bottom:10px">Lost Channels — Were Active Last Month (' + lostDcids.length + ')</div>'
      + '<table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="background:#ffebee"><th style="padding:7px 10px;text-align:left">#</th><th style="padding:7px 10px;text-align:left">Dealer</th><th style="padding:7px 10px;text-align:left">BM</th><th style="padding:7px 10px;text-align:right">' + prevMonth.split(' ')[0] + ' GMV</th></tr></thead><tbody>'
      + lostDcids.map((d,i) => dealerRow(d, prevTxns, i)).join('')
      + '</tbody></table></div>' : '')
    + (showInactive && inactiveDcids.length ? '<div style="background:#fff;padding:16px 28px;border-top:1px solid #f5f5f5"><div style="font-weight:700;color:#f57f17;font-size:14px;margin-bottom:10px">Inactive Channels — Last 3 Months Not Active (' + inactiveDcids.length + ')</div>'
      + '<table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="background:#fff8e1"><th style="padding:7px 10px;text-align:left">#</th><th style="padding:7px 10px;text-align:left">Dealer</th><th style="padding:7px 10px;text-align:left">BM</th><th style="padding:7px 10px;text-align:right">L3M GMV</th></tr></thead><tbody>'
      + inactiveDcids.map((d,i) => dealerRow(d, l3Data, i)).join('')
      + '</tbody></table></div>' : '')
    + '<div style="background:#c62828;padding:12px 28px;border-radius:0 0 12px 12px;display:flex;justify-content:space-between;align-items:center">'
    + '<div style="color:rgba(255,255,255,.9);font-size:12px;font-weight:700">Rupyy Performance Dashboard</div>'
    + '<div style="color:rgba(255,255,255,.5);font-size:11px">' + dateStr + '</div>'
    + '</div></div></body></html>';
}

// ── Preview functions ───────────────────────────────────────
function previewScEmail(type) {
  const emps   = getEmpData();

  if (type === 'bm') {
    // Preview for first checked BM

    const bmId = checked[0]?.dataset.id;
