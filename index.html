// ── Build individual BM scorecard HTML (no emoji in subject) ─
// ═══════════════════════════════════════════════════════════
// SHARED EMAIL HELPERS
// ═══════════════════════════════════════════════════════════
function emailStyles() {
  return `
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
      * { box-sizing: border-box; }
      body { margin:0; padding:0; background:#f0f2f5; font-family:Arial,Helvetica,sans-serif; }
    </style>`;
}

// Capsule badge
function cap(text, bg, color) {
  return `<span style="display:inline-block;background:${bg};color:${color};padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px">${text}</span>`;
}

// Growth capsule
function gCap(cur, prev, isAmt=true) {
  if (!prev && prev!==0) return cap('—','#f5f5f5','#9e9e9e');
  const diff = cur-prev;
  const pct  = prev>0 ? Math.round((diff/prev)*100) : (cur>0?100:0);
  const up   = diff>=0;
  const sign = up?'+':'';
  const arrow= up?'&#9650;':'&#9660;';
  const col  = up?'#1b5e20':'#b71c1c';
  const bg   = up?'#e8f5e9':'#ffebee';
  const val  = isAmt ? sign+fmtCr(Math.abs(diff)) : sign+Math.abs(diff);
  return `<span style="display:inline-block;background:${bg};color:${col};padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700">${arrow} ${sign}${pct}% &nbsp;${val}</span>`;
}

// Achievement capsule
function achCap(ach) {
  if (ach===null) return cap('No Target','#f5f5f5','#9e9e9e');
  const col = ach>=100?'#1b5e20':ach>=70?'#0d47a1':'#b71c1c';
  const bg  = ach>=100?'#e8f5e9':ach>=70?'#e3f2fd':'#ffebee';
  const icon= ach>=100?'':ach>=70?'●':'▲';
  return `<span style="display:inline-block;background:${bg};color:${col};padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700">${icon} ${ach}%</span>`;
}

// Horizontal bar chart (HTML only, email-safe)
function barChart(items, maxVal) {
  const max = maxVal || Math.max(...items.map(i=>i.val), 1);
  return items.map(i => {
    const w = Math.round((i.val/max)*100);
    const prev_w = i.prev ? Math.round((i.prev/max)*100) : 0;
    return `
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">
          <span style="font-size:11px;color:#555;font-weight:600">${i.label}</span>
          <span style="font-size:11px;font-weight:700;color:#1a237e">${fmtCr(i.val)}</span>
        </div>
        <div style="background:#f0f0f0;border-radius:6px;height:10px;position:relative;overflow:hidden">
          ${i.prev?`<div style="position:absolute;top:0;left:0;width:${prev_w}%;height:100%;background:#c5cae9;border-radius:6px"></div>`:''}
          <div style="position:absolute;top:0;left:0;width:${w}%;height:100%;background:linear-gradient(90deg,${i.color||'#1a237e'},${i.color2||'#3949ab'});border-radius:6px"></div>
        </div>
        ${i.prev?`<div style="font-size:10px;color:#9e9e9e;margin-top:2px">vs ${fmtCr(i.prev)} last month</div>`:''}
      </div>`;
  }).join('');
}

// Progress ring (CSS only)
function progressRing(pct, size=60) {
  const p    = Math.min(pct||0, 100);
  const col  = p>=100?'#2e7d32':p>=70?'#1565c0':p>=50?'#f57f17':'#c62828';
  const bg   = p>=100?'#e8f5e9':p>=70?'#e3f2fd':p>=50?'#fff8e1':'#ffebee';
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:conic-gradient(${col} ${p}%, #e0e0e0 0%);display:flex;align-items:center;justify-content:center;position:relative">
    <div style="width:${size-12}px;height:${size-12}px;border-radius:50%;background:${bg};display:flex;align-items:center;justify-content:center;font-size:${size>50?13:10}px;font-weight:800;color:${col}">${p}%</div>
  </div>`;
}

// Metric card
function metricCard(label, cur, prev, color, unit='amt') {
  const isAmt = unit==='amt';
  const curFmt= isAmt?fmtCr(cur):String(cur);
  const prevFmt=isAmt?fmtCr(prev):String(prev);
  const diff  = cur-prev;
  const pct   = prev>0?Math.round((diff/prev)*100):null;
  const up    = diff>=0;
  return `<div style="background:#fff;border-radius:12px;padding:14px 16px;border-top:3px solid ${color};min-width:100px">
    <div style="font-size:10px;color:#9e9e9e;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">${label}</div>
    <div style="font-size:18px;font-weight:800;color:${color};margin-bottom:4px">${curFmt}</div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span style="font-size:10px;color:#9e9e9e">was ${prevFmt}</span>
      ${pct!==null?`<span style="background:${up?'#e8f5e9':'#ffebee'};color:${up?'#1b5e20':'#b71c1c'};padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700">${up?'&#9650;':'&#9660;'} ${up?'+':''}${pct}%</span>`:''}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// BM SCORECARD EMAIL
// ═══════════════════════════════════════════════════════════
function buildBMScorecardHTML(bm) {
  const cur      = myTxns.filter(t=>t.bm_id===bm.id);
  const prev     = toLMTD((window._LIVE_MAY||[]).filter(t=>t.bm_id===bm.id));
  const month    = getCurMonthLabel();
  const prevMonth= getPrevMonthLabel();
  const todayDay = getTodayDay();
  const ucAmt    = cur.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
  const cvAmt    = cur.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);
  const tot      = ucAmt+cvAmt;
  const prevUC   = prev.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
  const prevCV   = prev.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);
  const prevTot  = prevUC+prevCV;
  const bmEmpObj = resolveEmpById(bm.id);
  const ch       = countChannels(cur, bmEmpObj);
  const prevCh   = countChannels(prev, bmEmpObj);
  const cases    = cur.length;
  const prevCases= prev.length;
  const ucTgt    = (bm.uc_tgt||0)*1e5;
  const cvTgt    = (bm.cv_tgt||0)*1e5;
  const tgt      = ucTgt+cvTgt;
  const ach      = tgt>0?Math.round((tot/tgt)*100):null;
  const shortfall= tgt>0?Math.max(tgt-tot,0):0;
  const date     = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  const achCol   = ach===null?'#555':ach>=100?'#2e7d32':ach>=70?'#1565c0':'#c62828';
  const achBg    = ach===null?'#f5f5f5':ach>=100?'#e8f5e9':ach>=70?'#e3f2fd':'#ffebee';
  const achLabel = ach===null?'No Target':ach>=100?'Target Achieved':ach>=70?'On Track':'Behind Target';

  function gRow(cur, prev, isAmt) {
    if (!prev && prev!==0) return '<span style="color:#9e9e9e;font-size:11px">-</span>';
    const diff = cur-prev;
    const pct  = prev>0?Math.round((diff/prev)*100):null;
    const up   = diff>=0;
    const col  = up?'#1b5e20':'#b71c1c';
    const bg   = up?'#e8f5e9':'#ffebee';
    const sign = up?'+':'';
    const val  = isAmt ? sign+fmtCr(Math.abs(diff)) : sign+Math.abs(diff);
    return '<span style="display:inline-block;background:'+bg+';color:'+col+';padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700">'+(up?'&#9650;':'&#9660;')+' '+sign+(pct!==null?pct+'%':'-')+' ('+val+')</span>';
  }

  // Progress bar (table-based, Gmail-safe)
  function pBar(val, total, color) {
    if (!total) return '';
    const w = Math.min(Math.round((val/total)*100), 100);
    return '<table width="100%" cellpadding="0" cellspacing="0" style="margin-top:4px">'
      +'<tr><td style="background:#e0e0e0;border-radius:4px;height:8px;padding:0">'
      +'<table width="'+w+'%" cellpadding="0" cellspacing="0"><tr>'
      +'<td style="background:'+color+';border-radius:4px;height:8px;padding:0;display:block"></td>'
      +'</tr></table></td></tr></table>';
  }

  return '<!DOCTYPE html><html><body style="margin:0;padding:16px;background:#f0f2f5;font-family:Arial,Helvetica,sans-serif">'

    // ── HEADER ──────────────────────────────────────────────
    +'<table width="600" cellpadding="0" cellspacing="0" align="center" style="background:linear-gradient(135deg,#1a237e,#283593);border-radius:12px 12px 0 0">'
    +'<tr><td style="padding:24px 28px">'
    +'<div style="color:rgba(255,255,255,.6);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">RUPYY PERFORMANCE DASHBOARD</div>'
    +'<div style="color:#fff;font-size:22px;font-weight:800;margin-bottom:4px">'+month+' Scorecard</div>'
    +'<div style="color:rgba(255,255,255,.75);font-size:13px">Hi <b>'+bm.name+'</b> &nbsp;|&nbsp; '+date+'</div>'
    +'<table cellpadding="0" cellspacing="0" style="margin-top:12px"><tr>'
    +'<td style="background:'+achBg+';border-radius:20px;padding:4px 16px">'
    +'<span style="color:'+achCol+';font-size:12px;font-weight:700">'+(ach!==null?ach+'% — '+achLabel:'No Target Set')+'</span>'
    +'</td></tr></table>'
    +'</td></tr></table>'

    // ── 4 KPI CARDS (2x2 table) ─────────────────────────────
    +'<table width="600" cellpadding="0" cellspacing="0" align="center" style="background:#fff;border-left:1px solid #e8eaf6;border-right:1px solid #e8eaf6">'
    +'<tr>'
    +'<td width="50%" style="padding:16px 20px;border-right:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0;vertical-align:top">'
    +'<div style="font-size:10px;color:#9e9e9e;font-weight:700;text-transform:uppercase;margin-bottom:4px">Total GMV</div>'
    +'<div style="font-size:22px;font-weight:800;color:#1a237e">'+fmtCr(tot)+'</div>'
    +'<div style="font-size:11px;color:#9e9e9e;margin:3px 0">LMTD '+prevMonth.split(' ')[0]+' 1-'+todayDay+': '+fmtCr(prevTot)+'</div>'
    +gRow(tot,prevTot,true)
    +(tgt>0?pBar(tot,tgt,'#1a237e'):'')
    +'</td>'
    +'<td width="50%" style="padding:16px 20px;border-bottom:1px solid #f0f0f0;vertical-align:top">'
    +'<div style="font-size:10px;color:#9e9e9e;font-weight:700;text-transform:uppercase;margin-bottom:4px">Achievement vs Target</div>'
    +(ach!==null
      ? '<div style="font-size:36px;font-weight:800;color:'+achCol+'">'+ach+'%</div>'
      +'<div style="font-size:11px;color:#9e9e9e;margin:3px 0">Target: '+(tgt>0?fmtCr(tgt):'Not set')+'</div>'
      +(shortfall>0?'<div style="font-size:11px;color:#c62828;font-weight:600">Shortfall: '+fmtCr(shortfall)+'</div>':'<div style="font-size:11px;color:#2e7d32;font-weight:600">Target Achieved!</div>')
      : '<div style="font-size:22px;color:#9e9e9e">--</div>')
    +'</td>'
    +'</tr><tr>'
    +'<td style="padding:16px 20px;border-right:1px solid #f0f0f0;vertical-align:top">'
    +'<div style="font-size:10px;color:#9e9e9e;font-weight:700;text-transform:uppercase;margin-bottom:4px">Used Car (UC)</div>'
    +'<div style="font-size:20px;font-weight:800;color:#1565c0">'+fmtCr(ucAmt)+'</div>'
    +'<div style="font-size:11px;color:#9e9e9e;margin:3px 0">LMTD: '+fmtCr(prevUC)+'</div>'
    +gRow(ucAmt,prevUC,true)
    +(ucTgt>0?pBar(ucAmt,ucTgt,'#1565c0'):'')
    +'</td>'
    +'<td style="padding:16px 20px;vertical-align:top">'
    +'<div style="font-size:10px;color:#9e9e9e;font-weight:700;text-transform:uppercase;margin-bottom:4px">Commercial Vehicle (CV)</div>'
    +'<div style="font-size:20px;font-weight:800;color:#6a1b9a">'+fmtCr(cvAmt)+'</div>'
    +'<div style="font-size:11px;color:#9e9e9e;margin:3px 0">LMTD: '+fmtCr(prevCV)+'</div>'
    +gRow(cvAmt,prevCV,true)
    +(cvTgt>0?pBar(cvAmt,cvTgt,'#6a1b9a'):'')
    +'</td>'
    +'</tr></table>'

    // ── STATS ROW ────────────────────────────────────────────
    +'<table width="600" cellpadding="0" cellspacing="0" align="center" style="background:#f8f9ff;border:1px solid #e8eaf6">'
    +'<tr>'
    +'<td style="padding:12px 16px;text-align:center;border-right:1px solid #e8eaf6">'
    +'<div style="font-size:10px;color:#9e9e9e;font-weight:600;text-transform:uppercase">Cases</div>'

    +'<div style="font-size:10px;color:#9e9e9e">LMTD: '+prevCases+'</div>'
    +'</td>'
    +'<td style="padding:12px 16px;text-align:center;border-right:1px solid #e8eaf6">'
    +'<div style="font-size:10px;color:#9e9e9e;font-weight:600;text-transform:uppercase">Active Channels</div>'
    +'<div style="font-size:18px;font-weight:800;color:#00838f">'+ch+'</div>'
    +'<div style="font-size:10px;color:#9e9e9e">Target: '+(bm.ch_tgt||'-')+' | LMTD: '+prevCh+'</div>'
    +'</td>'
    +'<td style="padding:12px 16px;text-align:center;border-right:1px solid #e8eaf6">'
    +'<div style="font-size:10px;color:#9e9e9e;font-weight:600;text-transform:uppercase">Channel Growth</div>'
    +gRow(ch,prevCh,false)
    +'<div style="font-size:10px;color:#9e9e9e;margin-top:4px">vs '+prevMonth.split(' ')[0]+' LMTD</div>'
    +'</td>'
    +'<td style="padding:12px 16px;text-align:center">'
    +'<div style="font-size:10px;color:#9e9e9e;font-weight:600;text-transform:uppercase">Case Growth</div>'

    +'<div style="font-size:10px;color:#9e9e9e;margin-top:4px">vs '+prevMonth.split(' ')[0]+' LMTD</div>'
    +'</td>'
    +'</tr></table>'

// ── Channel Drive Email HTML ────────────────────────────────
function buildChannelEmailHTML(type, note, scopedCurTxns, scopedPrevTxns, scopedL3Txns, scopedName) {
  const prevData = window._LIVE_MAY || [];
  const l3Data   = scopedL3Txns || getLast6Months().slice(-3).flatMap(m => m.data().filter(t => t.rh_id === currentUser.id));
  const dateStr  = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  const month    = getCurMonthLabel();
  const prevMonth= getPrevMonthLabel();

  const curTxns  = scopedCurTxns  || myTxns;
  const prevTxns = scopedPrevTxns || prevData.filter(t => t.rh_id === currentUser.id);
  const curCh    = new Set(curTxns.filter(t=>t.ch_check>0&&t.dcid).map(t=>t.dcid));
  const _rhEmp   = resolveEmpById(currentUser.id);
  const prevCh   = new Set(prevTxns.filter(t=>t.ch_check>0&&t.dcid).map(t=>t.dcid));
  const l3Ch     = new Set(l3Data.filter(t=>t.ch_check>0&&t.dcid).map(t=>t.dcid));

  const lostDcids     = [...prevCh].filter(d=>!curCh.has(d));
  const inactiveDcids = [...l3Ch].filter(d=>!curCh.has(d)&&!lostDcids.includes(d));

  function dealerRow(dcid, pool, idx) {
    const t      = pool.filter(x=>x.dcid===dcid);
    const dealer = t[0]?.dealer || dcid;
    const gmv    = t.reduce((s,x)=>s+x.amt,0);
    const bm     = resolveEmpById(t[0]?.bm_id)?.name || t[0]?.bm || '—';
    return '<tr style="background:' + (idx%2===0?'#fff':'#fff8f8') + '">'
      + '<td style="padding:7px 10px;color:#9e9e9e">' + (idx+1) + '</td>'
      + '<td style="padding:7px 10px;font-weight:700">' + dealer + '<div style="font-size:10px;color:#9e9e9e">' + dcid + '</div></td>'
      + '<td style="padding:7px 10px">' + bm + '</td>'
      + '<td style="padding:7px 10px;text-align:right;font-weight:700;color:#c62828">' + fmtCr(gmv) + '</td>'
      + '</tr>';
  }

  const showLost     = type==='lost'||type==='full';
  const showInactive = type==='inactive'||type==='full';

  return '<!DOCTYPE html><html><body style="margin:0;padding:0;background:#f5f5f5;font-family:Arial,sans-serif">'
    + '<div style="max-width:680px;margin:0 auto;padding:16px">'
    + '<div style="background:linear-gradient(135deg,#b71c1c,#c62828);border-radius:12px 12px 0 0;padding:24px 28px">'
    + '<div style="color:#fff;font-size:20px;font-weight:800">Channel Drive Alert' + (scopedName ? ' — ' + scopedName + ' Team' : '') + '</div>'
    + '<div style="color:rgba(255,255,255,.75);font-size:12px;margin-top:4px">' + dateStr + ' | Action Required | From: ' + currentUser.name + '</div>'
    + '</div>'
    + '<div style="background:#fff;padding:16px 28px;display:flex;gap:0;border-bottom:2px solid #ffcdd2">'
    + '<div style="flex:1;text-align:center;padding:8px;border-right:1px solid #ffebee"><div style="font-size:10px;color:#9e9e9e;font-weight:600">ACTIVE NOW</div><div style="font-size:20px;font-weight:800;color:#2e7d32">' + curCh.size + '</div></div>'
    + '<div style="flex:1;text-align:center;padding:8px;border-right:1px solid #ffebee"><div style="font-size:10px;color:#9e9e9e;font-weight:600">LAST MONTH</div><div style="font-size:20px;font-weight:800;color:#1565c0">' + prevCh.size + '</div></div>'
    + '<div style="flex:1;text-align:center;padding:8px;border-right:1px solid #ffebee"><div style="font-size:10px;color:#9e9e9e;font-weight:600">LOST</div><div style="font-size:20px;font-weight:800;color:#c62828">' + lostDcids.length + '</div></div>'
    + '<div style="flex:1;text-align:center;padding:8px"><div style="font-size:10px;color:#9e9e9e;font-weight:600">INACTIVE (L3M)</div><div style="font-size:20px;font-weight:800;color:#f57f17">' + inactiveDcids.length + '</div></div>'
    + '</div>'
    + (note ? '<div style="background:#fff3e0;padding:12px 28px;border-left:4px solid #f57f17"><b>Action Required:</b> <span style="color:#333">' + note + '</span></div>' : '')
    + (showLost && lostDcids.length ? '<div style="background:#fff;padding:16px 28px"><div style="font-weight:700;color:#c62828;font-size:14px;margin-bottom:10px">Lost Channels — Were Active Last Month (' + lostDcids.length + ')</div>'
      + '<table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="background:#ffebee"><th style="padding:7px 10px;text-align:left">#</th><th style="padding:7px 10px;text-align:left">Dealer</th><th style="padding:7px 10px;text-align:left">BM</th><th style="padding:7px 10px;text-align:right">' + prevMonth.split(' ')[0] + ' GMV</th></tr></thead><tbody>'
      + lostDcids.map((d,i) => dealerRow(d, prevTxns, i)).join('')
      + '</tbody></table></div>' : '')
    + (showInactive && inactiveDcids.length ? '<div style="background:#fff;padding:16px 28px;border-top:1px solid #f5f5f5"><div style="font-weight:700;color:#f57f17;font-size:14px;margin-bottom:10px">Inactive Channels — Last 3 Months Not Active (' + inactiveDcids.length + ')</div>'
      + '<table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="background:#fff8e1"><th style="padding:7px 10px;text-align:left">#</th><th style="padding:7px 10px;text-align:left">Dealer</th><th style="padding:7px 10px;text-align:left">BM</th><th style="padding:7px 10px;text-align:right">L3M GMV</th></tr></thead><tbody>'
      + inactiveDcids.map((d,i) => dealerRow(d, l3Data, i)).join('')
      + '</tbody></table></div>' : '')
    + '<div style="background:#c62828;padding:12px 28px;border-radius:0 0 12px 12px;display:flex;justify-content:space-between;align-items:center">'
    + '<div style="color:rgba(255,255,255,.9);font-size:12px;font-weight:700">Rupyy Performance Dashboard</div>'
    + '<div style="color:rgba(255,255,255,.5);font-size:11px">' + dateStr + '</div>'
    + '</div></div></body></html>';
}

// ── Build individual BM scorecard HTML (no emoji in subject) ─
// ═══════════════════════════════════════════════════════════
// SHARED EMAIL HELPERS
// ═══════════════════════════════════════════════════════════
function emailStyles() {
  return `
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
      * { box-sizing: border-box; }
      body { margin:0; padding:0; background:#f0f2f5; font-family:Arial,Helvetica,sans-serif; }
    </style>`;
}

// Capsule badge
function cap(text, bg, color) {
  return `<span style="display:inline-block;background:${bg};color:${color};padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px">${text}</span>`;
}

// Growth capsule
function gCap(cur, prev, isAmt=true) {
  if (!prev && prev!==0) return cap('—','#f5f5f5','#9e9e9e');
  const diff = cur-prev;
  const pct  = prev>0 ? Math.round((diff/prev)*100) : (cur>0?100:0);
  const up   = diff>=0;
  const sign = up?'+':'';
  const arrow= up?'&#9650;':'&#9660;';
  const col  = up?'#1b5e20':'#b71c1c';
  const bg   = up?'#e8f5e9':'#ffebee';
  const val  = isAmt ? sign+fmtCr(Math.abs(diff)) : sign+Math.abs(diff);
  return `<span style="display:inline-block;background:${bg};color:${col};padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700">${arrow} ${sign}${pct}% &nbsp;${val}</span>`;
}

// Achievement capsule
function achCap(ach) {
  if (ach===null) return cap('No Target','#f5f5f5','#9e9e9e');
  const col = ach>=100?'#1b5e20':ach>=70?'#0d47a1':'#b71c1c';
  const bg  = ach>=100?'#e8f5e9':ach>=70?'#e3f2fd':'#ffebee';
  const icon= ach>=100?'':ach>=70?'●':'▲';
  return `<span style="display:inline-block;background:${bg};color:${col};padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700">${icon} ${ach}%</span>`;
}

// Horizontal bar chart (HTML only, email-safe)
function barChart(items, maxVal) {
  const max = maxVal || Math.max(...items.map(i=>i.val), 1);
  return items.map(i => {
    const w = Math.round((i.val/max)*100);
    const prev_w = i.prev ? Math.round((i.prev/max)*100) : 0;
    return `
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">
          <span style="font-size:11px;color:#555;font-weight:600">${i.label}</span>
          <span style="font-size:11px;font-weight:700;color:#1a237e">${fmtCr(i.val)}</span>
        </div>
        <div style="background:#f0f0f0;border-radius:6px;height:10px;position:relative;overflow:hidden">
          ${i.prev?`<div style="position:absolute;top:0;left:0;width:${prev_w}%;height:100%;background:#c5cae9;border-radius:6px"></div>`:''}
          <div style="position:absolute;top:0;left:0;width:${w}%;height:100%;background:linear-gradient(90deg,${i.color||'#1a237e'},${i.color2||'#3949ab'});border-radius:6px"></div>
        </div>
        ${i.prev?`<div style="font-size:10px;color:#9e9e9e;margin-top:2px">vs ${fmtCr(i.prev)} last month</div>`:''}
      </div>`;
  }).join('');
}

// Progress ring (CSS only)
function progressRing(pct, size=60) {
  const p    = Math.min(pct||0, 100);
  const col  = p>=100?'#2e7d32':p>=70?'#1565c0':p>=50?'#f57f17':'#c62828';
  const bg   = p>=100?'#e8f5e9':p>=70?'#e3f2fd':p>=50?'#fff8e1':'#ffebee';
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:conic-gradient(${col} ${p}%, #e0e0e0 0%);display:flex;align-items:center;justify-content:center;position:relative">
    <div style="width:${size-12}px;height:${size-12}px;border-radius:50%;background:${bg};display:flex;align-items:center;justify-content:center;font-size:${size>50?13:10}px;font-weight:800;color:${col}">${p}%</div>
  </div>`;
}

// Metric card
function metricCard(label, cur, prev, color, unit='amt') {
  const isAmt = unit==='amt';
  const curFmt= isAmt?fmtCr(cur):String(cur);
  const prevFmt=isAmt?fmtCr(prev):String(prev);
  const diff  = cur-prev;
  const pct   = prev>0?Math.round((diff/prev)*100):null;
  const up    = diff>=0;
  return `<div style="background:#fff;border-radius:12px;padding:14px 16px;border-top:3px solid ${color};min-width:100px">
    <div style="font-size:10px;color:#9e9e9e;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">${label}</div>
    <div style="font-size:18px;font-weight:800;color:${color};margin-bottom:4px">${curFmt}</div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span style="font-size:10px;color:#9e9e9e">was ${prevFmt}</span>
      ${pct!==null?`<span style="background:${up?'#e8f5e9':'#ffebee'};color:${up?'#1b5e20':'#b71c1c'};padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700">${up?'&#9650;':'&#9660;'} ${up?'+':''}${pct}%</span>`:''}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// BM SCORECARD EMAIL
// ═══════════════════════════════════════════════════════════
function buildBMScorecardHTML(bm) {
  const cur      = myTxns.filter(t=>t.bm_id===bm.id);
  const prev     = toLMTD((window._LIVE_MAY||[]).filter(t=>t.bm_id===bm.id));
  const month    = getCurMonthLabel();
  const prevMonth= getPrevMonthLabel();
  const todayDay = getTodayDay();
  const ucAmt    = cur.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
  const cvAmt    = cur.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);
  const tot      = ucAmt+cvAmt;
  const prevUC   = prev.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
  const prevCV   = prev.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);
  const prevTot  = prevUC+prevCV;
  const bmEmpObj = resolveEmpById(bm.id);
  const ch       = countChannels(cur, bmEmpObj);
  const prevCh   = countChannels(prev, bmEmpObj);
  const cases    = cur.length;
  const prevCases= prev.length;
  const ucTgt    = (bm.uc_tgt||0)*1e5;
  const cvTgt    = (bm.cv_tgt||0)*1e5;
  const tgt      = ucTgt+cvTgt;
  const ach      = tgt>0?Math.round((tot/tgt)*100):null;
  const shortfall= tgt>0?Math.max(tgt-tot,0):0;
  const date     = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  const achCol   = ach===null?'#555':ach>=100?'#2e7d32':ach>=70?'#1565c0':'#c62828';
  const achBg    = ach===null?'#f5f5f5':ach>=100?'#e8f5e9':ach>=70?'#e3f2fd':'#ffebee';
  const achLabel = ach===null?'No Target':ach>=100?'Target Achieved':ach>=70?'On Track':'Behind Target';

  function gRow(cur, prev, isAmt) {
    if (!prev && prev!==0) return '<span style="color:#9e9e9e;font-size:11px">-</span>';
    const diff = cur-prev;
    const pct  = prev>0?Math.round((diff/prev)*100):null;
    const up   = diff>=0;
    const col  = up?'#1b5e20':'#b71c1c';
    const bg   = up?'#e8f5e9':'#ffebee';
    const sign = up?'+':'';
    const val  = isAmt ? sign+fmtCr(Math.abs(diff)) : sign+Math.abs(diff);
    return '<span style="display:inline-block;background:'+bg+';color:'+col+';padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700">'+(up?'&#9650;':'&#9660;')+' '+sign+(pct!==null?pct+'%':'-')+' ('+val+')</span>';
  }

  // Progress bar (table-based, Gmail-safe)
  function pBar(val, total, color) {
    if (!total) return '';
    const w = Math.min(Math.round((val/total)*100), 100);
    return '<table width="100%" cellpadding="0" cellspacing="0" style="margin-top:4px">'
      +'<tr><td style="background:#e0e0e0;border-radius:4px;height:8px;padding:0">'
      +'<table width="'+w+'%" cellpadding="0" cellspacing="0"><tr>'
      +'<td style="background:'+color+';border-radius:4px;height:8px;padding:0;display:block"></td>'
      +'</tr></table></td></tr></table>';
  }

  return '<!DOCTYPE html><html><body style="margin:0;padding:16px;background:#f0f2f5;font-family:Arial,Helvetica,sans-serif">'

    // ── HEADER ──────────────────────────────────────────────
    +'<table width="600" cellpadding="0" cellspacing="0" align="center" style="background:linear-gradient(135deg,#1a237e,#283593);border-radius:12px 12px 0 0">'
    +'<tr><td style="padding:24px 28px">'
    +'<div style="color:rgba(255,255,255,.6);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">RUPYY PERFORMANCE DASHBOARD</div>'
    +'<div style="color:#fff;font-size:22px;font-weight:800;margin-bottom:4px">'+month+' Scorecard</div>'
    +'<div style="color:rgba(255,255,255,.75);font-size:13px">Hi <b>'+bm.name+'</b> &nbsp;|&nbsp; '+date+'</div>'
    +'<table cellpadding="0" cellspacing="0" style="margin-top:12px"><tr>'
    +'<td style="background:'+achBg+';border-radius:20px;padding:4px 16px">'
    +'<span style="color:'+achCol+';font-size:12px;font-weight:700">'+(ach!==null?ach+'% — '+achLabel:'No Target Set')+'</span>'
    +'</td></tr></table>'
    +'</td></tr></table>'

    // ── 4 KPI CARDS (2x2 table) ─────────────────────────────
    +'<table width="600" cellpadding="0" cellspacing="0" align="center" style="background:#fff;border-left:1px solid #e8eaf6;border-right:1px solid #e8eaf6">'
    +'<tr>'
    +'<td width="50%" style="padding:16px 20px;border-right:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0;vertical-align:top">'
    +'<div style="font-size:10px;color:#9e9e9e;font-weight:700;text-transform:uppercase;margin-bottom:4px">Total GMV</div>'
    +'<div style="font-size:22px;font-weight:800;color:#1a237e">'+fmtCr(tot)+'</div>'
    +'<div style="font-size:11px;color:#9e9e9e;margin:3px 0">LMTD '+prevMonth.split(' ')[0]+' 1-'+todayDay+': '+fmtCr(prevTot)+'</div>'
    +gRow(tot,prevTot,true)
    +(tgt>0?pBar(tot,tgt,'#1a237e'):'')
    +'</td>'
    +'<td width="50%" style="padding:16px 20px;border-bottom:1px solid #f0f0f0;vertical-align:top">'
    +'<div style="font-size:10px;color:#9e9e9e;font-weight:700;text-transform:uppercase;margin-bottom:4px">Achievement vs Target</div>'
    +(ach!==null
      ? '<div style="font-size:36px;font-weight:800;color:'+achCol+'">'+ach+'%</div>'
      +'<div style="font-size:11px;color:#9e9e9e;margin:3px 0">Target: '+(tgt>0?fmtCr(tgt):'Not set')+'</div>'
      +(shortfall>0?'<div style="font-size:11px;color:#c62828;font-weight:600">Shortfall: '+fmtCr(shortfall)+'</div>':'<div style="font-size:11px;color:#2e7d32;font-weight:600">Target Achieved!</div>')
      : '<div style="font-size:22px;color:#9e9e9e">--</div>')
    +'</td>'
    +'</tr><tr>'
    +'<td style="padding:16px 20px;border-right:1px solid #f0f0f0;vertical-align:top">'
    +'<div style="font-size:10px;color:#9e9e9e;font-weight:700;text-transform:uppercase;margin-bottom:4px">Used Car (UC)</div>'
    +'<div style="font-size:20px;font-weight:800;color:#1565c0">'+fmtCr(ucAmt)+'</div>'
    +'<div style="font-size:11px;color:#9e9e9e;margin:3px 0">LMTD: '+fmtCr(prevUC)+'</div>'
    +gRow(ucAmt,prevUC,true)
    +(ucTgt>0?pBar(ucAmt,ucTgt,'#1565c0'):'')
    +'</td>'
    +'<td style="padding:16px 20px;vertical-align:top">'
    +'<div style="font-size:10px;color:#9e9e9e;font-weight:700;text-transform:uppercase;margin-bottom:4px">Commercial Vehicle (CV)</div>'
    +'<div style="font-size:20px;font-weight:800;color:#6a1b9a">'+fmtCr(cvAmt)+'</div>'
    +'<div style="font-size:11px;color:#9e9e9e;margin:3px 0">LMTD: '+fmtCr(prevCV)+'</div>'
    +gRow(cvAmt,prevCV,true)
    +(cvTgt>0?pBar(cvAmt,cvTgt,'#6a1b9a'):'')
    +'</td>'
    +'</tr></table>'

    // ── STATS ROW ────────────────────────────────────────────
    +'<table width="600" cellpadding="0" cellspacing="0" align="center" style="background:#f8f9ff;border:1px solid #e8eaf6">'
    +'<tr>'
    +'<td style="padding:12px 16px;text-align:center;border-right:1px solid #e8eaf6">'
    +'<div style="font-size:10px;color:#9e9e9e;font-weight:600;text-transform:uppercase">Cases</div>'
    +'<div style="font-size:18px;font-weight:800;color:#333">'+cases+'</div>'

    +'</body></html>';
}

function buildAMScorecardHTML(am) {
  const emps     = getEmpData();
  const prevData = window._LIVE_MAY||[];
  const date     = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  const month    = getCurMonthLabel();
  const prevMonth= getPrevMonthLabel();
  const todayDay = getTodayDay();

  const bmList = emps.filter(e=>e.designation==='BM'&&e.am_id===am.id);
  const rows   = bmList.map(bm=>{
    const cur    = myTxns.filter(t=>t.bm_id===bm.id);
    const prv    = toLMTD(prevData.filter(t=>t.bm_id===bm.id));
    const curAmt = cur.reduce((s,t)=>s+t.amt,0);
    const prvAmt = prv.reduce((s,t)=>s+t.amt,0);
    const curUC  = cur.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
    const curCV  = cur.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);
    const curCh  = countChannels(cur, resolveEmpById(bm.id));
    const prvCh  = countChannels(prv, resolveEmpById(bm.id));
    const tgt    = ((bm.uc_tgt||0)+(bm.cv_tgt||0))*1e5;
    const ach    = tgt>0?Math.round((curAmt/tgt)*100):null;
    const diff   = curAmt-prvAmt;
    const gPct   = prvAmt>0?Math.round((diff/prvAmt)*100):null;
    return {bm,curAmt,prvAmt,curUC,curCV,curCh,prvCh,cases:cur.length,tgt,ach,diff,gPct,chDiff:curCh-prvCh};
  }).sort((a,b)=>b.curAmt-a.curAmt);

  const totCur  = rows.reduce((s,r)=>s+r.curAmt,0);
  const totPrv  = rows.reduce((s,r)=>s+r.prvAmt,0);
  const totUC   = rows.reduce((s,r)=>s+r.curUC,0);
  const totCV   = rows.reduce((s,r)=>s+r.curCV,0);
  const totCh   = rows.reduce((s,r)=>s+r.curCh,0);
  const prvCh   = rows.reduce((s,r)=>s+r.prvCh,0);
  const onTrack = rows.filter(r=>r.ach!==null&&r.ach>=70).length;
  const behind  = rows.filter(r=>r.ach!==null&&r.ach<70).length;
  const totDiff = totCur-totPrv;
  const gPct    = totPrv>0?Math.round((totDiff/totPrv)*100):null;
  const up      = totDiff>=0;

  const tblRows = rows.map((r,i)=>{
    const achCol = r.ach===null?'#555':r.ach>=100?'#2e7d32':r.ach>=70?'#1565c0':'#c62828';
    const achBg  = r.ach===null?'#f5f5f5':r.ach>=100?'#e8f5e9':r.ach>=70?'#e3f2fd':'#ffebee';
    const rowBg  = i%2===0?'#ffffff':'#f8f9ff';
    const up2    = r.diff>=0;
    const gTag   = r.gPct!==null
      ? '<span style="background:'+(up2?'#e8f5e9':'#ffebee')+';color:'+(up2?'#1b5e20':'#b71c1c')+';padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700">'+(up2?'&#9650;':'&#9660;')+' '+(up2?'+':'')+r.gPct+'%</span>'
      : '-';
    return '<tr style="background:'+rowBg+'">'
      +'<td style="padding:8px 10px;font-weight:700;color:#1a237e;border-bottom:1px solid #f0f0f0">'+r.bm.name+'</td>'
      +'<td style="padding:8px 8px;border-bottom:1px solid #f0f0f0;text-align:center"><span style="background:#e8eaf6;color:#3949ab;padding:1px 6px;border-radius:8px;font-size:10px">'+( r.bm.tier||'-')+'</span></td>'
      +'<td style="padding:8px 10px;text-align:right;font-weight:700;border-bottom:1px solid #f0f0f0">'+fmtCr(r.curAmt)+'</td>'

      +'<td style="padding:8px 8px;text-align:center;border-bottom:1px solid #f0f0f0">'+gTag+'</td>'
      +'<td style="padding:8px 8px;text-align:right;color:#1565c0;font-size:11px;border-bottom:1px solid #f0f0f0">'+fmtCr(r.curUC)+'</td>'
      +'<td style="padding:8px 8px;text-align:right;color:#6a1b9a;font-size:11px;border-bottom:1px solid #f0f0f0">'+fmtCr(r.curCV)+'</td>'
      +'<td style="padding:8px 8px;text-align:center;border-bottom:1px solid #f0f0f0"><span style="background:'+achBg+';color:'+achCol+';padding:2px 7px;border-radius:8px;font-size:11px;font-weight:700">'+(r.ach!==null?r.ach+'%':'--')+'</span></td>'
      +'<td style="padding:8px 8px;text-align:center;border-bottom:1px solid #f0f0f0"><b>'+r.curCh+'</b>'+(r.chDiff!==0?'<span style="font-size:10px;color:'+(r.chDiff>0?'#2e7d32':'#c62828')+';margin-left:2px">'+(r.chDiff>0?'+':'')+r.chDiff+'</span>':'')+'</td>'
      +'</tr>';
  }).join('');

  return '<!DOCTYPE html><html><body style="margin:0;padding:16px;background:#f0f2f5;font-family:Arial,Helvetica,sans-serif">'
    // Header
    +'<table width="640" cellpadding="0" cellspacing="0" align="center" style="background:linear-gradient(135deg,#1a237e,#283593);border-radius:12px 12px 0 0"><tr><td style="padding:22px 28px">'
    +'<div style="color:rgba(255,255,255,.6);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">TEAM PERFORMANCE REPORT</div>'
    +'<div style="color:#fff;font-size:20px;font-weight:800;margin-bottom:4px">'+month+' Team Scorecard</div>'
    +'<div style="color:rgba(255,255,255,.75);font-size:12px">Hi <b>'+am.name+'</b> &nbsp;|&nbsp; '+date+'</div>'
    +'</td></tr></table>'
    // Summary row
    +'<table width="640" cellpadding="0" cellspacing="0" align="center" style="background:#fff;border:1px solid #e8eaf6;border-top:none"><tr>'
    +'<td style="padding:14px 16px;text-align:center;border-right:1px solid #f0f0f0">'
    +'<div style="font-size:10px;color:#9e9e9e;font-weight:600;text-transform:uppercase">Team GMV</div>'
    +'<div style="font-size:20px;font-weight:800;color:#1a237e">'+fmtCr(totCur)+'</div>'
    +'<div style="font-size:10px;color:#9e9e9e">LMTD: '+fmtCr(totPrv)+'</div>'
    +(gPct!==null?'<div style="margin-top:4px"><span style="background:'+(up?'#e8f5e9':'#ffebee')+';color:'+(up?'#1b5e20':'#b71c1c')+';padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700">'+(up?'&#9650;':'&#9660;')+' '+(up?'+':'')+gPct+'% ('+(up?'+':'')+fmtCr(Math.abs(totDiff))+')</span></div>':'')
    +'</td>'
    +'<td style="padding:14px 16px;text-align:center;border-right:1px solid #f0f0f0">'
    +'<div style="font-size:10px;color:#9e9e9e;font-weight:600;text-transform:uppercase">UC</div>'

    +'<td style="padding:14px 16px;text-align:center;border-right:1px solid #f0f0f0">'
    +'<div style="font-size:10px;color:#9e9e9e;font-weight:600;text-transform:uppercase">CV</div>'
    +'<div style="font-size:20px;font-weight:800;color:#6a1b9a">'+fmtCr(totCV)+'</div>'
    +'</td>'
    +'<td style="padding:14px 16px;text-align:center;border-right:1px solid #f0f0f0">'
    +'<div style="font-size:10px;color:#9e9e9e;font-weight:600;text-transform:uppercase">Channels</div>'
    +'<div style="font-size:20px;font-weight:800;color:#00838f">'+totCh+'</div>'
    +'<div style="font-size:10px;color:#9e9e9e">LMTD: '+prvCh+'</div>'

    +'<td style="padding:14px 16px;text-align:center;border-right:1px solid #f0f0f0">'

function buildTHScorecardHTML() {

  const amList = emps.filter(e=>e.designation==='AM'&&e.rh_id===currentUser.id);

  const amRows = amList.map(am=>{
    const cur    = myTxns.filter(t=>t.am_id===am.id);
    const prv    = toLMTD(prevData.filter(t=>t.am_id===am.id));
    const curAmt = cur.reduce((s,t)=>s+t.amt,0);
    const prvAmt = prv.reduce((s,t)=>s+t.amt,0);
    const amEmpObj2 = resolveEmpById(am.id);
    const curCh  = countChannels(cur, amEmpObj2);
    const prvCh  = countChannels(prv, amEmpObj2);

      const t=myTxns.filter(x=>x.bm_id===b.id);

      return tgt>0&&Math.round((t.reduce((s,x)=>s+x.amt,0)/tgt)*100)>=70;
    }).length;
    return {am,curAmt,prvAmt,curCh,prvCh,bmCount:amBMs.length,onTrack:onT,diff:curAmt-prvAmt,gPct:prvAmt>0?Math.round(((curAmt-prvAmt)/prvAmt)*100):null,chDiff:curCh-prvCh};

    </div>
  </div></body></html>`;
}

// ═══════════════════════════════════════════════════════════
// Q1 SCORECARD EMAIL BUILDER (Apr-Jun)
// ═══════════════════════════════════════════════════════════
function buildQ1EmailHTML(emp) {
  const emps    = getEmpData();
  const date    = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  const fyLabel = 'FY' + getFYStartYear() + '-' + String(getFYStartYear()+1).slice(2);

  const q1Months = [
    makeMonthEntry(new Date(getFYStartYear(), 3, 1)),
    makeMonthEntry(new Date(getFYStartYear(), 4, 1)),
    makeMonthEntry(new Date(getFYStartYear(), 5, 1)),
  ].filter(m => new Date(m.pfx + '-01') <= new Date());

  function getTxns(emp, monthData) {
    if (emp.designation==='BM') return monthData.filter(t=>t.bm_id===emp.id);
    if (emp.designation==='AM') return monthData.filter(t=>t.am_id===emp.id);
    if (emp.designation==='TH') return monthData.filter(t=>t.am_id===emp.id||t.th_id===emp.id);
    return [];
  }

  // Month-wise stats
  const monthStats = q1Months.map(m => {
    const txns = getTxns(emp, m.data());
    const uc   = txns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
    const cv   = txns.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);
    const ch   = countChannels(txns, emp);
    return { label: m.label.split(' ')[0], tot: uc+cv, uc, cv, cases: txns.length, ch };
  });

  const ytdTot   = monthStats.reduce((s,m)=>s+m.tot,0);
  const ytdUC    = monthStats.reduce((s,m)=>s+m.uc,0);
  const ytdCV    = monthStats.reduce((s,m)=>s+m.cv,0);
  const ytdCases = monthStats.reduce((s,m)=>s+m.cases,0);

  const ucTgt  = (emp.uc_tgt||0)*1e5 * q1Months.length;
  const cvTgt  = (emp.cv_tgt||0)*1e5 * q1Months.length;
  const tgt    = ucTgt + cvTgt;
  const ach    = tgt>0 ? Math.round((ytdTot/tgt)*100) : null;
  const achCol = ach===null?'#555':ach>=100?'#2e7d32':ach>=70?'#1565c0':'#c62828';
  const isCVBM = emp.designation==='BM' && (!emp.uc_tgt||emp.uc_tgt===0||emp.uc_tgt==='') && (emp.cv_tgt>0);

  // BM rows for AM/TH
  let bmTable = '';
  if (emp.designation === 'AM' || emp.designation === 'TH') {
    const bmList = emps.filter(e=>e.designation==='BM'&&e.am_id===emp.id);
    const bmRows = bmList.map(bm => {
      const t   = q1Months.flatMap(m=>m.data().filter(x=>x.bm_id===bm.id));
      const amt = t.reduce((s,x)=>s+x.amt,0);
      const t3  = ((bm.uc_tgt||0)+(bm.cv_tgt||0))*1e5*q1Months.length;
      const a   = t3>0?Math.round((amt/t3)*100):null;
      return {bm, amt, cases:t.length, ach:a};
    }).sort((a,b)=>b.amt-a.amt);

    bmTable = '<tr style="background:#e8eaf6"><td colspan="6" style="padding:8px 12px;font-weight:700;color:#1a237e">BM-wise Q1 Performance</td></tr>'
      + '<tr style="background:#1a237e;color:#fff"><th style="padding:7px 10px;text-align:left">BM Name</th><th style="padding:7px 8px;text-align:left">Tier</th><th style="padding:7px 10px;text-align:right">Q1 GMV</th><th style="padding:7px 8px;text-align:right">Q1 UC</th><th style="padding:7px 8px;text-align:right">Q1 CV</th><th style="padding:7px 8px;text-align:center">Ach%</th></tr>'
      + bmRows.map((r,i) => {
        const col = r.ach===null?'#555':r.ach>=100?'#2e7d32':r.ach>=70?'#1565c0':'#c62828';
        const t   = q1Months.flatMap(m=>m.data().filter(x=>x.bm_id===r.bm.id));
        const uc  = t.filter(x=>x.product==='Used Car').reduce((s,x)=>s+x.amt,0);
        const cv  = t.filter(x=>x.product!=='Used Car').reduce((s,x)=>s+x.amt,0);
        return '<tr style="background:' + (i%2===0?'#fff':'#f8f9ff') + '">'
          + '<td style="padding:7px 10px;font-weight:700;border-bottom:1px solid #f0f0f0">' + r.bm.name + '</td>'
          + '<td style="padding:7px 8px;border-bottom:1px solid #f0f0f0"><span style="background:#e8eaf6;color:#3949ab;padding:1px 5px;border-radius:6px;font-size:10px">' + (r.bm.tier||'-') + '</span></td>'
          + '<td style="padding:7px 10px;text-align:right;font-weight:700;border-bottom:1px solid #f0f0f0">' + fmtCr(r.amt) + '</td>'
          + '<td style="padding:7px 8px;text-align:right;color:#1565c0;border-bottom:1px solid #f0f0f0">' + fmtCr(uc) + '</td>'
          + '<td style="padding:7px 8px;text-align:right;color:#6a1b9a;border-bottom:1px solid #f0f0f0">' + fmtCr(cv) + '</td>'
          + '<td style="padding:7px 8px;text-align:center;border-bottom:1px solid #f0f0f0"><span style="background:' + (r.ach>=100?'#e8f5e9':r.ach>=70?'#e3f2fd':'#ffebee') + ';color:' + col + ';padding:2px 7px;border-radius:8px;font-size:11px;font-weight:700">' + (r.ach!==null?r.ach+'%':'--') + '</span></td>'
          + '</tr>';
      }).join('');
  }

  return '<!DOCTYPE html><html><body style="margin:0;padding:0;background:#f0f2f5;font-family:Arial,Helvetica,sans-serif">'
    + '<div style="max-width:620px;margin:0 auto;padding:16px">'

    // Header
    + '<div style="background:linear-gradient(135deg,#283593,#1a237e);border-radius:12px 12px 0 0;padding:24px 28px">'
    + '<div style="color:rgba(255,255,255,.7);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Q1 PERFORMANCE REPORT - ' + fyLabel + '</div>'
    + '<div style="color:#fff;font-size:20px;font-weight:800;margin-bottom:4px">April - June Scorecard</div>'
    + '<div style="color:rgba(255,255,255,.75);font-size:13px">Hi ' + emp.name + ' | ' + date + '</div>'
    + '</div>'

    // YTD Summary row
    + '<div style="background:#fff;padding:0;border-bottom:2px solid #e8eaf6">'
    + '<table style="width:100%;border-collapse:collapse">'
    + '<tr style="background:#f5f7ff">'
    + '<td style="padding:14px 12px;text-align:center;border-right:1px solid #e8eaf6"><div style="font-size:10px;color:#9e9e9e;font-weight:700;text-transform:uppercase;margin-bottom:4px">Q1 Total</div><div style="font-size:20px;font-weight:800;color:#1a237e">' + fmtCr(ytdTot) + '</div></td>'
    + '<td style="padding:14px 12px;text-align:center;border-right:1px solid #e8eaf6"><div style="font-size:10px;color:#9e9e9e;font-weight:700;text-transform:uppercase;margin-bottom:4px">UC</div><div style="font-size:20px;font-weight:800;color:#1565c0">' + fmtCr(ytdUC) + '</div></td>'
    + '<td style="padding:14px 12px;text-align:center;border-right:1px solid #e8eaf6"><div style="font-size:10px;color:#9e9e9e;font-weight:700;text-transform:uppercase;margin-bottom:4px">CV</div><div style="font-size:20px;font-weight:800;color:#6a1b9a">' + fmtCr(ytdCV) + '</div></td>'
    + '<td style="padding:14px 12px;text-align:center;border-right:1px solid #e8eaf6"><div style="font-size:10px;color:#9e9e9e;font-weight:700;text-transform:uppercase;margin-bottom:4px">Cases</div><div style="font-size:20px;font-weight:800;color:#333">' + ytdCases + '</div></td>'
    + '<td style="padding:14px 12px;text-align:center"><div style="font-size:10px;color:#9e9e9e;font-weight:700;text-transform:uppercase;margin-bottom:4px">Q1 Ach%</div><div style="font-size:20px;font-weight:800;color:' + achCol + '">' + (ach!==null?ach+'%':'--') + '</div></td>'
    + '</tr>'
    + '</table>'
    + '</div>'

    // Month-wise breakdown table
    + '<div style="background:#fff;padding:16px 20px;border-bottom:1px solid #f0f0f0">'
    + '<div style="font-size:12px;font-weight:700;color:#1a237e;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px">Month-wise Breakdown</div>'
    + '<table style="width:100%;border-collapse:collapse;font-size:12px">'
    + '<thead><tr style="background:#1a237e;color:#fff">'
    + '<th style="padding:8px 10px;text-align:left">Month</th>'
    + '<th style="padding:8px 10px;text-align:right">GMV</th>'
    + '<th style="padding:8px 8px;text-align:right">UC</th>'
    + '<th style="padding:8px 8px;text-align:right">CV</th>'
    + '<th style="padding:8px 8px;text-align:center">Cases</th>'
    + '<th style="padding:8px 8px;text-align:center">Channels</th>'
    + '</tr></thead>'
    + '<tbody>'
    + monthStats.map((m,i) =>
        '<tr style="background:' + (i%2===0?'#fff':'#f8f9ff') + '">'
        + '<td style="padding:8px 10px;font-weight:700;color:#283593;border-bottom:1px solid #f0f0f0">' + m.label + '</td>'
        + '<td style="padding:8px 10px;text-align:right;font-weight:700;border-bottom:1px solid #f0f0f0">' + fmtCr(m.tot) + '</td>'
        + '<td style="padding:8px 8px;text-align:right;color:#1565c0;border-bottom:1px solid #f0f0f0">' + fmtCr(m.uc) + '</td>'
        + '<td style="padding:8px 8px;text-align:right;color:#6a1b9a;border-bottom:1px solid #f0f0f0">' + fmtCr(m.cv) + '</td>'
        + '<td style="padding:8px 8px;text-align:center;border-bottom:1px solid #f0f0f0">' + m.cases + '</td>'
        + '<td style="padding:8px 8px;text-align:center;border-bottom:1px solid #f0f0f0">' + m.ch + '</td>'
        + '</tr>'
      ).join('')
    + '<tr style="background:#e8eaf6;font-weight:700">'
    + '<td style="padding:8px 10px">YTD Total</td>'
    + '<td style="padding:8px 10px;text-align:right;color:#1a237e">' + fmtCr(ytdTot) + '</td>'
    + '<td style="padding:8px 8px;text-align:right;color:#1565c0">' + fmtCr(ytdUC) + '</td>'
    + '<td style="padding:8px 8px;text-align:right;color:#6a1b9a">' + fmtCr(ytdCV) + '</td>'
    + '<td style="padding:8px 8px;text-align:center">' + ytdCases + '</td>'
    + '<td style="padding:8px 8px;text-align:center">--</td>'
    + '</tr>'
    + '</tbody></table>'
    + '</div>'

    // BM table for AM/TH
    + (bmTable ? '<div style="background:#fff;padding:16px 20px;border-bottom:1px solid #f0f0f0"><table style="width:100%;border-collapse:collapse;font-size:12px">' + bmTable + '</table></div>' : '')

    // Target row
    + (tgt>0 ? '<div style="background:' + (ach>=100?'#e8f5e9':ach>=70?'#e3f2fd':'#fff3e0') + ';padding:12px 20px">'
        + '<span style="font-weight:700;color:' + achCol + '">Q1 Target: ' + fmtCr(tgt) + ' | Achieved: ' + fmtCr(ytdTot) + ' | ' + (ach!==null?ach+'%':'--') + '</span>'
        + (ach!==null&&ach<100 ? ' | Shortfall: ' + fmtCr(tgt-ytdTot) : '')
        + '</div>' : '')

    // Footer
    + '<div style="background:#1a237e;padding:12px 20px;border-radius:0 0 12px 12px;display:flex;justify-content:space-between;align-items:center">'
    + '<div style="color:rgba(255,255,255,.9);font-size:12px;font-weight:700">Rupyy Performance Dashboard</div>'
    + '<div style="color:rgba(255,255,255,.5);font-size:11px">' + fyLabel + ' Q1 | ' + date + '</div>'
    + '</div>'

    + '</div></body></html>';
}

// ── Send Scorecard to BMs (individual email, CC AM+TH) ─────
async function sendScorecardToBMs() {
  const emps     = getEmpData();
  const checked  = [...document.querySelectorAll('.sc-bm-chk:checked')];
  const statusEl = document.getElementById('sc-bm-status');
  if (!checked.length) { statusEl.innerHTML = '<span style="color:#c62828">Select at least one BM</span>'; return; }
  if (!getASUrl()) { promptASUrl(); return; }

  statusEl.innerHTML = 'Sending to ' + checked.length + ' BMs...';
  let sent=0;

  for (const chk of checked) {
    const bm    = emps.find(e=>e.id===chk.dataset.id);
    if (!bm || !bm.email) { continue; }
    const amEmp = emps.find(e=>e.id===bm.am_id);
    const thEmp = emps.find(e=>e.id===bm.th_id);
    const cc    = [amEmp?.email, thEmp?.email].filter(Boolean);
    const ach   = (() => {
      const t   = myTxns.filter(x=>x.bm_id===bm.id);
      const tot = t.reduce((s,x)=>s+x.amt,0);
      const tgt = ((bm.uc_tgt||0)+(bm.cv_tgt||0))*1e5;
      return tgt>0 ? Math.round((tot/tgt)*100) : null;
    })();
    try {
      await fetch(getASUrl(), {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          to: [bm.email], cc,
          subject: getCurMonthLabel() + ' Scorecard - ' + bm.name + (ach!==null?' - '+ach+'% achieved':''),
          htmlBody: buildBMScorecardHTML(bm)
        }),
        mode:'no-cors'
      });
      sent++;
    } catch(e) {}
    statusEl.innerHTML = 'Sent ' + sent + '/' + checked.length + '...';
    await new Promise(r=>setTimeout(r,400));
  }
  statusEl.innerHTML = '<span style="color:#2e7d32">Sent to ' + sent + ' BMs | CC: AM & TH</span>';
}

// ── Exit Goal Email Builder ─────────────────────────────
function buildExitGoalEmailHTML(bm, msIdx) {
  const ms      = MILESTONES[msIdx] || MILESTONES[0];
  const empRaw  = window._LIVE_EMP_RAW || [];
  const empRow  = empRaw.find(r => String(r['Employee Code']||'').split('.')[0].trim() === bm.id) || {};

  const ucTgt   = parseFloat(empRow[ms.ucCol] || 0) * 1e5 || (bm.uc_tgt||0)*1e5*(ms.day/30);
  const cvTgt   = parseFloat(empRow[ms.cvCol] || 0) * 1e5 || (bm.cv_tgt||0)*1e5*(ms.day/30);
  const chTgt   = parseFloat(empRow[ms.chCol] || 0) || Math.round((bm.ch_tgt||0)*(ms.day/30));
  const totTgt  = ucTgt + cvTgt;

  const txns    = myTxns.filter(t => t.bm_id===bm.id && (t.day||0) <= ms.day);
  const ucAmt   = txns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
  const cvAmt   = txns.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);
  const totAmt  = ucAmt + cvAmt;
  const ch      = countChannels(txns, bm);

  const ucAch   = ucTgt>0  ? Math.round((ucAmt/ucTgt)*100)   : null;
  const cvAch   = cvTgt>0  ? Math.round((cvAmt/cvTgt)*100)   : null;
  const totAch  = totTgt>0 ? Math.round((totAmt/totTgt)*100) : null;
  const chAch   = chTgt>0  ? Math.round((ch/chTgt)*100)      : null;

  const achieved = totAch !== null && totAch >= 100;
  const onTrack  = totAch !== null && totAch >= 70;
  const nextMs   = MILESTONES[msIdx+1];
  const nextLabel= nextMs ? nextMs.label : 'Month End';
  const date     = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});

  const hdrBg   = achieved ? '#1b5e20' : onTrack ? '#0d47a1' : '#7f0000';
  const accentCol= achieved ? '#2e7d32' : onTrack ? '#1565c0' : '#c62828';
  const accentBg = achieved ? '#e8f5e9' : onTrack ? '#e3f2fd' : '#ffebee';
  const statusTxt= achieved ? 'EXIT GOAL ACHIEVED!' : onTrack ? 'ON TRACK' : 'BEHIND EXIT GOAL';

  // Gmail-safe horizontal bar (table-based)
  function bar(val, tgt, col) {
    if (!tgt) return '';
    const w = Math.min(Math.round((val/tgt)*100), 100);
    const pct = Math.round((val/tgt)*100);
    return '<table cellpadding="0" cellspacing="0" width="100%" style="margin:6px 0 14px">'
      +'<tr><td style="font-size:11px;color:#555;padding-bottom:3px" colspan="2">'
      +'<span style="font-weight:700;color:'+col+'">'+pct+'%</span>'
      +' &nbsp;<span style="color:#9e9e9e">'+fmtCr(val)+' / '+fmtCr(tgt)+'</span>'
      +'</td></tr>'
      +'<tr><td width="'+w+'%" style="background:'+col+';height:12px;border-radius:6px 0 0 6px;padding:0"></td>'
      +'<td width="'+(100-w)+'%" style="background:#e0e0e0;height:12px;border-radius:0 6px 6px 0;padding:0"></td></tr>'
      +'</table>';
  }

  // KPI block (big number card)
  function kpi(label, val, tgt, ach, col, bg) {
    const achPct = ach !== null ? ach : null;
    return '<td style="padding:16px 12px;text-align:center;vertical-align:top;border-right:1px solid #f0f0f0">'
      +'<div style="font-size:10px;color:#9e9e9e;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">'+label+'</div>'
      +'<div style="font-size:22px;font-weight:800;color:'+col+'">'+fmtCr(val)+'</div>'
      +'<div style="font-size:11px;color:#9e9e9e;margin:3px 0">Target: '+(tgt>0?fmtCr(tgt):'—')+'</div>'
      +(achPct!==null
        ? '<div style="display:inline-block;background:'+bg+';color:'+col+';padding:3px 10px;border-radius:12px;font-size:12px;font-weight:800;margin-top:4px">'+achPct+'%</div>'
        : '<div style="color:#ccc;font-size:12px">—</div>')
      +'</td>';
  }

  return '<!DOCTYPE html><html><body style="margin:0;padding:0;background:#f0f2f5;font-family:Arial,Helvetica,sans-serif">'
    +'<div style="max-width:600px;margin:0 auto;padding:16px">'

    // ── HEADER ──────────────────────────────────────────────
    +'<table cellpadding="0" cellspacing="0" width="100%" style="background:'+hdrBg+';border-radius:14px 14px 0 0"><tr><td style="padding:24px 28px">'
    +'<div style="color:rgba(255,255,255,.65);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px">EXIT GOAL REPORT — '+ms.label.toUpperCase()+' 2026</div>'
    +'<div style="color:#fff;font-size:22px;font-weight:800;margin-bottom:6px">'+getCurMonthLabel()+' Exit Performance</div>'
    +'<div style="color:rgba(255,255,255,.8);font-size:13px;margin-bottom:14px">Hi <b>'+bm.name+'</b> &nbsp;|&nbsp; '+date+'</div>'

      </tr>`;
    }).join('');

    const html = `<div style="font-family:Arial,sans-serif;max-width:580px;margin:0 auto;background:#fff">
      <div style="background:linear-gradient(135deg,#b71c1c,#c62828);padding:22px 28px;border-radius:10px 10px 0 0">
        <div style="color:#fff;font-size:18px;font-weight:800">Channel Drive Alert - Action Required</div>

          </div>

            <th style="padding:8px 10px;text-align:right">${prevMonth.split(' ')[0]} GMV</th>
            <th style="padding:8px 10px;text-align:center">Action</th>
          </tr></thead>
          <tbody>${lostRows}</tbody>
        </table>`:''}
        ${inact.length?`
        <div style="font-weight:700;color:#f57f17;margin-bottom:8px;font-size:13px">Reactivate These Channels (${inact.length})</div>
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead><tr style="background:#fff8e1">
            <th style="padding:8px 10px;text-align:left">Dealer Name</th>
            <th style="padding:8px 10px;text-align:right">Avg Monthly GMV</th>
            <th style="padding:8px 10px;text-align:center">Action</th>
          </tr></thead>
          <tbody>${inactRows}</tbody>
        </table>`:''}
        ${!lost.length&&!inact.length?`<div style="padding:16px;background:#e8f5e9;border-radius:8px;color:#2e7d32;font-weight:700;text-align:center">All channels active! Great work.</div>`:''}
      </div>
      <div style="background:#c62828;padding:12px 28px;border-radius:0 0 10px 10px;text-align:center;color:rgba(255,255,255,.6);font-size:11px">
        Rupyy Performance Dashboard | Channel Drive | ${dateStr}
      </div>
    </div>`;

    try {
      await fetch(getASUrl(), {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          to: [bm.email], cc,
          subject: `Channel Drive Alert - ${bm.name} - ${lost.length} lost, ${inact.length} inactive`,
          htmlBody: html
        }),
        mode:'no-cors'
      });
      sent++;
    } catch(e) {}
    statusEl.innerHTML = `<span style="color:#e53935">Sent ${sent}/${checked.length}...</span>`;
    await new Promise(r=>setTimeout(r,300));
  }
  statusEl.innerHTML = `<span style="color:#2e7d32;font-weight:700">Sent to ${sent} BMs | CC: AM & TH</span>`;
}

// AM CHANNEL DRIVE EMAIL
// ══════════════════════════════════════════════════════════
function buildAMChannelEmailHTML(amEmp, curTxns, prevTxns, l3Txns) {
  const emps      = getEmpData();
  const dateStr   = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  const month     = getCurMonthLabel();
  const prevMonth = getPrevMonthLabel();
  const todayDay  = getTodayDay();
  const amBMs     = emps.filter(e => e.designation==='BM' && e.am_id===amEmp.id);

  function fmtL(n) {
    if (!n) return '0';
    if (Math.abs(n)>=1e7) return '\u20b9'+(n/1e7).toFixed(2)+' Cr';
    if (Math.abs(n)>=1e5) return '\u20b9'+(n/1e5).toFixed(2)+' L';
    return '\u20b9'+Math.round(n).toLocaleString('en-IN');
  }

  const amCur    = curTxns.filter(t=>t.am_id===amEmp.id);
  const amPrev   = prevTxns.filter(t=>t.am_id===amEmp.id);
  const amCurAmt = amCur.reduce((s,t)=>s+t.amt,0);
  const amPrvAmt = amPrev.reduce((s,t)=>s+t.amt,0);
  const amCurCh  = new Set(amCur.filter(t=>t.ch_check>0&&t.dcid).map(t=>t.dcid)).size;
  const amChTgt  = amBMs.reduce((s,b)=>s+(b.ch_tgt||0),0);
  const amTgt    = amBMs.reduce((s,b)=>s+((b.uc_tgt||0)+(b.cv_tgt||0)),0)*1e5;
  const achPct   = amTgt>0 ? Math.round((amCurAmt/amTgt)*100) : 0;
  const growth   = amPrvAmt>0 ? Math.round(((amCurAmt-amPrvAmt)/amPrvAmt)*100) : null;

  const bmRows = amBMs.map(bm => {
    const cur    = curTxns.filter(t=>t.bm_id===bm.id);
    const prev   = prevTxns.filter(t=>t.bm_id===bm.id);
    const l3     = l3Txns.filter(t=>t.bm_id===bm.id);
    const curCh  = new Set(cur.filter(t=>t.ch_check>0&&t.dcid).map(t=>t.dcid));
    const prevCh = new Set(prev.filter(t=>t.ch_check>0&&t.dcid).map(t=>t.dcid));
    const l3Ch   = new Set(l3.filter(t=>t.ch_check>0&&t.dcid).map(t=>t.dcid));
    const lost   = [...prevCh].filter(d=>!curCh.has(d));
    const inact  = [...l3Ch].filter(d=>!curCh.has(d)&&!lost.includes(d));
    const lostGMV  = lost.reduce((s,d)=>s+prev.filter(t=>t.dcid===d).reduce((ss,t)=>ss+t.amt,0),0);
    const inactGMV = inact.reduce((s,d)=>s+l3.filter(t=>t.dcid===d).reduce((ss,t)=>ss+t.amt,0),0);
    const curAmt = cur.reduce((s,t)=>s+t.amt,0);
    const tgt    = ((bm.uc_tgt||0)+(bm.cv_tgt||0))*1e5;
    const ap     = tgt>0?Math.round((curAmt/tgt)*100):null;
    return {bm, curCh:curCh.size, lost:lost.length, inact:inact.length,
            lostGMV, inactGMV, curAmt, tgt, ap, chTgt:bm.ch_tgt||0};
  }).sort((a,b)=>b.lost-a.lost||b.inact-a.inact);

  const totLost     = bmRows.reduce((s,r)=>s+r.lost,0);
  const totInact    = bmRows.reduce((s,r)=>s+r.inact,0);

  return '<!DOCTYPE html><html><head><meta charset="UTF-8">'+
  '<meta name="viewport" content="width=device-width,initial-scale=1">'+
  '</head><body style="margin:0;padding:0;background:#eef0f4;font-family:Arial,Helvetica,sans-serif">'+
  '<div style="max-width:680px;margin:0 auto;padding:20px 12px">'+

  // ── Header card ──
  '<table width="100%" cellpadding="0" cellspacing="0" style="background:linear-gradient(135deg,#0d47a1 0%,#1565c0 60%,#1976d2 100%);border-radius:14px 14px 0 0;margin-bottom:0">'+
  '<tr><td style="padding:28px 28px 22px">'+
    '<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">CHANNEL DRIVE ALERT &nbsp;|&nbsp; ACTION REQUIRED</div>'+
    '<div style="font-size:24px;font-weight:900;color:#fff;margin-bottom:6px">'+month+' Channel Status</div>'+
    '<div style="font-size:12px;color:rgba(255,255,255,.75)">'+dateStr+' &nbsp;&bull;&nbsp; Area: <b>'+amEmp.name+'</b> &nbsp;&bull;&nbsp; From: '+currentUser.name+'</div>'+
    '<div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">'+
      '<span style="display:inline-block;background:rgba(255,255,255,.18);color:#fff;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600">'+amBMs.length+' BMs</span>'+

      (totLost===0&&totInact===0?'<span style="display:inline-block;background:#c8e6c9;color:#1b5e20;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700">All Channels On Track</span>':'')+
    '</div>'+
  '</td></tr></table>'+

  // ── 4 KPI boxes in ONE row ──

  // ── Action Footer ──

      '</div>':'')+
    '<div style="color:rgba(255,255,255,.55);font-size:10px;margin-top:10px;border-top:1px solid rgba(255,255,255,.15);padding-top:8px">Rupyy Performance Dashboard &nbsp;|&nbsp; '+currentUser.name+' &nbsp;|&nbsp; '+dateStr+'</div>'+
  '</div>'+
  '</div></body></html>';
}

// ══════════════════════════════════════════════════════════
// TH CHANNEL DRIVE EMAIL
// ══════════════════════════════════════════════════════════
function buildTHChannelEmailHTML(thEmp, curTxns, prevTxns, l3Txns) {
  const emps      = getEmpData();
  const dateStr   = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  const month     = getCurMonthLabel();
  const prevMonth = getPrevMonthLabel();
  const todayDay  = getTodayDay();

  const thBmIds = new Set(emps.filter(e=>e.designation==='BM'&&(e.th_id===thEmp.id||e.am_id===thEmp.id)).map(e=>e.id));
  const thBMs   = emps.filter(e=>e.designation==='BM'&&thBmIds.has(e.id));

  function fmtL(n) {
    if (!n) return '0';
    if (Math.abs(n)>=1e7) return '\u20b9'+(n/1e7).toFixed(2)+' Cr';
    if (Math.abs(n)>=1e5) return '\u20b9'+(n/1e5).toFixed(2)+' L';
    return '\u20b9'+Math.round(n).toLocaleString('en-IN');
  }

  const thCurAmt  = curTxns.reduce((s,t)=>s+t.amt,0);
  const thPrvAmt  = prevTxns.reduce((s,t)=>s+t.amt,0);
  const thCurCh   = new Set(curTxns.filter(t=>t.ch_check>0&&t.dcid).map(t=>t.dcid)).size;
  const thChTgt   = thBMs.reduce((s,b)=>s+(b.ch_tgt||0),0);
  const thTgt     = thBMs.reduce((s,b)=>s+((b.uc_tgt||0)+(b.cv_tgt||0)),0)*1e5;
  const achPct    = thTgt>0?Math.round((thCurAmt/thTgt)*100):0;
  const growth    = thPrvAmt>0?Math.round(((thCurAmt-thPrvAmt)/thPrvAmt)*100):null;

  const bmRows = thBMs.map(bm => {
    const amEmp  = emps.find(e=>e.id===bm.am_id);
    const cur    = curTxns.filter(t=>t.bm_id===bm.id);
    const prev   = prevTxns.filter(t=>t.bm_id===bm.id);
    const l3     = l3Txns.filter(t=>t.bm_id===bm.id);
    const curCh  = new Set(cur.filter(t=>t.ch_check>0&&t.dcid).map(t=>t.dcid));
    const prevCh = new Set(prev.filter(t=>t.ch_check>0&&t.dcid).map(t=>t.dcid));
    const l3Ch   = new Set(l3.filter(t=>t.ch_check>0&&t.dcid).map(t=>t.dcid));
    const lost   = [...prevCh].filter(d=>!curCh.has(d));
    const inact  = [...l3Ch].filter(d=>!curCh.has(d)&&!lost.includes(d));
    const lostGMV  = lost.reduce((s,d)=>s+prev.filter(t=>t.dcid===d).reduce((ss,t)=>ss+t.amt,0),0);

// ── Save commitment to Google Sheet via Apps Script ────────
function saveCommitmentToSheet(inputEl) {
  if (!window._rhCommit) window._rhCommit = {};
  const key     = inputEl.dataset.key;
  const val     = inputEl.value.trim();
  window._rhCommit[key] = val;

  // Parse value — accept "50L", "50", "1.5Cr", "150000" etc.
  function parseAmt(s) {
    if (!s) return 0;
    const n = parseFloat(s.replace(/[^0-9.]/g,''));
    if (isNaN(n)) return 0;
    if (s.toLowerCase().includes('cr')) return n * 100;
    if (s.toLowerCase().includes('l'))  return n;
    return n / 1e5; // raw rupees to lakhs
  }

  const personId = inputEl.dataset.pid;
  const name     = inputEl.dataset.pname;
  const role     = inputEl.dataset.prole;
  const product  = inputEl.dataset.product; // 'uc' or 'cv'
  const amtL     = parseAmt(val);
  const today    = new Date().toISOString().slice(0,10);

  const asUrl = getASUrl();
  if (!asUrl) return; // no AS URL configured — silently skip

  // Debounce — wait 800ms after last keystroke
  clearTimeout(inputEl._saveTimer);
  inputEl._saveTimer = setTimeout(async () => {
    const payload = {
      action:    'saveCommitment',
      date:      today,
      personId,
      name,
      role,
      ucCommit:  product === 'uc' ? amtL : 0,
      cvCommit:  product === 'cv' ? amtL : 0,
    };

    // If both UC and CV exist for this person, merge them
    const otherProduct = product === 'uc' ? 'cv' : 'uc';
    const otherKey     = otherProduct + '_' + personId;
    const otherVal     = window._rhCommit[otherKey] || '';
    if (otherVal) {
      payload.ucCommit = product === 'uc' ? amtL : parseAmt(otherVal);
      payload.cvCommit = product === 'cv' ? amtL : parseAmt(otherVal);
    }

    try {
      await fetch(asUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
        mode: 'no-cors'
      });
      // Visual feedback
      inputEl.style.borderColor = '#2e7d32';
      setTimeout(() => inputEl.style.borderColor = '#c5cae9', 1500);
    } catch(e) {
      inputEl.style.borderColor = '#c62828';
      setTimeout(() => inputEl.style.borderColor = '#c5cae9', 2000);
    }
  }, 800);
}

async function sendChannelToAMs() {
  const emps     = getEmpData();
  const checked  = [...document.querySelectorAll('.ch-am-chk:checked')];
  const statusEl = document.getElementById('ch-am-status');
  if (!checked.length) { statusEl.innerHTML = '<span style="color:#c62828">Select at least one AM</span>'; return; }
  if (!getASUrl()) { promptASUrl(); return; }

  let sent = 0;
  statusEl.innerHTML = `<span style="color:#e53935">Sending to ${checked.length} AM(s)...</span>`;
  const l3Data = getLast6Months().slice(-3).flatMap(m => m.data().filter(t => t.rh_id === currentUser.id));

  for (const chk of checked) {
    const am    = emps.find(e => e.id === chk.dataset.id);
    if (!am || !am.email) continue;
    const thEmp = emps.find(e => e.id === am.th_id);
    const cc    = [thEmp?.email].filter(Boolean);

    const amCurTxns  = myTxns.filter(t => t.am_id === am.id);
    const amPrevTxns = (window._LIVE_MAY||[]).filter(t => t.am_id === am.id);
    const amL3Txns   = l3Data.filter(t => t.am_id === am.id);

    try {
      await fetch(getASUrl(), {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          to: [am.email], cc,
          subject: `Channel Drive Alert — ${am.name} Area — ${getCurMonthLabel()}`,
          htmlBody: buildAMChannelEmailHTML(am, amCurTxns, amPrevTxns, amL3Txns)
        }),
        mode:'no-cors'
      });
      sent++;
    } catch(e) {}
    statusEl.innerHTML = `Sent ${sent}/${checked.length}...`;
    await new Promise(r => setTimeout(r, 400));
  }
  statusEl.innerHTML = `<span style="color:#2e7d32;font-weight:700">Sent to ${sent} AM(s) | CC: TH</span>`;
}

async function sendChannelToTHs() {

    const thEmp = emps.find(e => e.id === chk.dataset.id);

    // Scope BMs under this TH
    const thBmIds = new Set(emps.filter(e =>
      e.designation === 'BM' && (e.th_id === thEmp.id || e.am_id === thEmp.id)
    ).map(e => e.id));

    // Filter transactions to this TH's team only
    const thCurTxns  = myTxns.filter(t => t.th_id === thEmp.id || thBmIds.has(t.bm_id));
    const thPrevTxns = (window._LIVE_MAY||[]).filter(t => t.th_id === thEmp.id || thBmIds.has(t.bm_id));

      m.data().filter(t => t.th_id === thEmp.id || thBmIds.has(t.bm_id))
    );

    try {
      await fetch(getASUrl(), {
        method:'POST', headers:{'Content-Type':'application/json'},

// Auto-generate milestones for current month from employee data columns
// Looks for columns like "10Th August UC Target" etc. in the employee sheet
function buildMilestones() {
  const monthName = getCurMonthLabel().split(' ')[0]; // e.g. 'August'
  const days = [10, 20, 25];
  // Try to find columns matching current month in employee data
  const empRaw = window._LIVE_EMP_RAW;
  if (empRaw && empRaw.length) {
    const cols = Object.keys(empRaw[0]);
    const found = days.map(day => {
      // Look for column containing day + monthName e.g. "10Th August"
      const dayStr = day + 'Th';
      const ucCol = cols.find(c => c.includes(dayStr) && c.toLowerCase().includes(monthName.toLowerCase()) && c.toLowerCase().includes('uc'));
      const cvCol = cols.find(c => c.includes(dayStr) && c.toLowerCase().includes(monthName.toLowerCase()) && c.toLowerCase().includes('cv'));
      const chCol = cols.find(c => c.includes(dayStr) && c.toLowerCase().includes(monthName.toLowerCase()) && c.toLowerCase().includes('channel'));
      if (ucCol) return { day, label: day+'th '+monthName, ucCol, cvCol: cvCol||'', chCol: chCol||'' };
      return null;
    }).filter(Boolean);
    if (found.length) return found;
  }
  // Fallback: use hardcoded July columns if current month cols not found
  return [
    { day:10, label:'10th '+monthName, ucCol:'10Th July UC Target',  cvCol:'10Th July CV Target',  chCol:'10Th July Channel Target' },
    { day:20, label:'20th '+monthName, ucCol:'20Th July UC Target',  cvCol:'20Th  July CV Target', chCol:'20Th  July Channel Target' },
    { day:25, label:'25th '+monthName, ucCol:'25Th July UC Target',  cvCol:'25Th July CV Target',  chCol:'25Th July Channel Target' },
  ];
}
let MILESTONES = buildMilestones(); // rebuilt after live data loads

// Rebuild milestones after live EMP data arrives
const _origTryLoad = window._postLiveLoadHook;
window._postLiveLoadHook = function() {
  MILESTONES = buildMilestones();
  if (_origTryLoad) _origTryLoad();
};

function getCurrentMilestone() {
  const today = new Date().getDate();
  // Return the next upcoming milestone (or last one if past all)
  return MILESTONES.find(m => today <= m.day) || MILESTONES[MILESTONES.length - 1];
}

function getMilestoneEmpTargets(emp, ms) {
  // Read from live employee data which has the milestone cols
  const liveEmps = getEmpData();
  const liveEmp = liveEmps.find(e => e.id === emp?.id);
  // Milestone targets come from raw Google Sheets data
  const raw = (window._LIVE_EMP_RAW || []).find(r => {
    const id = String(r['Employee Code'] || r['E Code'] || '').split('.')[0].trim();
    return id === emp?.id;
  });
  if (!raw) {
    // fallback: use full month targets proportionally
    const ratio = ms.day / 30;
    return {
      uc: Math.round((emp?.uc_tgt||0) * ratio * 1e5),
      cv: Math.round((emp?.cv_tgt||0) * ratio * 1e5),
      ch: Math.round((emp?.ch_tgt||0) * ratio),
    };
  }
  return {
    uc: (parseFloat(raw[ms.ucCol])||0) * 1e5,
    cv: (parseFloat(raw[ms.cvCol])||0) * 1e5,
    ch:  parseFloat(raw[ms.chCol])||0,
  };
}

function buildWeekly(el) {

  el.innerHTML = `

        return '<button data-ms="'+i+'" onclick="switchWeeklyMs(this,'+i+')" style="padding:8px 18px;border:none;border-radius:20px;background:'+bg+';color:'+col+';font-size:13px;font-weight:700;cursor:pointer">'

          +'</button>';
      }).join('')}
    </div>

    <div id="weeklyBody"></div>
  `;

  window._weeklyMsIdx = 0;

  window.switchWeeklyMs = function(btn, idx) {
    document.querySelectorAll('#weeklyMsTabs button').forEach(b => {
      b.style.background='#f5f5f5'; b.style.color='#555';
    });
    btn.style.background='#1a237e'; btn.style.color='#fff';

  function renderWeeklyBody() {
    const ms = MILESTONES[window._weeklyMsIdx];

    if (!bodyEl) return;

    // Always get fresh data — getTxnData() returns live June data if loaded
    const d2=currentUser.designation, id2=currentUser.id;
    const allTxns = getTxnData().filter(t => {
      if(d2==='BM') return t.bm_id===id2;

function weeklyBadge(ach) {
  const color = ach >= 100 ? '#2e7d32' : ach >= 70 ? '#f57f17' : '#e53935';
  const bg    = ach >= 100 ? '#e8f5e9' : ach >= 70 ? '#fff8e1' : '#ffebee';
  return `<span style="background:${bg};color:${color};padding:3px 10px;border-radius:12px;font-size:12px;font-weight:800">${ach}%</span>`;
}

function weeklyBar(ach) {
  const color = ach >= 100 ? '#2e7d32' : ach >= 70 ? '#f57f17' : '#e53935';
  return `<div style="background:#f0f0f0;border-radius:4px;height:6px;margin-top:4px">
    <div style="background:${color};height:6px;border-radius:4px;width:${Math.min(ach,100)}%;transition:width .4s"></div>

}

function buildWeeklyTeam(ms, periodTxns, allTxns) {
  const role = currentUser.designation;
  const isRHorTH = role === 'RH' || role === 'TH';

  const bmMap = {};
  periodTxns.forEach(t => {
    const key = t.bm_id || t.bm;
    if (!bmMap[key]) bmMap[key] = [];
    bmMap[key].push(t);
  });

  // Include zero-txn BMs from employee sheet (they have targets but no disbursals yet)
  getEmpData().forEach(e => {
    if (e.designation === 'BM') {
      const inScope = role === 'RH' ? e.rh_id === currentUser.id
                    : role === 'TH' ? e.th_id === currentUser.id
                    : role === 'AM' ? e.am_id === currentUser.id : false;
      if (inScope && !bmMap[e.id]) bmMap[e.id] = [];
    }
  });

  const bmRows = Object.entries(bmMap).map(([key, txns]) => {
    // key may be an employee ID (for zero-txn BMs injected from employee sheet)
    const emp   = resolveEmpById(key) || (txns.length ? resolveEmpById(txns[0].bm_id) || resolveEmpName(txns[0].bm) : null);
    const tgts  = getMilestoneEmpTargets(emp, ms);
    const ucAmt = txns.filter(t=>t.product==='Used Car').reduce((s,t)=>s+t.amt,0);
    const cvAmt = txns.filter(t=>t.product!=='Used Car').reduce((s,t)=>s+t.amt,0);
    const totAmt= ucAmt+cvAmt;
    const totTgt= tgts.uc+tgts.cv;
    const chAct = new Set(txns.filter(t=>t.ch_check>0&&t.dcid).map(t=>t.dcid)).size;
    const ucAch = tgts.uc>0?Math.round((ucAmt/tgts.uc)*100):0;
    const cvAch = tgts.cv>0?Math.round((cvAmt/tgts.cv)*100):0;
    const totAch= totTgt>0?Math.round((totAmt/totTgt)*100):0;
    const chAch = tgts.ch>0?Math.round((chAct/tgts.ch)*100):0;
    // If am_id equals the current TH's own ID (TH acts as AM for direct BMs),
    // treat as '__direct__' to avoid showing TH as a fake AM group
    const rawAmId = txns.length ? (txns[0].am_id||'') : (emp?.am_id||'');
    const amId = (!rawAmId || rawAmId === currentUser.id) ? '__direct__' : rawAmId;
    return {emp,txns,ucAmt,cvAmt,totAmt,totTgt,chAct,ucAch,cvAch,totAch,chAch,tgts,amId};
  }).sort((a,b)=>b.totAmt-a.totAmt);

  const teamUC     = bmRows.reduce((s,r)=>s+r.ucAmt,0);
  const teamCV     = bmRows.reduce((s,r)=>s+r.cvAmt,0);
  const teamTot    = teamUC+teamCV;

  const teamCVTgt  = bmRows.reduce((s,r)=>s+r.tgts.cv,0);
  const teamChTgt  = bmRows.reduce((s,r)=>s+(r.tgts.ch||0),0);

        +'<td>'+(r.tgts.ch>0?weeklyBadge(r.chAch):'—')+'</td>'

        +'<td>'+(hasTgt?weeklyBadge(r.totAch):'<span class="badge badge-grey">No Tgt</span>')+'</td>'
        +'</tr>';
    }).join('');
  }

  const bmTableHead = '<thead><tr><th>#</th><th>BM Name</th><th>Status</th><th>Tier</th><th>UC Tgt</th><th>UC Ach</th><th>UC%</th><th>CV Tgt</th><th>CV Ach</th><th>CV%</th><th>Ch Tgt</th><th>Ch</th><th>Ch%</th><th>Total</th><th>Overall%</th></tr></thead>';

  // ── TH/AM Filter dropdowns for flat BM view ──────────────

  const amList2 = emps2.filter(e => e.designation==='AM' &&
    (role==='RH'?e.rh_id===currentUser.id : role==='TH'?e.th_id===currentUser.id : e.th_id===currentUser.id||e.am_id===currentUser.id));

  const filterBar = `

      ${amList2.length ? `<select id="wkAMFilter" onchange="applyWkFilter()" style="padding:5px 10px;border:1px solid #c5cae9;border-radius:8px;font-size:12px;background:#fff">

      + amEntries.map(([amId, rows]) => {
          const amEmp = amId!=='__direct__' ? getEmpData().find(e=>e.id===amId) : null;

          const amTot= amUC+amCV;
          const amOnT= rows.filter(r=>r.totAch>=70).length;
          const amBeh= rows.filter(r=>r.tgts.uc+r.tgts.cv>0&&r.totAch<70).length;
          const cid  = 'amwk_'+amId.replace(/\W/g,'_');

      +'</div>';

  // Summary table for all milestones
